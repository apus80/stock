<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker API 디버그 대시보드</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d29922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1700px; margin: 0 auto; }

        h1 {
            color: var(--blue);
            margin-bottom: 5px;
            font-size: 20px;
        }

        .header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .subtitle {
            color: var(--yellow);
            font-size: 11px;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--border);
            color: white;
        }

        button.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-label {
            color: var(--yellow);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--blue);
        }

        .endpoint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .category-header {
            grid-column: 1 / -1;
            background: var(--bg3);
            padding: 12px;
            border-left: 3px solid var(--blue);
            color: var(--blue);
            font-weight: bold;
            font-size: 12px;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .endpoint-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .endpoint-card:hover {
            border-color: var(--blue);
            background: var(--bg3);
            transform: translateY(-2px);
        }

        .endpoint-header {
            background: var(--bg3);
            padding: 10px;
            border-bottom: 1px solid var(--border);
            color: var(--green);
            font-weight: bold;
            font-size: 11px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .endpoint-body {
            padding: 12px;
        }

        .endpoint-name {
            color: var(--text);
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: bold;
        }

        .endpoint-meta {
            color: var(--yellow);
            font-size: 10px;
            margin-bottom: 8px;
        }

        .param-input {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        .param-input:focus {
            outline: none;
            border-color: var(--blue);
            background: var(--bg2);
        }

        .button-group {
            display: flex;
            gap: 6px;
        }

        .button-group button {
            flex: 1;
            padding: 6px;
            font-size: 10px;
        }

        .test-btn { background: var(--bg3); border-color: var(--border); }
        .test-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 4px;
            border-left: 3px solid transparent;
            display: none;
            font-size: 10px;
        }

        .result.show {
            display: block;
        }

        .result.success {
            border-left-color: var(--green);
        }

        .result.error {
            border-left-color: var(--red);
        }

        .result-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .result.success .result-header { color: var(--green); }
        .result.error .result-header { color: var(--red); }

        .result-data {
            background: var(--bg2);
            padding: 6px;
            border-radius: 3px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 9px;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 25px;
        }

        .quick-btn {
            padding: 8px;
            font-size: 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .quick-btn:hover {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .summary {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .summary-title {
            color: var(--blue);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .summary-item {
            padding: 8px;
            background: var(--bg);
            border-radius: 4px;
            text-align: center;
        }

        .summary-item-label {
            color: var(--yellow);
            font-size: 10px;
            text-transform: uppercase;
        }

        /* 종목 검색 섹션 */
        .symbol-search {
            background: var(--bg2);
            border: 2px solid var(--blue);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .symbol-search-title {
            color: var(--blue);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .symbol-search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .symbol-search-input {
            flex: 1;
            max-width: 250px;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            text-transform: uppercase;
        }

        .symbol-search-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        .symbol-search-btn {
            padding: 10px 24px;
            background: var(--blue);
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        .symbol-search-btn:hover { opacity: 0.85; }
        .symbol-search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .symbol-quick-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .symbol-tag {
            padding: 4px 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
        }

        .symbol-tag:hover {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .symbol-results {
            display: none;
            margin-top: 15px;
        }

        .symbol-results.show { display: block; }

        .symbol-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .symbol-results-title {
            color: var(--green);
            font-size: 14px;
            font-weight: bold;
        }

        .symbol-results-meta {
            color: var(--yellow);
            font-size: 10px;
        }

        .symbol-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 12px;
        }

        .symbol-result-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .symbol-result-card.loading { opacity: 0.6; }
        .symbol-result-card.ok { border-left: 3px solid var(--green); }
        .symbol-result-card.fail { border-left: 3px solid var(--red); }

        .src-header {
            background: var(--bg3);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
        }

        .src-header .src-name { color: var(--blue); }
        .src-header .src-time { color: var(--yellow); font-weight: normal; }

        .src-body {
            padding: 10px 12px;
        }

        .src-kv {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid var(--bg3);
            font-size: 11px;
        }

        .src-kv:last-child { border-bottom: none; }
        .src-kv .k { color: var(--yellow); }
        .src-kv .v { color: var(--text); font-weight: bold; }
        .src-kv .v.up { color: var(--green); }
        .src-kv .v.down { color: var(--red); }

        .src-raw-toggle {
            color: var(--blue);
            font-size: 10px;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }

        .src-raw {
            display: none;
            background: var(--bg2);
            padding: 8px;
            border-radius: 4px;
            margin-top: 6px;
            font-size: 9px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .src-raw.show { display: block; }

        .summary-item-value {
            font-size: 14px;
            font-weight: bold;
            color: var(--green);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Worker API 디버그 대시보드</h1>
            <div class="subtitle">35개 엔드포인트 테스트 및 모니터링</div>
        </div>

        <!-- 종목 검색 -->
        <div class="symbol-search">
            <div class="symbol-search-title">🔍 종목 심볼 검색 — 모든 엔드포인트 한번에 조회</div>
            <div class="symbol-search-row">
                <input type="text" class="symbol-search-input" id="symbolInput" placeholder="AAPL" value="" autocomplete="off">
                <button class="symbol-search-btn" id="symbolSearchBtn" onclick="searchSymbol()">조회</button>
            </div>
            <div class="symbol-quick-tags">
                <span class="symbol-tag" onclick="quickSearch('AAPL')">AAPL</span>
                <span class="symbol-tag" onclick="quickSearch('NVDA')">NVDA</span>
                <span class="symbol-tag" onclick="quickSearch('TSLA')">TSLA</span>
                <span class="symbol-tag" onclick="quickSearch('MSFT')">MSFT</span>
                <span class="symbol-tag" onclick="quickSearch('GOOGL')">GOOGL</span>
                <span class="symbol-tag" onclick="quickSearch('AMZN')">AMZN</span>
                <span class="symbol-tag" onclick="quickSearch('META')">META</span>
                <span class="symbol-tag" onclick="quickSearch('SPY')">SPY</span>
                <span class="symbol-tag" onclick="quickSearch('QQQ')">QQQ</span>
            </div>
            <div class="symbol-results" id="symbolResults"></div>
        </div>

        <!-- 컨트롤 -->
        <div class="controls">
            <button onclick="testAllEndpoints()">⚡ 모든 엔드포인트 테스트</button>
            <button onclick="clearAllResults()">🗑️ 결과 초기화</button>
            <button onclick="exportResults()">💾 결과 저장</button>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">총 엔드포인트</div>
                <div class="stat-value" id="stat-total">35</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">테스트 완료</div>
                <div class="stat-value" id="stat-completed">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">성공</div>
                <div class="stat-value" style="color: var(--green);" id="stat-success">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">실패</div>
                <div class="stat-value" style="color: var(--red);" id="stat-error">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">평균 응답시간</div>
                <div class="stat-value" id="stat-avg">-</div>
            </div>
        </div>

        <!-- 빠른 테스트 -->
        <h3 style="color: var(--blue); margin-bottom: 10px; font-size: 12px;">⚡ 빠른 테스트</h3>
        <div class="quick-buttons" id="quick-buttons"></div>

        <!-- 엔드포인트 그리드 -->
        <div class="endpoint-grid" id="endpoints-grid"></div>
    </div>

    <script>
        const API_BASE = 'https://fmp-proxy.aiinvestflow.workers.dev';
        let testResults = {};

        // 모든 엔드포인트 정의 (35개)
        const endpoints = {
            '📊 시장 데이터': [
                { path: '/market', name: '시장 데이터 (Market Data)', desc: 'S&P500, VIX, 환율 등', needsParam: false },
                { path: '/stock', name: '종목 정보 (Stock Quote)', desc: '개별 종목 정보', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/top7', name: '상위 7개 지수 (Top 7)', desc: '주요 지수', needsParam: false },
                { path: '/feargreed', name: '공포-탐욕지수 (Fear & Greed)', desc: '시장 심리', needsParam: false },
            ],
            '📈 재무제표': [
                { path: '/fundamentals/earnings', name: '실적 (Earnings)', desc: '실적 발표 데이터', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/growth', name: '성장률 (Growth)', desc: '매출/이익 성장률', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/income', name: '손익계산서 (Income)', desc: '수익성 지표', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/balance', name: '재무상태표 (Balance)', desc: '자산/부채/자본', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/cashflow', name: '현금흐름표 (Cash Flow)', desc: '현금 유동성', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/ratios', name: '재무비율 (Ratios)', desc: 'PE, PB 등 비율', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/profile', name: '회사정보 (Profile)', desc: '산업, 섹터, CEO', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/shares', name: '주식수 (Shares)', desc: '발행주식수 변화', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
            ],
            '🎯 알파 & 발굴': [
                { path: '/alpha', name: '알파 분석 (Alpha)', desc: '개별 종목 알파', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/alpha/discovery', name: '알파 발굴 (Discovery)', desc: '상위 20개 종목', needsParam: false },
                { path: '/alpha/alpha-scanner', name: '알파 스캐너', desc: '스캐닝 결과', needsParam: false },
                { path: '/alpha/breakout', name: '돌파 신호 (Breakout)', desc: '가격 돌파', needsParam: false },
            ],
            '📊 분석 - 거시경제': [
                { path: '/analysis/institutional-score', name: '제도권 점수', desc: '기관투자자 건강도', needsParam: false },
                { path: '/analysis/market-regime', name: '시장 레짐', desc: 'Risk-On/Off', needsParam: false },
                { path: '/analysis/liquidity-pulse', name: '유동성 펄스', desc: 'Fed 자산/유동성', needsParam: false },
                { path: '/analysis/yield-curve-monitor', name: '수익률곡선', desc: '금리곡선 분석', needsParam: false },
                { path: '/analysis/inflation-pressure', name: '인플레이션 압력', desc: 'CPI/PCE', needsParam: false },
                { path: '/analysis/credit-stress', name: '신용 스트레스', desc: '신용스프레드', needsParam: false },
                { path: '/analysis/real-rate-monitor', name: '실질금리', desc: '실질 금리 수준', needsParam: false },
                { path: '/analysis/fed-policy-impact', name: 'Fed 정책 영향', desc: '연준 정책 분석', needsParam: false },
                { path: '/analysis/labor-market-health', name: '노동시장', desc: '고용률/임금', needsParam: false },
                { path: '/analysis/macro-momentum', name: '거시 모멘텀', desc: '경제 추진력', needsParam: false },
            ],
            '📈 분석 - 시장': [
                { path: '/analysis/market-breadth', name: '시장 광도', desc: '상승/하락 종목 비율', needsParam: false },
                { path: '/analysis/volatility-regime', name: '변동성 레짐', desc: 'VIX 수준 분석', needsParam: false },
                { path: '/analysis/sector-rotation', name: '섹터 로테이션', desc: '섹터 강도 분석', needsParam: false },
                { path: '/analysis/dollar-liquidity', name: '달러 유동성', desc: '달러 지수/자금', needsParam: false },
                { path: '/analysis/stock-ranking', name: '종목 랭킹', desc: '성과 순위', needsParam: false },
            ],
            '💭 분석 - 심리': [
                { path: '/analysis/crypto-sentiment', name: '암호 심리', desc: '암호화폐 심리', needsParam: false },
                { path: '/analysis/smart-money', name: '기관 자금', desc: '스마트 머니 추적', needsParam: false },
                { path: '/analysis/market-heatmap', name: '시장 히트맵', desc: '섹터 히트맵', needsParam: false },
            ],
            '📢 기타': [
                { path: '/earnings', name: '실적 발표', desc: '실적 발표 캘린더', needsParam: false },
            ]
        };

        // UI 초기화
        function initUI() {
            const grid = document.getElementById('endpoints-grid');
            const quickButtons = document.getElementById('quick-buttons');

            Object.entries(endpoints).forEach(([category, items]) => {
                // 카테고리 헤더
                const header = document.createElement('div');
                header.className = 'category-header';
                header.textContent = `${category} (${items.length})`;
                grid.appendChild(header);

                // 엔드포인트 카드
                items.forEach(endpoint => {
                    const card = createCard(endpoint);
                    grid.appendChild(card);
                });
            });

            // 빠른 테스트 버튼
            const quickEndpoints = [
                '/market', '/feargreed', '/alpha/discovery',
                '/analysis/market-regime', '/analysis/institutional-score'
            ];
            quickEndpoints.forEach(path => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = path.split('/').pop();
                btn.onclick = () => testEndpoint(path);
                quickButtons.appendChild(btn);
            });
        }

        function createCard(endpoint) {
            const card = document.createElement('div');
            card.className = 'endpoint-card';
            const cardId = endpoint.path.replace(/\//g, '-');
            card.id = `card-${cardId}`;

            let html = `
                <div class="endpoint-header">${endpoint.path}</div>
                <div class="endpoint-body">
                    <div class="endpoint-name">${endpoint.name}</div>
                    <div class="endpoint-meta">💡 ${endpoint.desc}</div>
            `;

            if (endpoint.needsParam) {
                html += `
                    <input type="text" class="param-input" value="${endpoint.paramDefault}" placeholder="${endpoint.param}">
                `;
            }

            html += `
                <div class="button-group">
                    <button class="test-btn" onclick="testEndpoint('${endpoint.path}', this)">테스트</button>
                </div>
                <div class="result" id="result-${cardId}"></div>
                </div>
            `;

            card.innerHTML = html;
            return card;
        }

        async function testEndpoint(path, btnElement = null) {
            const cardId = path.replace(/\//g, '-');
            const card = document.querySelector(`#card-${cardId}`);
            const resultDiv = document.getElementById(`result-${cardId}`);
            const paramInput = card?.querySelector('.param-input');

            let url = API_BASE + path;
            if (paramInput && paramInput.value) {
                url += `?symbol=${paramInput.value}`;
            }

            resultDiv.classList.add('show');
            resultDiv.innerHTML = '<div class="result-header"><span>⏳ 테스트 중...</span></div>';

            const startTime = Date.now();

            try {
                const response = await fetch(url, { timeout: 10000 });
                const endTime = Date.now();
                const duration = endTime - startTime;

                const data = await response.json();
                const fieldCount = Object.keys(data?.data || data || {}).length;
                const dataStr = JSON.stringify(data, null, 2).substring(0, 400);

                resultDiv.className = `result show success`;
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span>✅ ${duration}ms</span>
                        <span>${fieldCount} 필드</span>
                    </div>
                    <div class="result-data">${dataStr}${dataStr.length === 400 ? '\n... (생략)' : ''}</div>
                `;

                testResults[path] = { status: 'success', time: duration, fields: fieldCount };
                updateStats();
            } catch (error) {
                const endTime = Date.now();
                const duration = endTime - startTime;

                resultDiv.className = 'result show error';
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span>❌ ${duration}ms</span>
                        <span>${error.message}</span>
                    </div>
                `;

                testResults[path] = { status: 'error', time: duration };
                updateStats();
            }

            if (btnElement) {
                btnElement.style.background = 'var(--green)';
                setTimeout(() => { btnElement.style.background = ''; }, 500);
            }
        }

        async function testAllEndpoints() {
            console.log('🚀 모든 엔드포인트 테스트 시작...');
            const allEndpoints = Object.values(endpoints).flat();

            for (const endpoint of allEndpoints) {
                await testEndpoint(endpoint.path);
                await new Promise(r => setTimeout(r, 200)); // 요청 간 딜레이
            }

            console.log('✅ 모든 테스트 완료');
        }

        function updateStats() {
            const results = Object.values(testResults);
            const success = results.filter(r => r.status === 'success').length;
            const error = results.filter(r => r.status === 'error').length;
            const times = results.filter(r => r.time).map(r => r.time);
            const avgTime = times.length > 0 ? Math.round(times.reduce((a,b) => a+b) / times.length) : 0;

            document.getElementById('stat-completed').textContent = results.length;
            document.getElementById('stat-success').textContent = success;
            document.getElementById('stat-error').textContent = error;
            document.getElementById('stat-avg').textContent = avgTime + 'ms';
        }

        function clearAllResults() {
            document.querySelectorAll('.result').forEach(r => {
                r.classList.remove('show');
                r.innerHTML = '';
            });
            testResults = {};
            updateStats();
        }

        function exportResults() {
            const report = {
                timestamp: new Date().toISOString(),
                results: testResults,
                summary: {
                    total: Object.keys(testResults).length,
                    success: Object.values(testResults).filter(r => r.status === 'success').length,
                    error: Object.values(testResults).filter(r => r.status === 'error').length
                }
            };

            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worker-debug-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // === 종목 심볼 검색 기능 ===

        const SYMBOL_ENDPOINTS = [
            { path: '/stock', name: '실시간 시세', extract: extractStock },
            { path: '/alpha', name: 'Alpha Score', extract: extractAlpha },
            { path: '/fundamentals/ratios', name: '재무비율 (PE/PB)', extract: extractRatios },
            { path: '/fundamentals/profile', name: '회사 프로필', extract: extractProfile },
            { path: '/fundamentals/income', name: '손익계산서', extract: extractIncome },
            { path: '/fundamentals/balance', name: '재무상태표', extract: extractBalance },
            { path: '/fundamentals/growth', name: '성장률', extract: extractGrowth },
            { path: '/fundamentals/cashflow', name: '현금흐름', extract: extractCashflow },
            { path: '/fundamentals/earnings', name: '실적', extract: extractEarnings },
            { path: '/fundamentals/shares', name: '주식수', extract: extractShares },
            { path: '/analysis/catalyst-surge', name: 'Catalyst Surge', extract: extractCatalyst },
        ];

        function quickSearch(sym) {
            document.getElementById('symbolInput').value = sym;
            searchSymbol();
        }

        document.getElementById('symbolInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchSymbol();
        });

        async function searchSymbol() {
            const input = document.getElementById('symbolInput');
            const sym = input.value.trim().toUpperCase();
            if (!sym) return;
            input.value = sym;

            const btn = document.getElementById('symbolSearchBtn');
            btn.disabled = true;
            btn.textContent = '조회 중...';

            const container = document.getElementById('symbolResults');
            container.classList.add('show');

            // 헤더 + 빈 카드 생성
            let html = `
                <div class="symbol-results-header">
                    <div class="symbol-results-title">${sym} — 엔드포인트별 응답</div>
                    <div class="symbol-results-meta" id="symMeta">0 / ${SYMBOL_ENDPOINTS.length} 완료</div>
                </div>
                <div class="symbol-results-grid" id="symGrid">
            `;
            SYMBOL_ENDPOINTS.forEach(function(ep, i) {
                html += `<div class="symbol-result-card loading" id="sym-card-${i}">
                    <div class="src-header"><span class="src-name">${ep.name}</span><span class="src-time" id="sym-time-${i}">...</span></div>
                    <div class="src-body" id="sym-body-${i}"><span style="color:var(--yellow)">⏳ 호출 중...</span></div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;

            // 모든 엔드포인트 병렬 호출
            let done = 0;
            const promises = SYMBOL_ENDPOINTS.map(function(ep, i) {
                const url = API_BASE + ep.path + '?symbol=' + sym;
                const t0 = Date.now();
                return fetch(url)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        const ms = Date.now() - t0;
                        renderSymbolCard(i, ep, data, ms, sym);
                        done++;
                        document.getElementById('symMeta').textContent = done + ' / ' + SYMBOL_ENDPOINTS.length + ' 완료';
                    })
                    .catch(function(err) {
                        const ms = Date.now() - t0;
                        renderSymbolCardError(i, ep, err, ms);
                        done++;
                        document.getElementById('symMeta').textContent = done + ' / ' + SYMBOL_ENDPOINTS.length + ' 완료';
                    });
            });

            await Promise.all(promises);
            btn.disabled = false;
            btn.textContent = '조회';
        }

        function renderSymbolCard(i, ep, data, ms) {
            const card = document.getElementById('sym-card-' + i);
            card.className = 'symbol-result-card ok';
            document.getElementById('sym-time-' + i).textContent = ms + 'ms';

            const kvs = ep.extract(data);
            const rawId = 'sym-raw-' + i;
            let html = '';
            kvs.forEach(function(kv) {
                const cls = kv.dir === 'up' ? ' up' : kv.dir === 'down' ? ' down' : '';
                html += '<div class="src-kv"><span class="k">' + kv.k + '</span><span class="v' + cls + '">' + kv.v + '</span></div>';
            });
            html += '<span class="src-raw-toggle" onclick="toggleRaw(\'' + rawId + '\')">▶ Raw JSON</span>';
            html += '<div class="src-raw" id="' + rawId + '">' + JSON.stringify(data, null, 2).substring(0, 1500) + '</div>';
            document.getElementById('sym-body-' + i).innerHTML = html;
        }

        function renderSymbolCardError(i, ep, err, ms) {
            const card = document.getElementById('sym-card-' + i);
            card.className = 'symbol-result-card fail';
            document.getElementById('sym-time-' + i).textContent = ms + 'ms';
            document.getElementById('sym-body-' + i).innerHTML = '<span style="color:var(--red)">❌ ' + err.message + '</span>';
        }

        function toggleRaw(id) {
            var el = document.getElementById(id);
            el.classList.toggle('show');
        }

        // --- 데이터 추출 함수들 ---

        function fmtNum(v, dec) {
            if (v == null || v === '-') return '-';
            return Number(v).toFixed(dec == null ? 2 : dec);
        }
        function fmtPct(v) {
            if (v == null) return '-';
            var n = Number(v);
            return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
        }
        function chgDir(v) {
            if (v == null) return '';
            return Number(v) >= 0 ? 'up' : 'down';
        }

        function extractStock(d) {
            var q = d.data || d;
            return [
                { k: 'Symbol', v: q.symbol || '-' },
                { k: 'Name', v: q.name || '-' },
                { k: 'Price', v: fmtNum(q.price) },
                { k: 'Change', v: fmtPct(q.changePercentage), dir: chgDir(q.changePercentage) },
                { k: 'Volume', v: q.volume ? Number(q.volume).toLocaleString() : '-' },
                { k: 'Market Cap', v: q.marketCap ? '$' + (q.marketCap / 1e9).toFixed(1) + 'B' : '-' },
            ];
        }

        function extractAlpha(d) {
            var a = d.data || d;
            var f = a.factors || {};
            var m = a.metrics || {};
            var p = a.profile || {};
            return [
                { k: 'Explosive Score', v: fmtNum(a.explosiveScore, 1) },
                { k: 'Sector', v: p.sector || '-' },
                { k: 'PE', v: fmtNum(f.pe, 1) },
                { k: 'PB', v: fmtNum(f.pb, 1) },
                { k: 'Revenue Growth', v: fmtPct(f.revenueGrowth), dir: chgDir(f.revenueGrowth) },
                { k: 'Earnings Growth', v: fmtPct(f.earningsGrowth), dir: chgDir(f.earningsGrowth) },
                { k: 'Analyst Score', v: fmtNum(f.analystScore, 0) },
                { k: 'Momentum', v: fmtNum(m.momentum, 2) },
                { k: 'Volume Score', v: fmtNum(m.volume, 2) },
            ];
        }

        function extractRatios(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'PE Ratio (TTM)', v: fmtNum(r.priceToEarningsRatioTTM || r.peRatioTTM) },
                { k: 'PB Ratio (TTM)', v: fmtNum(r.priceToBookRatioTTM || r.pbRatioTTM) },
                { k: 'PS Ratio', v: fmtNum(r.priceToSalesRatioTTM) },
                { k: 'ROE', v: fmtPct(r.returnOnEquityTTM ? r.returnOnEquityTTM * 100 : null) },
                { k: 'ROA', v: fmtPct(r.returnOnAssetsTTM ? r.returnOnAssetsTTM * 100 : null) },
                { k: 'Gross Margin', v: fmtPct(r.grossProfitMarginTTM ? r.grossProfitMarginTTM * 100 : null) },
                { k: 'Net Margin', v: fmtPct(r.netProfitMarginTTM ? r.netProfitMarginTTM * 100 : null) },
                { k: 'Debt/Equity', v: fmtNum(r.debtEquityRatioTTM) },
                { k: 'Current Ratio', v: fmtNum(r.currentRatioTTM) },
                { k: 'Dividend Yield', v: fmtPct(r.dividendYieldTTM ? r.dividendYieldTTM * 100 : null) },
            ];
        }

        function extractProfile(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var p = arr[0] || {};
            return [
                { k: 'Name', v: p.companyName || p.name || '-' },
                { k: 'Sector', v: p.sector || '-' },
                { k: 'Industry', v: p.industry || '-' },
                { k: 'CEO', v: p.ceo || '-' },
                { k: 'Employees', v: p.fullTimeEmployees ? Number(p.fullTimeEmployees).toLocaleString() : '-' },
                { k: 'Country', v: p.country || '-' },
                { k: 'IPO Date', v: p.ipoDate || '-' },
            ];
        }

        function extractIncome(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Period', v: r.date || r.period || '-' },
                { k: 'Revenue', v: r.revenue ? '$' + (r.revenue / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Gross Profit', v: r.grossProfit ? '$' + (r.grossProfit / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Net Income', v: r.netIncome ? '$' + (r.netIncome / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'EPS', v: fmtNum(r.eps) },
                { k: 'Operating Income', v: r.operatingIncome ? '$' + (r.operatingIncome / 1e9).toFixed(2) + 'B' : '-' },
            ];
        }

        function extractBalance(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Period', v: r.date || '-' },
                { k: 'Total Assets', v: r.totalAssets ? '$' + (r.totalAssets / 1e9).toFixed(1) + 'B' : '-' },
                { k: 'Total Liabilities', v: r.totalLiabilities ? '$' + (r.totalLiabilities / 1e9).toFixed(1) + 'B' : '-' },
                { k: 'Total Equity', v: r.totalStockholdersEquity ? '$' + (r.totalStockholdersEquity / 1e9).toFixed(1) + 'B' : '-' },
                { k: 'Cash', v: r.cashAndCashEquivalents ? '$' + (r.cashAndCashEquivalents / 1e9).toFixed(1) + 'B' : '-' },
                { k: 'Total Debt', v: r.totalDebt ? '$' + (r.totalDebt / 1e9).toFixed(1) + 'B' : '-' },
            ];
        }

        function extractGrowth(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Period', v: r.date || '-' },
                { k: 'Revenue Growth', v: fmtPct(r.revenueGrowth ? r.revenueGrowth * 100 : null), dir: chgDir(r.revenueGrowth) },
                { k: 'Net Income Growth', v: fmtPct(r.netIncomeGrowth ? r.netIncomeGrowth * 100 : null), dir: chgDir(r.netIncomeGrowth) },
                { k: 'EPS Growth', v: fmtPct(r.epsgrowth ? r.epsgrowth * 100 : null), dir: chgDir(r.epsgrowth) },
                { k: 'Gross Profit Growth', v: fmtPct(r.grossProfitGrowth ? r.grossProfitGrowth * 100 : null), dir: chgDir(r.grossProfitGrowth) },
                { k: 'Operating Income Growth', v: fmtPct(r.operatingIncomeGrowth ? r.operatingIncomeGrowth * 100 : null), dir: chgDir(r.operatingIncomeGrowth) },
            ];
        }

        function extractCashflow(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Period', v: r.date || '-' },
                { k: 'Operating CF', v: r.operatingCashFlow ? '$' + (r.operatingCashFlow / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Investing CF', v: r.netCashUsedForInvestingActivites ? '$' + (r.netCashUsedForInvestingActivites / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Financing CF', v: r.netCashUsedProvidedByFinancingActivities ? '$' + (r.netCashUsedProvidedByFinancingActivities / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Free CF', v: r.freeCashFlow ? '$' + (r.freeCashFlow / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'CapEx', v: r.capitalExpenditure ? '$' + (r.capitalExpenditure / 1e9).toFixed(2) + 'B' : '-' },
            ];
        }

        function extractEarnings(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Date', v: r.date || '-' },
                { k: 'EPS Actual', v: fmtNum(r.epsActual || r.eps) },
                { k: 'EPS Estimated', v: fmtNum(r.epsEstimated) },
                { k: 'Revenue Actual', v: r.revenueActual ? '$' + (r.revenueActual / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Revenue Estimated', v: r.revenueEstimated ? '$' + (r.revenueEstimated / 1e9).toFixed(2) + 'B' : '-' },
            ];
        }

        function extractShares(d) {
            var arr = Array.isArray(d) ? d : (d.data ? (Array.isArray(d.data) ? d.data : [d.data]) : [d]);
            var r = arr[0] || {};
            return [
                { k: 'Date', v: r.date || '-' },
                { k: 'Float Shares', v: r.floatShares ? (r.floatShares / 1e9).toFixed(2) + 'B' : '-' },
                { k: 'Outstanding', v: r.outstandingShares ? (r.outstandingShares / 1e9).toFixed(2) + 'B' : (r.sharesOutstanding ? (r.sharesOutstanding / 1e9).toFixed(2) + 'B' : '-') },
                { k: 'Free Float', v: r.freeFloat ? fmtPct(r.freeFloat) : '-' },
            ];
        }

        function extractCatalyst(d) {
            var c = d.data || d;
            var b = c.breakdown || {};
            return [
                { k: 'CSS Score', v: fmtNum(c.css || c.css_raw, 1) },
                { k: 'Grade', v: c.grade || '-' },
                { k: 'Catalyst', v: fmtNum(b.catalyst, 1) },
                { k: 'Technical', v: fmtNum(b.technical, 1) },
                { k: 'Smart Money', v: fmtNum(b.smartMoney, 1) },
            ];
        }

        // 초기화
        window.addEventListener('load', initUI);
    </script>
</body>
</html>
