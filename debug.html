<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker API 디버그 대시보드</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d29922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1700px; margin: 0 auto; }

        h1 {
            color: var(--blue);
            margin-bottom: 5px;
            font-size: 20px;
        }

        .header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .subtitle {
            color: var(--yellow);
            font-size: 11px;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--border);
            color: white;
        }

        button.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-label {
            color: var(--yellow);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--blue);
        }

        .endpoint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .category-header {
            grid-column: 1 / -1;
            background: var(--bg3);
            padding: 12px;
            border-left: 3px solid var(--blue);
            color: var(--blue);
            font-weight: bold;
            font-size: 12px;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .endpoint-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .endpoint-card:hover {
            border-color: var(--blue);
            background: var(--bg3);
            transform: translateY(-2px);
        }

        .endpoint-header {
            background: var(--bg3);
            padding: 10px;
            border-bottom: 1px solid var(--border);
            color: var(--green);
            font-weight: bold;
            font-size: 11px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .endpoint-body {
            padding: 12px;
        }

        .endpoint-name {
            color: var(--text);
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: bold;
        }

        .endpoint-meta {
            color: var(--yellow);
            font-size: 10px;
            margin-bottom: 8px;
        }

        .param-input {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        .param-input:focus {
            outline: none;
            border-color: var(--blue);
            background: var(--bg2);
        }

        .button-group {
            display: flex;
            gap: 6px;
        }

        .button-group button {
            flex: 1;
            padding: 6px;
            font-size: 10px;
        }

        .test-btn { background: var(--bg3); border-color: var(--border); }
        .test-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 4px;
            border-left: 3px solid transparent;
            display: none;
            font-size: 10px;
        }

        .result.show {
            display: block;
        }

        .result.success {
            border-left-color: var(--green);
        }

        .result.error {
            border-left-color: var(--red);
        }

        .result-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .result.success .result-header { color: var(--green); }
        .result.error .result-header { color: var(--red); }

        .result-data {
            background: var(--bg2);
            padding: 6px;
            border-radius: 3px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 9px;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 25px;
        }

        .quick-btn {
            padding: 8px;
            font-size: 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .quick-btn:hover {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .summary {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .summary-title {
            color: var(--blue);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .summary-item {
            padding: 8px;
            background: var(--bg);
            border-radius: 4px;
            text-align: center;
        }

        .summary-item-label {
            color: var(--yellow);
            font-size: 10px;
            text-transform: uppercase;
        }

        .summary-item-value {
            font-size: 14px;
            font-weight: bold;
            color: var(--green);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Worker API 디버그 대시보드</h1>
            <div class="subtitle">35개 엔드포인트 테스트 및 모니터링</div>
        </div>

        <!-- 컨트롤 -->
        <div class="controls">
            <button onclick="testAllEndpoints()">⚡ 모든 엔드포인트 테스트</button>
            <button onclick="clearAllResults()">🗑️ 결과 초기화</button>
            <button onclick="exportResults()">💾 결과 저장</button>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">총 엔드포인트</div>
                <div class="stat-value" id="stat-total">35</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">테스트 완료</div>
                <div class="stat-value" id="stat-completed">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">성공</div>
                <div class="stat-value" style="color: var(--green);" id="stat-success">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">실패</div>
                <div class="stat-value" style="color: var(--red);" id="stat-error">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">평균 응답시간</div>
                <div class="stat-value" id="stat-avg">-</div>
            </div>
        </div>

        <!-- 빠른 테스트 -->
        <h3 style="color: var(--blue); margin-bottom: 10px; font-size: 12px;">⚡ 빠른 테스트</h3>
        <div class="quick-buttons" id="quick-buttons"></div>

        <!-- 엔드포인트 그리드 -->
        <div class="endpoint-grid" id="endpoints-grid"></div>
    </div>

    <script>
        const API_BASE = 'https://fmp-proxy.aiinvestflow.workers.dev';
        let testResults = {};

        // 모든 엔드포인트 정의 (35개)
        const endpoints = {
            '📊 시장 데이터': [
                { path: '/market', name: '시장 데이터 (Market Data)', desc: 'S&P500, VIX, 환율 등', needsParam: false },
                { path: '/stock', name: '종목 정보 (Stock Quote)', desc: '개별 종목 정보', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/top7', name: '상위 7개 지수 (Top 7)', desc: '주요 지수', needsParam: false },
                { path: '/feargreed', name: '공포-탐욕지수 (Fear & Greed)', desc: '시장 심리', needsParam: false },
            ],
            '📈 재무제표': [
                { path: '/fundamentals/earnings', name: '실적 (Earnings)', desc: '실적 발표 데이터', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/growth', name: '성장률 (Growth)', desc: '매출/이익 성장률', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/income', name: '손익계산서 (Income)', desc: '수익성 지표', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/balance', name: '재무상태표 (Balance)', desc: '자산/부채/자본', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/cashflow', name: '현금흐름표 (Cash Flow)', desc: '현금 유동성', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/ratios', name: '재무비율 (Ratios)', desc: 'PE, PB 등 비율', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/profile', name: '회사정보 (Profile)', desc: '산업, 섹터, CEO', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/fundamentals/shares', name: '주식수 (Shares)', desc: '발행주식수 변화', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
            ],
            '🎯 알파 & 발굴': [
                { path: '/alpha', name: '알파 분석 (Alpha)', desc: '개별 종목 알파', needsParam: true, param: 'symbol', paramDefault: 'AAPL' },
                { path: '/alpha/discovery', name: '알파 발굴 (Discovery)', desc: '상위 20개 종목', needsParam: false },
                { path: '/alpha/alpha-scanner', name: '알파 스캐너', desc: '스캐닝 결과', needsParam: false },
                { path: '/alpha/breakout', name: '돌파 신호 (Breakout)', desc: '가격 돌파', needsParam: false },
            ],
            '📊 분석 - 거시경제': [
                { path: '/analysis/institutional-score', name: '제도권 점수', desc: '기관투자자 건강도', needsParam: false },
                { path: '/analysis/market-regime', name: '시장 레짐', desc: 'Risk-On/Off', needsParam: false },
                { path: '/analysis/liquidity-pulse', name: '유동성 펄스', desc: 'Fed 자산/유동성', needsParam: false },
                { path: '/analysis/yield-curve-monitor', name: '수익률곡선', desc: '금리곡선 분석', needsParam: false },
                { path: '/analysis/inflation-pressure', name: '인플레이션 압력', desc: 'CPI/PCE', needsParam: false },
                { path: '/analysis/credit-stress', name: '신용 스트레스', desc: '신용스프레드', needsParam: false },
                { path: '/analysis/real-rate-monitor', name: '실질금리', desc: '실질 금리 수준', needsParam: false },
                { path: '/analysis/fed-policy-impact', name: 'Fed 정책 영향', desc: '연준 정책 분석', needsParam: false },
                { path: '/analysis/labor-market-health', name: '노동시장', desc: '고용률/임금', needsParam: false },
                { path: '/analysis/macro-momentum', name: '거시 모멘텀', desc: '경제 추진력', needsParam: false },
            ],
            '📈 분석 - 시장': [
                { path: '/analysis/market-breadth', name: '시장 광도', desc: '상승/하락 종목 비율', needsParam: false },
                { path: '/analysis/volatility-regime', name: '변동성 레짐', desc: 'VIX 수준 분석', needsParam: false },
                { path: '/analysis/sector-rotation', name: '섹터 로테이션', desc: '섹터 강도 분석', needsParam: false },
                { path: '/analysis/dollar-liquidity', name: '달러 유동성', desc: '달러 지수/자금', needsParam: false },
                { path: '/analysis/stock-ranking', name: '종목 랭킹', desc: '성과 순위', needsParam: false },
            ],
            '💭 분석 - 심리': [
                { path: '/analysis/crypto-sentiment', name: '암호 심리', desc: '암호화폐 심리', needsParam: false },
                { path: '/analysis/smart-money', name: '기관 자금', desc: '스마트 머니 추적', needsParam: false },
                { path: '/analysis/market-heatmap', name: '시장 히트맵', desc: '섹터 히트맵', needsParam: false },
            ],
            '📢 기타': [
                { path: '/earnings', name: '실적 발표', desc: '실적 발표 캘린더', needsParam: false },
            ]
        };

        // UI 초기화
        function initUI() {
            const grid = document.getElementById('endpoints-grid');
            const quickButtons = document.getElementById('quick-buttons');

            Object.entries(endpoints).forEach(([category, items]) => {
                // 카테고리 헤더
                const header = document.createElement('div');
                header.className = 'category-header';
                header.textContent = `${category} (${items.length})`;
                grid.appendChild(header);

                // 엔드포인트 카드
                items.forEach(endpoint => {
                    const card = createCard(endpoint);
                    grid.appendChild(card);
                });
            });

            // 빠른 테스트 버튼
            const quickEndpoints = [
                '/market', '/feargreed', '/alpha/discovery',
                '/analysis/market-regime', '/analysis/institutional-score'
            ];
            quickEndpoints.forEach(path => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = path.split('/').pop();
                btn.onclick = () => testEndpoint(path);
                quickButtons.appendChild(btn);
            });
        }

        function createCard(endpoint) {
            const card = document.createElement('div');
            card.className = 'endpoint-card';
            const cardId = endpoint.path.replace(/\//g, '-');
            card.id = `card-${cardId}`;

            let html = `
                <div class="endpoint-header">${endpoint.path}</div>
                <div class="endpoint-body">
                    <div class="endpoint-name">${endpoint.name}</div>
                    <div class="endpoint-meta">💡 ${endpoint.desc}</div>
            `;

            if (endpoint.needsParam) {
                html += `
                    <input type="text" class="param-input" value="${endpoint.paramDefault}" placeholder="${endpoint.param}">
                `;
            }

            html += `
                <div class="button-group">
                    <button class="test-btn" onclick="testEndpoint('${endpoint.path}', this)">테스트</button>
                </div>
                <div class="result" id="result-${cardId}"></div>
                </div>
            `;

            card.innerHTML = html;
            return card;
        }

        async function testEndpoint(path, btnElement = null) {
            const cardId = path.replace(/\//g, '-');
            const card = document.querySelector(`#card-${cardId}`);
            const resultDiv = document.getElementById(`result-${cardId}`);
            const paramInput = card?.querySelector('.param-input');

            let url = API_BASE + path;
            if (paramInput && paramInput.value) {
                url += `?symbol=${paramInput.value}`;
            }

            resultDiv.classList.add('show');
            resultDiv.innerHTML = '<div class="result-header"><span>⏳ 테스트 중...</span></div>';

            const startTime = Date.now();

            try {
                const response = await fetch(url, { timeout: 10000 });
                const endTime = Date.now();
                const duration = endTime - startTime;

                const data = await response.json();
                const fieldCount = Object.keys(data?.data || data || {}).length;
                const dataStr = JSON.stringify(data, null, 2).substring(0, 400);

                resultDiv.className = `result show success`;
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span>✅ ${duration}ms</span>
                        <span>${fieldCount} 필드</span>
                    </div>
                    <div class="result-data">${dataStr}${dataStr.length === 400 ? '\n... (생략)' : ''}</div>
                `;

                testResults[path] = { status: 'success', time: duration, fields: fieldCount };
                updateStats();
            } catch (error) {
                const endTime = Date.now();
                const duration = endTime - startTime;

                resultDiv.className = 'result show error';
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span>❌ ${duration}ms</span>
                        <span>${error.message}</span>
                    </div>
                `;

                testResults[path] = { status: 'error', time: duration };
                updateStats();
            }

            if (btnElement) {
                btnElement.style.background = 'var(--green)';
                setTimeout(() => { btnElement.style.background = ''; }, 500);
            }
        }

        async function testAllEndpoints() {
            console.log('🚀 모든 엔드포인트 테스트 시작...');
            const allEndpoints = Object.values(endpoints).flat();

            for (const endpoint of allEndpoints) {
                await testEndpoint(endpoint.path);
                await new Promise(r => setTimeout(r, 200)); // 요청 간 딜레이
            }

            console.log('✅ 모든 테스트 완료');
        }

        function updateStats() {
            const results = Object.values(testResults);
            const success = results.filter(r => r.status === 'success').length;
            const error = results.filter(r => r.status === 'error').length;
            const times = results.filter(r => r.time).map(r => r.time);
            const avgTime = times.length > 0 ? Math.round(times.reduce((a,b) => a+b) / times.length) : 0;

            document.getElementById('stat-completed').textContent = results.length;
            document.getElementById('stat-success').textContent = success;
            document.getElementById('stat-error').textContent = error;
            document.getElementById('stat-avg').textContent = avgTime + 'ms';
        }

        function clearAllResults() {
            document.querySelectorAll('.result').forEach(r => {
                r.classList.remove('show');
                r.innerHTML = '';
            });
            testResults = {};
            updateStats();
        }

        function exportResults() {
            const report = {
                timestamp: new Date().toISOString(),
                results: testResults,
                summary: {
                    total: Object.keys(testResults).length,
                    success: Object.values(testResults).filter(r => r.status === 'success').length,
                    error: Object.values(testResults).filter(r => r.status === 'error').length
                }
            };

            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worker-debug-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 초기화
        window.addEventListener('load', initUI);
    </script>
</body>
</html>
