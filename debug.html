<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestFlow Worker Endpoint Monitor</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --bg4: #21262d;
      --border: #30363d;
      --muted: #484f58;
      --text-muted: #8b949e;
      --text: #c9d1d9;
      --text-bright: #e6edf3;
      --blue: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    h1 {
      color: var(--blue);
      margin-bottom: 30px;
      font-size: 20px;
    }

    .control-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--bg4);
      color: var(--text);
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    button:hover {
      background: var(--border);
    }

    button.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .summary-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 5px;
      text-align: center;
    }

    .summary-item .label {
      color: var(--text-muted);
      font-size: 11px;
    }

    .summary-item .value {
      color: var(--blue);
      font-size: 18px;
      font-weight: bold;
      margin-top: 4px;
    }

    .endpoint-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
      margin-bottom: 30px;
    }

    .endpoint-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .endpoint-header {
      background: var(--bg3);
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .endpoint-title {
      font-weight: bold;
      color: var(--text-bright);
      font-size: 13px;
      flex: 1;
      word-break: break-all;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-dot.ok {
      background: var(--green);
    }

    .status-dot.fail {
      background: var(--red);
    }

    .status-dot.loading {
      background: var(--yellow);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .endpoint-body {
      padding: 10px;
    }

    .endpoint-input {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
    }

    .endpoint-input input {
      flex: 1;
      padding: 4px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
    }

    .endpoint-input button {
      padding: 4px 8px;
      font-size: 11px;
    }

    .endpoint-result {
      margin-top: 8px;
      padding: 8px;
      background: var(--bg);
      border-radius: 3px;
      border: 1px solid var(--border);
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
    }

    .result-ok {
      color: var(--green);
    }

    .result-fail {
      color: var(--red);
    }

    .result-info {
      color: var(--blue);
    }

    .ms-badge {
      color: var(--yellow);
      font-size: 10px;
      font-weight: bold;
    }

    .category-title {
      color: var(--blue);
      font-size: 14px;
      font-weight: bold;
      margin-top: 30px;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    .log-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 15px;
      margin-top: 30px;
    }

    .log-section h2 {
      color: var(--text-bright);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .log-area {
      background: var(--bg);
      padding: 10px;
      border-radius: 3px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.4;
    }

    .log-line {
      padding: 2px 0;
      border-bottom: 1px solid var(--bg3);
    }

    .log-ok { color: var(--green); }
    .log-fail { color: var(--red); }
    .log-info { color: var(--blue); }
    .log-warn { color: var(--yellow); }
  </style>
</head>
<body>

<div class="container">
  <h1>🔍 InvestFlow Worker Endpoint Monitor</h1>

  <div class="control-bar">
    <button onclick="testAllEndpoints()">🚀 모든 엔드포인트 테스트</button>
    <button onclick="clearLogs()">🗑 로그 지우기</button>
    <button id="autoBtn" onclick="toggleAuto()">자동갱신 OFF</button>
  </div>

  <div class="summary" id="summary">
    <div class="summary-item">
      <div class="label">총 엔드포인트</div>
      <div class="value" id="totalCount">-</div>
    </div>
    <div class="summary-item">
      <div class="label">성공</div>
      <div class="value" id="successCount" style="color: var(--green);">-</div>
    </div>
    <div class="summary-item">
      <div class="label">실패</div>
      <div class="value" id="failCount" style="color: var(--red);">-</div>
    </div>
    <div class="summary-item">
      <div class="label">평균 응답시간</div>
      <div class="value" id="avgTime">-</div>
    </div>
  </div>

  <div id="endpointContainer"></div>

  <div class="log-section">
    <h2>📋 로그</h2>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://fmp-proxy.aiinvestflow.workers.dev';

const ENDPOINTS = {
  '시장 데이터': [
    { path: '/market', params: null, desc: '모든 시장 데이터 + 12개 경제지표' },
    { path: '/top7', params: null, desc: '시총 상위 7개 (정확한 순위)' },
    { path: '/feargreed', params: null, desc: '공포탐욕 지수' },
  ],
  '📊 경제지표 검증 (신규)': [
    { path: '/market-indicators', params: null, desc: '12개 경제지표 전체 검증 (mfg_pmi, svc_pmi, retail 포함)' },
  ],
  '개별 종목 분석': [
    { path: '/stock', params: 'symbol=AAPL', desc: '종목 분석 (symbol 필수)' },
    { path: '/alpha', params: 'symbol=AAPL', desc: 'Alpha 분석 (symbol 필수)' },
    { path: '/alpha/discovery', params: null, desc: 'Alpha 발굴 엔진' },
    { path: '/earnings', params: 'symbol=AAPL', desc: '실적 발표 (symbol 필수)' },
  ],
  '펀더멘탈 데이터': [
    { path: '/fundamentals/earnings', params: 'symbol=AAPL', desc: '실적 (symbol 필수)' },
    { path: '/fundamentals/growth', params: 'symbol=AAPL', desc: '성장률 (symbol 필수)' },
    { path: '/fundamentals/income', params: 'symbol=AAPL', desc: '손익계산서 (symbol 필수)' },
    { path: '/fundamentals/balance', params: 'symbol=AAPL', desc: '재무상태표 (symbol 필수)' },
    { path: '/fundamentals/cashflow', params: 'symbol=AAPL', desc: '현금흐름표 (symbol 필수)' },
    { path: '/fundamentals/ratios', params: 'symbol=AAPL', desc: '재무비율 (symbol 필수)' },
    { path: '/fundamentals/profile', params: 'symbol=AAPL', desc: '회사정보 (symbol 필수)' },
    { path: '/fundamentals/shares', params: 'symbol=AAPL', desc: '주식정보 (symbol 필수)' },
  ],
  '시장 분석': [
    { path: '/analysis/institutional-score', params: null, desc: '기관투자자 점수' },
    { path: '/analysis/market-regime', params: null, desc: '시장 체제' },
    { path: '/analysis/liquidity-pulse', params: null, desc: '유동성 맥박' },
    { path: '/analysis/yield-curve-monitor', params: null, desc: '수익률 곡선' },
    { path: '/analysis/inflation-pressure', params: null, desc: '인플레이션 압력' },
    { path: '/analysis/credit-stress', params: null, desc: '신용 스트레스' },
    { path: '/analysis/market-breadth', params: null, desc: '시장 광범위' },
    { path: '/analysis/volatility-regime', params: null, desc: '변동성 체제' },
    { path: '/analysis/sector-rotation', params: null, desc: '섹터 회전' },
    { path: '/analysis/dollar-liquidity', params: null, desc: '달러 유동성' },
    { path: '/analysis/crypto-sentiment', params: null, desc: '암호화폐 심리' },
    { path: '/analysis/smart-money', params: null, desc: '스마트머니' },
    { path: '/analysis/stock-ranking', params: null, desc: '종목 순위' },
    { path: '/analysis/market-heatmap', params: null, desc: '시장 히트맵' },
    { path: '/analysis/real-rate-monitor', params: null, desc: '실질금리 모니터' },
    { path: '/analysis/fed-policy-impact', params: null, desc: '연준 정책 영향' },
    { path: '/analysis/labor-market-health', params: null, desc: '노동시장 건강도' },
    { path: '/analysis/macro-momentum', params: null, desc: '매크로 모멘텀' },
  ]
};

let logs = [];
let results = {};
let autoTest = false;

function addLog(msg, type = 'info') {
  const time = new Date().toLocaleTimeString('ko-KR');
  logs.push({ time, msg, type });
  renderLogs();
}

function renderLogs() {
  const logArea = document.getElementById('logArea');
  logArea.innerHTML = logs.slice(-50).reverse().map(l =>
    `<div class="log-line log-${l.type}">[${l.time}] ${l.msg}</div>`
  ).join('');
  logArea.scrollTop = 0;
}

function clearLogs() {
  logs = [];
  renderLogs();
}

function renderEndpoints() {
  const container = document.getElementById('endpointContainer');
  let html = '';

  Object.entries(ENDPOINTS).forEach(([category, endpoints]) => {
    html += `<div class="category-title">📌 ${category}</div>`;
    html += '<div class="endpoint-grid">';

    endpoints.forEach((ep, idx) => {
      const id = `ep-${category}-${idx}`;
      const hasParams = ep.params !== null;
      html += `
        <div class="endpoint-card">
          <div class="endpoint-header">
            <div class="endpoint-title">${ep.path}</div>
            <div class="status-dot" id="${id}-dot"></div>
          </div>
          <div class="endpoint-body">
            <div style="color: var(--text-muted); font-size: 11px; margin-bottom: 8px;">${ep.desc}</div>
            ${hasParams ? `
              <div class="endpoint-input">
                <input type="text" id="${id}-input" value="${ep.params}" placeholder="params">
                <button onclick="testEndpoint('${ep.path}', '${id}')">테스트</button>
              </div>
            ` : `
              <button style="width: 100%;" onclick="testEndpoint('${ep.path}', '${id}')">테스트</button>
            `}
            <div class="endpoint-result" id="${id}-result">대기중...</div>
          </div>
        </div>
      `;
    });

    html += '</div>';
  });

  container.innerHTML = html;
  updateSummary();
}

async function testEndpoint(path, id) {
  // 경제지표 검증 특수 처리
  if (path === '/market-indicators') {
    return testEconomicIndicators();
  }

  const dotEl = document.getElementById(`${id}-dot`);
  const resultEl = document.getElementById(`${id}-result`);
  const inputEl = document.getElementById(`${id}-input`);

  const params = inputEl ? inputEl.value.trim() : null;
  const url = params ? `${WORKER_URL}${path}?${params}` : `${WORKER_URL}${path}`;

  dotEl.className = 'status-dot loading';
  resultEl.innerHTML = '⏳ 호출 중...';

  const t0 = Date.now();

  try {
    const res = await fetch(url);
    const ms = Date.now() - t0;
    const data = await res.json();

    results[path] = { ok: res.ok, ms, data };

    if (res.ok) {
      dotEl.className = 'status-dot ok';
      const keys = Object.keys(data).length;
      resultEl.innerHTML = `<span class="result-ok">✅ 성공</span> <span class="ms-badge">${ms}ms</span><br/>필드: ${keys}개`;
      addLog(`✅ ${path}: ${ms}ms (필드: ${keys})`, 'ok');
    } else {
      dotEl.className = 'status-dot fail';
      resultEl.innerHTML = `<span class="result-fail">❌ HTTP ${res.status}</span>`;
      addLog(`❌ ${path}: HTTP ${res.status}`, 'fail');
    }
  } catch (e) {
    dotEl.className = 'status-dot fail';
    resultEl.innerHTML = `<span class="result-fail">❌ ${e.message}</span>`;
    addLog(`❌ ${path}: ${e.message}`, 'fail');
  }

  updateSummary();
}

// 경제지표 상세 검증
async function testEconomicIndicators() {
  addLog('🔍 경제지표 검증 시작...', 'info');

  try {
    const t0 = Date.now();
    const res = await fetch(`${WORKER_URL}/market`);
    const ms = Date.now() - t0;
    const data = await res.json();

    if (!res.ok) {
      addLog(`❌ /market 호출 실패: HTTP ${res.status}`, 'fail');
      return;
    }

    const indicators = data.ECONOMIC_INDICATORS;
    if (!indicators) {
      addLog(`❌ ECONOMIC_INDICATORS 필드 없음`, 'fail');
      return;
    }

    // 12개 지표 검증
    const requiredIndicators = ['fedfunds', 'cpi', 'core_cpi', 'core_pce', 'payems', 'unrate', 'dgs10', 'spread', 'umcsent', 'mfg_pmi', 'svc_pmi', 'retail'];
    const checkResults = {};

    requiredIndicators.forEach(ind => {
      const exists = ind in indicators;
      const hasData = exists && indicators[ind] && typeof indicators[ind] === 'object';
      const hasDates = hasData && Array.isArray(indicators[ind].dates) && indicators[ind].dates.length > 0;
      const hasValues = hasData && Array.isArray(indicators[ind].values) && indicators[ind].values.length > 0;
      const hasCurrent = hasData && indicators[ind].current !== null && indicators[ind].current !== undefined;

      checkResults[ind] = { exists, hasData, hasDates, hasValues, hasCurrent };

      const status = exists && hasData && hasDates && hasValues ? '✅' : '⚠️';
      addLog(`${status} ${ind}: ${indicators[ind]?.label || '-'} (dates: ${hasDates ? '✓' : '✗'}, values: ${hasValues ? '✓' : '✗'}, current: ${hasCurrent ? '✓' : '✗'})`, hasData ? 'ok' : 'fail');
    });

    // 특별히 신규 3개 지표 강조
    addLog('', 'info');
    addLog('🆕 신규 경제지표 (3개):', 'info');
    ['mfg_pmi', 'svc_pmi', 'retail'].forEach(ind => {
      const result = checkResults[ind];
      if (result.exists && result.hasData && result.hasDates && result.hasValues) {
        addLog(`✅ ${ind}: ${indicators[ind].label} - 완벽하게 로드됨`, 'ok');
      } else {
        addLog(`❌ ${ind}: 데이터 불완전`, 'fail');
      }
    });

    addLog(``, 'info');
    addLog(`✅ 경제지표 검증 완료 (${ms}ms) - 12개 지표 모두 확인됨`, 'ok');

  } catch (e) {
    addLog(`❌ 경제지표 검증 실패: ${e.message}`, 'fail');
  }

  updateSummary();
}

async function testAllEndpoints() {
  addLog('═══ 모든 엔드포인트 테스트 시작 ═══', 'info');

  let count = 0;
  for (const category of Object.values(ENDPOINTS)) {
    for (const ep of category) {
      const id = `ep-${count}`;
      // ID 다시 구성
      const categoryKey = Object.keys(ENDPOINTS).find(k => ENDPOINTS[k].includes(ep));
      const idx = ENDPOINTS[categoryKey].indexOf(ep);
      const realId = `ep-${categoryKey}-${idx}`;

      await testEndpoint(ep.path, realId);
      await new Promise(r => setTimeout(r, 200)); // 요청 간격
      count++;
    }
  }

  addLog('═══ 테스트 완료 ═══', 'info');
}

function updateSummary() {
  const ok = Object.values(results).filter(r => r.ok).length;
  const fail = Object.values(results).filter(r => !r.ok).length;
  const total = Object.keys(ENDPOINTS).reduce((sum, cat) => sum + ENDPOINTS[cat].length, 0);
  const times = Object.values(results).map(r => r.ms).filter(m => m);
  const avg = times.length > 0 ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : 0;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('successCount').textContent = ok;
  document.getElementById('failCount').textContent = fail;
  document.getElementById('avgTime').textContent = avg + 'ms';
}

function toggleAuto() {
  autoTest = !autoTest;
  const btn = document.getElementById('autoBtn');
  if (autoTest) {
    btn.classList.add('active');
    btn.textContent = '자동갱신 ON';
    const interval = setInterval(() => {
      if (!autoTest) clearInterval(interval);
      testAllEndpoints();
    }, 300000); // 5분
  } else {
    btn.classList.remove('active');
    btn.textContent = '자동갱신 OFF';
  }
}

// 초기화
window.addEventListener('load', () => {
  renderEndpoints();
  addLog('페이지 로드 완료. 테스트를 시작하세요.', 'info');
});
</script>

</body>
</html>
