name = "fmp-proxy"
main = "worker.js"
workers_dev = true
account_id = "05ba87763e81af6206c77d3bd3d79d84"
compatibility_date = "2025-09-27"

# ── Cron: 15분마다 metricz 1 chunk 갱신 (25 chunks → ~6시간 전체 사이클) ──
# 각 chunk = 20종목 × 2 endpoints = 40 subrequests (Workers 한도 이내)
[triggers]
crons = ["*/15 * * * *"]

# ── KV: metricz 종목 데이터 캐시 ──
# 아래 id는 `wrangler kv:namespace create METRICZ_KV` 실행 후 교체
[[kv_namespaces]]
binding = "METRICZ_KV"
id = "7e77d847aac94cf083ea892fc7750353"
preview_id = "7e77d847aac94cf083ea892fc7750353"

[vars]
FMP_API_KEY = "JUTpjU8MvT3nTFv5CkJbVANjWntvcEiK"
