<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 위젯 모니터 - 완전한 추적 대시보드</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d29922;
            --orange: #fb8500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1900px; margin: 0 auto; }

        h1 {
            color: var(--blue);
            margin-bottom: 5px;
            font-size: 22px;
        }

        .subtitle {
            color: var(--yellow);
            margin-bottom: 20px;
            font-size: 11px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: var(--border);
            color: white;
        }

        button.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-item {
            padding: 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 5px;
            text-align: center;
        }

        .status-label {
            font-size: 10px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--blue);
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .page-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .page-header {
            background: var(--bg3);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            color: var(--blue);
            font-size: 13px;
        }

        .page-content {
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .widget-item {
            padding: 12px;
            margin-bottom: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .widget-item:hover {
            background: var(--bg3);
            border-color: var(--blue);
            transform: translateX(4px);
        }

        .widget-name {
            font-weight: bold;
            color: var(--blue);
            margin-bottom: 5px;
        }

        .widget-status {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            font-size: 10px;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: bold;
        }

        .status-completed { background: var(--green); color: white; }
        .status-loading { background: var(--yellow); color: black; }
        .status-error { background: var(--red); color: white; }

        .detail-panel {
            display: none;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 20px;
            overflow: hidden;
            max-height: 800px;
            overflow-y: auto;
        }

        .detail-panel.active { display: block; }

        .detail-header {
            background: var(--bg3);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: var(--blue);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .detail-content {
            padding: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            color: var(--green);
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .data-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 15px;
            padding: 8px;
            margin-bottom: 5px;
            background: var(--bg);
            border-radius: 3px;
        }

        .data-label {
            color: var(--yellow);
            font-weight: bold;
        }

        .data-value {
            color: var(--text);
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .json-block {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid var(--blue);
            overflow-x: auto;
            font-size: 10px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .timestamp {
            color: var(--text);
            font-size: 10px;
            text-align: right;
            margin-top: 10px;
            color: var(--yellow);
        }

        .logic-steps {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid var(--yellow);
            line-height: 1.8;
        }

        .logic-step {
            margin-bottom: 8px;
        }

        .loading-spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🚀 AI 위젯 모니터 - 완전한 추적 대시보드</h1>
                <div class="subtitle">AI분석 1, 2, 3의 모든 위젯을 실시간으로 모니터링하고 상세 데이터 확인</div>
            </div>
            <div class="controls">
                <button onclick="refreshData()">🔄 새로고침</button>
                <button onclick="autoRefreshToggle()">⏰ 자동갱신</button>
                <button onclick="exportData()">💾 내보내기</button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">총 위젯</div>
                <div class="status-value" id="total-widgets">29</div>
            </div>
            <div class="status-item">
                <div class="status-label">로드 완료</div>
                <div class="status-value" style="color: var(--green);" id="completed-widgets">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">로딩 중</div>
                <div class="status-value" style="color: var(--yellow);" id="loading-widgets">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">에러</div>
                <div class="status-value" style="color: var(--red);" id="error-widgets">0</div>
            </div>
        </div>

        <div class="pages-grid" id="pages-container"></div>

        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <div id="detail-title"></div>
                <button class="close-btn" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-content" id="detail-content"></div>
        </div>
    </div>

    <script>
        let autoRefreshEnabled = false;
        let autoRefreshTimer = null;
        let allWidgets = [];

        // 데이터 로드 및 렌더링
        async function refreshData() {
            console.log('📊 데이터 새로고침 시작...');
            allWidgets = [];

            // AI분석 1 로드
            loadAnalysis1Data();

            // AI분석 2 로드
            await loadAnalysis2Data();

            // AI분석 3 로드
            loadAnalysis3Data();

            updateUI();
        }

        function loadAnalysis1Data() {
            const cached = localStorage.getItem('widgetDataCache_analysis1');
            if (cached) {
                try {
                    const data = JSON.parse(cached);
                    Object.values(data).forEach(widget => {
                        allWidgets.push(widget);
                    });
                    console.log(`✅ AI분석 1: ${Object.keys(data).length}개 위젯 로드`);
                } catch (e) {
                    console.error('❌ AI분석 1 로드 실패:', e);
                }
            }
        }

        async function loadAnalysis2Data() {
            const widgets = [];
            const apiBase = 'https://fmp-proxy.aiinvestflow.workers.dev';

            try {
                // Alpha Discovery
                const res1 = await fetch(apiBase + '/alpha/discovery').catch(() => null);
                const data1 = res1?.ok ? await res1.json() : null;
                widgets.push({
                    id: 'analysis2-1',
                    page: 'AI분석 2',
                    name: '🔍 Alpha Discovery Scanner',
                    endpoint: '/alpha/discovery',
                    logic: '📊 단계별 계산:\n1️⃣ 500개 종목 로드\n2️⃣ 9개 지표 계산\n3️⃣ Alpha Score 생성\n4️⃣ 상위 20개 선택',
                    meaning: '기하급수적 성장 가능성이 높은 종목 발굴',
                    status: data1 ? 'completed' : 'error',
                    metrics: data1 ? {
                        '분석 종목': data1.analyzed || 0,
                        '유니버스': data1.universe_size || 0,
                        '발견 종목': data1.top_20?.length || 0,
                        '최고 점수': data1.top_20?.[0]?.explosiveScore?.toFixed(2) || '-'
                    } : {},
                    data: data1,
                    timestamp: new Date().toISOString()
                });

                // Market Regime
                const res2 = await fetch(apiBase + '/analysis/market-regime').catch(() => null);
                const data2 = res2?.ok ? await res2.json() : null;
                widgets.push({
                    id: 'analysis2-2',
                    page: 'AI분석 2',
                    name: '🚪 Market Entry Gate',
                    endpoint: '/analysis/market-regime',
                    logic: '📊 단계별 계산:\n1️⃣ 시장 레짐 분석\n2️⃣ Risk-On/Neutral/Risk-Off 판정\n3️⃣ 신뢰도 계산\n4️⃣ 진입신호 생성',
                    meaning: '강세장/약세장 구분하여 포트폴리오 배치',
                    status: data2 ? 'completed' : 'error',
                    metrics: data2 ? {
                        '시장상태': data2.regime || '-',
                        '신뢰도': data2.confidence ? `${(data2.confidence*100).toFixed(0)}%` : '-',
                        'VIX': data2.vix || '-'
                    } : {},
                    data: data2,
                    timestamp: new Date().toISOString()
                });

                // Sector Rotation
                const res3 = await fetch(apiBase + '/market').catch(() => null);
                const data3 = res3?.ok ? await res3.json() : null;
                const sectors = data3?.SECTORS || {};
                const bestSector = Object.entries(sectors).sort((a, b) => (b[1]?.changePercentage || 0) - (a[1]?.changePercentage || 0))[0];

                widgets.push({
                    id: 'analysis2-3',
                    page: 'AI분석 2',
                    name: '🔄 Sector Rotation',
                    endpoint: '/market',
                    logic: '📊 단계별 계산:\n1️⃣ 11개 섹터 추출\n2️⃣ 수익률 정렬\n3️⃣ 로테이션 신호\n4️⃣ 최강/최약 선정',
                    meaning: '경기사이클에 따라 초과 수익 가능한 섹터로 전환',
                    status: data3?.SECTORS ? 'completed' : 'error',
                    metrics: data3?.SECTORS ? {
                        '활성섹터': Object.keys(sectors).length,
                        '최강섹터': bestSector?.[0] || '-',
                        '수익률': bestSector?.[1]?.changePercentage?.toFixed(2) + '%' || '-'
                    } : {},
                    data: data3?.SECTORS,
                    timestamp: new Date().toISOString()
                });

                console.log(`✅ AI분석 2: ${widgets.length}개 위젯 로드`);
            } catch (e) {
                console.error('❌ AI분석 2 로드 실패:', e);
            }

            allWidgets = allWidgets.concat(widgets);
        }

        function loadAnalysis3Data() {
            const cached = localStorage.getItem('widgetDataCache_analysis3');
            if (cached) {
                try {
                    const data = JSON.parse(cached);
                    Object.values(data).forEach(widget => {
                        allWidgets.push(widget);
                    });
                    console.log(`✅ AI분석 3: ${Object.keys(data).length}개 위젯 로드`);
                } catch (e) {
                    console.error('❌ AI분석 3 로드 실패:', e);
                }
            }
        }

        function updateUI() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            const pages = {
                'AI분석 1': allWidgets.filter(w => w.page === 'AI분석 1'),
                'AI분석 2': allWidgets.filter(w => w.page === 'AI분석 2'),
                'AI분석 3': allWidgets.filter(w => w.page === 'AI분석 3')
            };

            let totalCount = 0;
            let completedCount = 0;
            let loadingCount = 0;
            let errorCount = 0;

            Object.entries(pages).forEach(([pageName, widgets]) => {
                if (widgets.length === 0) return;

                const card = document.createElement('div');
                card.className = 'page-card';

                const header = document.createElement('div');
                header.className = 'page-header';
                header.textContent = `${pageName} (${widgets.length}개)`;
                card.appendChild(header);

                const content = document.createElement('div');
                content.className = 'page-content';

                widgets.forEach(widget => {
                    totalCount++;
                    const status = widget.status || 'loading';

                    if (status === 'completed') completedCount++;
                    else if (status === 'loading') loadingCount++;
                    else if (status === 'error') errorCount++;

                    const item = document.createElement('div');
                    item.className = 'widget-item';
                    item.innerHTML = `
                        <div class="widget-name">${widget.name}</div>
                        <div class="widget-status">
                            <span class="status-badge status-${status}">
                                ${status === 'completed' ? '✓ 완료' : status === 'error' ? '✗ 에러' : '⏳ 로딩'}
                            </span>
                        </div>
                    `;
                    item.onclick = () => showDetail(widget);
                    content.appendChild(item);
                });

                card.appendChild(content);
                container.appendChild(card);
            });

            document.getElementById('total-widgets').textContent = totalCount;
            document.getElementById('completed-widgets').textContent = completedCount;
            document.getElementById('loading-widgets').textContent = loadingCount;
            document.getElementById('error-widgets').textContent = errorCount;
        }

        function showDetail(widget) {
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');

            title.textContent = widget.name;

            let html = `
                <div class="section">
                    <div class="section-title">📋 기본 정보</div>
                    <div class="data-row">
                        <div class="data-label">위젯 ID</div>
                        <div class="data-value">${widget.id}</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">페이지</div>
                        <div class="data-value">${widget.page}</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">상태</div>
                        <div class="data-value">
                            <span class="status-badge status-${widget.status || 'loading'}">
                                ${widget.status === 'completed' ? '✓ 완료' : widget.status === 'error' ? '✗ 에러' : '⏳ 로딩'}
                            </span>
                        </div>
                    </div>
                    ${widget.endpoint ? `
                        <div class="data-row">
                            <div class="data-label">엔드포인트</div>
                            <div class="data-value"><code>${widget.endpoint}</code></div>
                        </div>
                    ` : ''}
                </div>
            `;

            if (widget.logic) {
                if (widget.logic.includes('1️⃣')) {
                    html += `
                        <div class="section">
                            <div class="section-title">🔍 단계별 계산 과정</div>
                            <div class="logic-steps">
                                ${widget.logic.split('\n').map(line => `<div class="logic-step">${line}</div>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="section">
                            <div class="section-title">⚙️ 계산 로직</div>
                            <div class="logic-steps">${widget.logic}</div>
                        </div>
                    `;
                }
            }

            if (widget.meaning) {
                html += `
                    <div class="section">
                        <div class="section-title">💡 의미</div>
                        <div style="background: var(--bg); padding: 12px; border-radius: 4px;">
                            ${widget.meaning}
                        </div>
                    </div>
                `;
            }

            if (widget.metrics && Object.keys(widget.metrics).length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">⏱️ 성능 메트릭</div>
                `;
                Object.entries(widget.metrics).forEach(([key, value]) => {
                    html += `
                        <div class="data-row">
                            <div class="data-label">${key}</div>
                            <div class="data-value"><strong>${value}</strong></div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (widget.data) {
                const dataStr = JSON.stringify(widget.data, null, 2);
                const preview = dataStr.length > 1000 ? dataStr.substring(0, 1000) + '\n... (생략)' : dataStr;
                html += `
                    <div class="section">
                        <div class="section-title">📊 API 응답 데이터</div>
                        <div style="font-size: 10px; color: var(--yellow); margin-bottom: 8px;">
                            크기: ${dataStr.length} bytes
                        </div>
                        <div class="json-block">${preview}</div>
                    </div>
                `;
            }

            html += `
                <div class="timestamp">
                    ⏰ ${new Date(widget.timestamp).toLocaleString('ko-KR')}
                </div>
            `;

            content.innerHTML = html;
            panel.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('active');
        }

        function autoRefreshToggle() {
            autoRefreshEnabled = !autoRefreshEnabled;
            if (autoRefreshEnabled) {
                autoRefreshTimer = setInterval(() => refreshData(), 30000);
                console.log('✅ 자동 갱신 활성화 (30초)');
            } else {
                clearInterval(autoRefreshTimer);
                console.log('⏹️ 자동 갱신 비활성화');
            }
        }

        function exportData() {
            const report = {
                timestamp: new Date().toISOString(),
                totalWidgets: allWidgets.length,
                widgets: allWidgets
            };
            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `widget-report-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 초기 로드
        window.addEventListener('load', () => {
            console.log('🚀 AI Widget Monitor 초기화...');
            refreshData();
            // 1초마다 확인 (localStorage 업데이트 감지)
            setInterval(refreshData, 3000);
        });
    </script>
</body>
</html>
