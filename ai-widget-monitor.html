<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 위젯 모니터 - 실시간 분석</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d29922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            padding: 20px;
        }

        .container {
            max-width: 2000px;
            margin: 0 auto;
        }

        h1 {
            color: var(--blue);
            margin-bottom: 10px;
            font-size: 22px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--border);
            color: white;
        }

        button.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-item {
            padding: 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 5px;
            text-align: center;
        }

        .status-label {
            font-size: 10px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 14px;
            font-weight: bold;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .page-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .page-header {
            background: var(--bg3);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            color: var(--blue);
        }

        .page-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .widget-item {
            padding: 12px;
            margin-bottom: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .widget-item:hover {
            background: var(--bg3);
            border-color: var(--blue);
        }

        .widget-name {
            font-weight: bold;
            color: var(--blue);
            margin-bottom: 5px;
        }

        .widget-status {
            font-size: 10px;
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
        }

        .status-loading {
            background: var(--yellow);
            color: black;
        }

        .status-success {
            background: var(--green);
            color: white;
        }

        .status-error {
            background: var(--red);
            color: white;
        }

        .detail-panel {
            display: none;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 20px;
            overflow: hidden;
        }

        .detail-panel.active {
            display: block;
        }

        .detail-header {
            background: var(--bg3);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-title {
            font-weight: bold;
            color: var(--blue);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
        }

        .detail-content {
            padding: 20px;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            color: var(--green);
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .data-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 15px;
            padding: 8px;
            margin-bottom: 5px;
            background: var(--bg);
            border-radius: 3px;
        }

        .data-label {
            color: var(--yellow);
            font-weight: bold;
        }

        .data-value {
            color: var(--text);
            word-break: break-all;
        }

        .json-block {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid var(--blue);
            overflow-x: auto;
            font-size: 10px;
            margin-top: 10px;
        }

        .timestamp {
            color: var(--text);
            font-size: 10px;
            text-align: right;
            margin-top: 10px;
        }

        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10000;
            background: rgba(0,0,0,0.9);
        }

        .iframe-container.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iframe-wrapper {
            width: 90%;
            height: 90%;
            border: 2px solid var(--blue);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .iframe-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10001;
            font-weight: bold;
        }

        #ai-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🚀 AI 위젯 모니터</h1>
                <div style="color: var(--text); font-size: 11px;">AI분석 1, 2, 3의 모든 위젯 결과를 실시간으로 추적합니다</div>
            </div>
            <div class="controls">
                <button onclick="loadAllAnalysisPages()">🔄 새로고침</button>
                <button onclick="clearAllData()">🗑️ 데이터 초기화</button>
                <button onclick="exportReport()">📊 리포트 내보내기</button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">총 위젯</div>
                <div class="status-value" id="total-widgets">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">완료됨</div>
                <div class="status-value" style="color: var(--green);" id="completed-widgets">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">로딩 중</div>
                <div class="status-value" style="color: var(--yellow);" id="loading-widgets">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">에러</div>
                <div class="status-value" style="color: var(--red);" id="error-widgets">0</div>
            </div>
        </div>

        <div class="pages-grid" id="pages-container"></div>

        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <div class="detail-title" id="detail-title"></div>
                <button class="close-btn" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-content" id="detail-content"></div>
        </div>
    </div>

    <div class="iframe-container" id="iframe-container">
        <div class="iframe-wrapper">
            <button class="iframe-close" onclick="closeIframe()">닫기</button>
            <iframe id="ai-iframe"></iframe>
        </div>
    </div>

    <script>
        const API_BASE = 'https://fmp-proxy.aiinvestflow.workers.dev';
        let widgetDatabase = {
            'ai-analysis-1': [],
            'ai-analysis-2': [],
            'ai-analysis-3': []
        };

        async function loadAllAnalysisPages() {
            console.log('📊 AI분석 페이지 데이터 로드 중...');

            try {
                // localStorage에서 각 페이지의 캐시된 데이터 로드
                const cache1 = localStorage.getItem('widgetDataCache_analysis1');
                if (cache1) {
                    const widgets = Object.values(JSON.parse(cache1));
                    widgetDatabase['ai-analysis-1'] = widgets;
                    console.log(`✅ AI분석 1: ${widgets.length}개 위젯 로드됨`);
                }

                const cache3 = localStorage.getItem('widgetDataCache_analysis3');
                if (cache3) {
                    const widgets = Object.values(JSON.parse(cache3));
                    widgetDatabase['ai-analysis-3'] = widgets;
                    console.log(`✅ AI분석 3: ${widgets.length}개 위젯 로드됨`);
                }

                // AI분석 2는 별도 처리
                loadAnalysis2Data();

                updateUI();
            } catch (e) {
                console.error('❌ 페이지 로드 실패:', e);
                updateUI();
            }
        }

        function loadAnalysis2Data() {
            // AI분석 2는 별도의 구조이므로, worker API에서 직접 데이터 로드
            console.log('📍 AI분석 2 위젯 데이터 로드 중...');
            widgetDatabase['ai-analysis-2'] = [
                {
                    id: 'Analysis-2-1',
                    page: 'AI분석 2',
                    name: 'Alpha Discovery Scanner',
                    icon: '🔍',
                    endpoint: '/alpha/discovery',
                    logic: '500개 종목을 9개 지표로 스캔하여 Alpha Score 상위 20개 반환',
                    meaning: '숨겨진 투자 기회를 자동으로 찾아내는 AI 스캐너',
                    status: 'pending',
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-2',
                    page: 'AI분석 2',
                    name: 'Breakout Radar',
                    icon: '📡',
                    logic: '가격 돌파(breakout) 신호 감지',
                    meaning: '주가가 중요한 저항선을 돌파할 때 신호',
                    status: 'pending',
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-3',
                    page: 'AI분석 2',
                    name: 'Market Entry Gate',
                    icon: '🚪',
                    logic: '시장 진입 최적 타이밍 판단',
                    meaning: '강세/약세 구간 구분으로 진입점 결정',
                    status: 'pending',
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-4',
                    page: 'AI분석 2',
                    name: 'Sector Rotation',
                    icon: '🔄',
                    endpoint: '/sectors',
                    logic: '섹터 간 로테이션 패턴 분석',
                    meaning: '경기 사이클에 따른 섹터 전환 신호',
                    status: 'pending',
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-5',
                    page: 'AI분석 2',
                    name: 'Deep Dive Analysis',
                    icon: '🔎',
                    endpoint: '/alpha',
                    logic: '개별 종목의 9개 지표 상세 분석',
                    meaning: '종목별 강점과 약점을 수치화',
                    status: 'pending',
                    timestamp: new Date().toISOString()
                }
            ];
        }

        async function loadPageData(pageUrl, pageKey) {
            return new Promise((resolve) => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.onload = () => {
                    try {
                        // iframe에서 윈도우 객체 접근
                        const iframeWindow = iframe.contentWindow;

                        // 데이터 수집 (페이지별로 다른 방식)
                        if (pageKey === 'ai-analysis-1') {
                            collectAnalysis1Data(iframeWindow);
                        } else if (pageKey === 'ai-analysis-2') {
                            collectAnalysis2Data(iframeWindow);
                        } else if (pageKey === 'ai-analysis-3') {
                            collectAnalysis3Data(iframeWindow);
                        }
                    } catch (e) {
                        console.warn(`⚠️ ${pageKey} 데이터 수집 실패 (CORS):`, e);
                        // CORS 오류인 경우 localStorage에서 데이터 로드
                        loadFromLocalStorage(pageKey);
                    }

                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        resolve();
                    }, 500);
                };

                iframe.onerror = () => {
                    console.warn(`⚠️ ${pageKey} 로드 실패`);
                    loadFromLocalStorage(pageKey);
                    document.body.removeChild(iframe);
                    resolve();
                };

                iframe.src = pageUrl;
                document.body.appendChild(iframe);
            });
        }

        function collectAnalysis1Data(iframeWindow) {
            const widgets = [];

            // WIDGETS 배열에서 데이터 추출
            if (iframeWindow.WIDGETS) {
                iframeWindow.WIDGETS.forEach(widget => {
                    widgets.push({
                        id: `Analysis-1-${widget.id}`,
                        page: 'AI분석 1',
                        name: widget.title,
                        icon: widget.icon,
                        endpoint: widget.endpoint,
                        logic: widget.logic,
                        meaning: widget.meaning,
                        status: 'pending',
                        data: null,
                        timestamp: new Date().toISOString()
                    });
                });
            }

            widgetDatabase['ai-analysis-1'] = widgets;
        }

        function collectAnalysis2Data(iframeWindow) {
            const widgets = [
                {
                    id: 'Analysis-2-1',
                    page: 'AI분석 2',
                    name: 'Alpha Discovery Scanner',
                    icon: '🔍',
                    status: 'pending',
                    data: iframeWindow.alphaDiscoveryData || null,
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-2',
                    page: 'AI분석 2',
                    name: 'Breakout Radar',
                    icon: '📡',
                    status: 'pending',
                    data: iframeWindow.breakoutRadarData || null,
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-3',
                    page: 'AI분석 2',
                    name: 'Market Entry Gate',
                    icon: '🚪',
                    status: 'pending',
                    data: iframeWindow.marketEntryGateData || null,
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-4',
                    page: 'AI분석 2',
                    name: 'Sector Rotation Drill Down',
                    icon: '🔄',
                    status: 'pending',
                    data: iframeWindow.sectorRotationData || null,
                    timestamp: new Date().toISOString()
                },
                {
                    id: 'Analysis-2-5',
                    page: 'AI분석 2',
                    name: 'Single Stock Deep Dive',
                    icon: '🔎',
                    status: 'pending',
                    data: iframeWindow.singleStockData || null,
                    timestamp: new Date().toISOString()
                }
            ];

            widgetDatabase['ai-analysis-2'] = widgets;
        }

        function collectAnalysis3Data(iframeWindow) {
            const widgets = [];

            // AI분석 3의 위젯 데이터 수집
            if (iframeWindow.WIDGETS) {
                iframeWindow.WIDGETS.forEach((widget, idx) => {
                    widgets.push({
                        id: `Analysis-3-${idx + 1}`,
                        page: 'AI분석 3',
                        name: widget.title || `Widget ${idx + 1}`,
                        status: 'pending',
                        data: null,
                        timestamp: new Date().toISOString()
                    });
                });
            }

            widgetDatabase['ai-analysis-3'] = widgets;
        }

        function loadFromLocalStorage(pageKey) {
            // localStorage에서 데이터 로드 (각 페이지가 저장한 데이터)
            const stored = localStorage.getItem(`widgetData_${pageKey}`);
            if (stored) {
                widgetDatabase[pageKey] = JSON.parse(stored);
            }
        }

        function updateUI() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            let totalCount = 0;
            let completedCount = 0;
            let loadingCount = 0;
            let errorCount = 0;

            Object.entries(widgetDatabase).forEach(([pageKey, widgets]) => {
                const pageCard = document.createElement('div');
                pageCard.className = 'page-card';

                const pageTitle = pageKey === 'ai-analysis-1' ? 'AI분석 1'
                                : pageKey === 'ai-analysis-2' ? 'AI분석 2'
                                : 'AI분석 3';

                pageCard.innerHTML = `
                    <div class="page-header">
                        ${pageTitle} (${widgets.length}개 위젯)
                    </div>
                    <div class="page-content" id="widgets-${pageKey}"></div>
                `;

                const contentDiv = pageCard.querySelector(`#widgets-${pageKey}`);

                widgets.forEach(widget => {
                    totalCount++;
                    const status = widget.status || 'pending';

                    if (status === 'completed') completedCount++;
                    else if (status === 'loading') loadingCount++;
                    else if (status === 'error') errorCount++;

                    const widgetItem = document.createElement('div');
                    widgetItem.className = 'widget-item';
                    widgetItem.innerHTML = `
                        <div class="widget-name">${widget.icon} ${widget.name}</div>
                        <div class="widget-status">
                            <span class="status-badge status-${status || 'loading'}">
                                ${status === 'completed' ? '✓ 완료' : status === 'error' ? '✗ 에러' : '⏳ 대기'}
                            </span>
                        </div>
                    `;

                    widgetItem.onclick = () => showDetail(widget);
                    contentDiv.appendChild(widgetItem);
                });

                container.appendChild(pageCard);
            });

            // 상태 바 업데이트
            document.getElementById('total-widgets').textContent = totalCount;
            document.getElementById('completed-widgets').textContent = completedCount;
            document.getElementById('loading-widgets').textContent = loadingCount;
            document.getElementById('error-widgets').textContent = errorCount;
        }

        function showDetail(widget) {
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');

            title.textContent = `${widget.icon} ${widget.name}`;

            let html = '';

            // 기본 정보
            html += `
                <div class="section">
                    <div class="section-title">📋 기본 정보</div>
                    <div class="data-row">
                        <div class="data-label">위젯 ID</div>
                        <div class="data-value">${widget.id}</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">페이지</div>
                        <div class="data-value">${widget.page}</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">상태</div>
                        <div class="data-value">
                            <span class="status-badge status-${widget.status || 'loading'}">
                                ${widget.status === 'completed' ? '✓ 완료' : widget.status === 'error' ? '✗ 에러' : '⏳ 대기'}
                            </span>
                        </div>
                    </div>
                    ${widget.endpoint ? `
                        <div class="data-row">
                            <div class="data-label">API 엔드포인트</div>
                            <div class="data-value">${widget.endpoint}</div>
                        </div>
                    ` : ''}
                </div>
            `;

            // 계산 로직
            if (widget.logic) {
                html += `
                    <div class="section">
                        <div class="section-title">⚙️ 계산 로직</div>
                        <div style="background: var(--bg); padding: 12px; border-radius: 4px; border-left: 3px solid var(--yellow);">
                            ${widget.logic}
                        </div>
                    </div>
                `;
            }

            // 의미
            if (widget.meaning) {
                html += `
                    <div class="section">
                        <div class="section-title">💡 의미</div>
                        <div style="background: var(--bg); padding: 12px; border-radius: 4px; border-left: 3px solid var(--blue);">
                            ${widget.meaning}
                        </div>
                    </div>
                `;
            }

            // 사용 방법
            if (widget.usage) {
                html += `
                    <div class="section">
                        <div class="section-title">📌 사용 방법</div>
                        <div style="background: var(--bg); padding: 12px; border-radius: 4px; border-left: 3px solid var(--green);">
                            ${widget.usage}
                        </div>
                    </div>
                `;
            }

            // 데이터
            if (widget.data) {
                html += `
                    <div class="section">
                        <div class="section-title">📊 응답 데이터</div>
                        <div class="json-block">${JSON.stringify(widget.data, null, 2)}</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="section">
                        <div class="section-title">📊 응답 데이터</div>
                        <div style="color: var(--text); font-style: italic;">아직 데이터를 수집하지 못했습니다.</div>
                    </div>
                `;
            }

            html += `
                <div class="timestamp">마지막 업데이트: ${new Date(widget.timestamp).toLocaleString('ko-KR')}</div>
            `;

            content.innerHTML = html;
            panel.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('active');
        }

        function closeIframe() {
            document.getElementById('iframe-container').classList.remove('active');
        }

        function clearAllData() {
            if (confirm('모든 위젯 데이터를 초기화하시겠습니까?')) {
                widgetDatabase = {
                    'ai-analysis-1': [],
                    'ai-analysis-2': [],
                    'ai-analysis-3': []
                };
                updateUI();
                localStorage.clear();
            }
        }

        function exportReport() {
            const report = {
                timestamp: new Date().toISOString(),
                summary: {
                    totalWidgets: Object.values(widgetDatabase).flat().length,
                    pages: widgetDatabase
                }
            };

            const dataStr = JSON.stringify(report, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ai-widget-report-${new Date().toISOString().split('T')[0]}.json`;
