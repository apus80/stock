                    {data && data.status === "REJECTED" && (
                        <div className="error-box">❌ 필터 탈락 종목</div>
                    )}

                    {data && data.status !== "REJECTED" && data.detail && (
                        <>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                                <div className="metric-item" style={{ gridColumn: '1', textAlign: 'center', background: 'rgba(102,126,234,0.08)', borderRadius: '10px', padding: '16px' }}>
                                    <div className="metric-label">CSS Score</div>
                                    <div style={{ fontSize: '2em', fontWeight: '800', color: '#667eea' }}>{data.css != null ? data.css.toFixed(1) : "-"}</div>
                                    <div style={{ fontSize: '12px', color: '#718096' }}>{data.grade || "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">Technical</div>
                                    <div className="metric-value">{data.breakdown?.technical ?? "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">Smart Money</div>
                                    <div className="metric-value">{data.breakdown?.smartMoney ?? "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">Catalyst</div>
                                    <div className="metric-value">{data.breakdown?.catalyst ?? "-"}</div>
                                </div>
                            </div>

                            <div className="metrics-grid">
                                <div className="metric-item">
                                    <div className="metric-label">RSI</div>
                                    <div className="metric-value">{data.detail?.technical?.rsi?.toFixed(1) ?? "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">Volume Ratio</div>
                                    <div className="metric-value">{data.detail?.technical?.volumeRatio?.toFixed(2) ?? "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">ATR %</div>
                                    <div className="metric-value">{data.detail?.technical?.atr_pct?.toFixed(2) ?? "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">EPS Surprise</div>
                                    <div className="metric-value">{data.detail?.catalyst?.epsSurprise != null
                                        ? (data.detail.catalyst.epsSurprise * 100).toFixed(1) + "%"
                                        : "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">Revenue Growth</div>
                                    <div className="metric-value">{data.detail?.catalyst?.revGrowth != null
                                        ? (data.detail.catalyst.revGrowth * 100).toFixed(1) + "%"
                                        : "-"}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">FCF Yield</div>
                                    <div className="metric-value">{data.detail?.catalyst?.fcfYield != null
                                        ? (data.detail.catalyst.fcfYield * 100).toFixed(2) + "%"
                                        : "-"}</div>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            )
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
</body>
</html>
