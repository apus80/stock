<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI분석_2 - 개별 종목 발굴</title>

    <!-- React & Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --text-light: #ffffff;
            --radius-main: 15px;
            --radius-small: 8px;
            --shadow-main: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.3);
            --bull: #00d084;
            --bear: #ff6b6b;
            --neutral: #ffa500;
            --info: #4dabf7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', sans-serif;
            background: var(--light-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-size: 0.9em;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .header {
            background: var(--bg-gradient);
            color: white;
            padding: 40px 30px;
            margin-bottom: 30px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.05em;
            margin-bottom: 20px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .widget {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-main);
            transition: all 0.3s;
            border-left: 4px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .widget:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-deep);
        }

        .widget.featured {
            grid-column: span 2;
        }

        .widget.full {
            grid-column: 1 / -1;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .widget-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text-main);
            flex: 1;
        }

        .widget-refresh {
            background: var(--light-bg);
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .widget-refresh:hover {
            background: var(--primary);
            color: white;
        }

        .widget-subtitle {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .scanner-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .scanner-table th {
            background: var(--light-bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid #e2e8f0;
        }

        .scanner-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .scanner-table tbody tr:hover {
            background: var(--light-bg);
        }

        .stock-ticker {
            color: var(--primary);
            font-weight: 600;
        }

        .value-positive {
            color: var(--bull);
            font-weight: 600;
        }

        .value-negative {
            color: var(--bear);
            font-weight: 600;
        }

        .score-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .score-badge.score-strong {
            background: rgba(16, 185, 129, 0.2);
            color: var(--bull);
        }

        .score-badge.score-moderate {
            background: rgba(245, 158, 11, 0.2);
            color: var(--neutral);
        }

        .score-badge.score-weak {
            background: rgba(239, 68, 68, 0.2);
            color: var(--bear);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1em;
        }

        .explanation-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--light-bg);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .explanation-title {
            font-size: 1em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .explanation-section {
            font-size: 0.9em;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .explanation-section strong {
            color: var(--text-main);
        }

        .explanation-section br {
            line-height: 1.8;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }

            .widget.featured {
                grid-column: span 1;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 0 20px 30px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .widget {
                padding: 16px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .back-btn {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 0.8em;
            }

            .scanner-table {
                font-size: 0.8em;
            }

            .scanner-table th, .scanner-table td {
                padding: 8px;
            }
        }
            font-weight: 700;
            color: var(--text-main);
        }

        .widget-subtitle {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .btn-refresh {
            background: transparent;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            color: var(--primary);
            background: var(--bg-tertiary);
        }

        .btn-refresh.loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 16px;
            color: var(--danger);
            font-size: 13px;
            text-align: center;
        }

        .error-box button {
            margin-top: 12px;
            padding: 6px 12px;
            border: 1px solid var(--danger);
            background: transparent;
            color: var(--danger);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table thead {
            border-bottom: 1px solid var(--border);
        }

        table th {
            padding: 12px 8px;
            text-align: left;
            color: var(--text-light);
            font-weight: 600;
            background: var(--bg-tertiary);
        }

        table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        table tr:hover {
            background: var(--bg-tertiary);
            cursor: pointer;
        }

        .ticker {
            font-weight: 700;
            color: var(--primary);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .score-strong {
            background: rgba(239, 68, 68, 0.2);
            color: #ff6b6b;
        }

        .score-moderate {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .score-weak {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .value-positive {
            color: var(--success);
        }

        .value-negative {
            color: var(--danger);
        }

        .value-neutral {
            color: var(--text-light);
        }

        /* Gate Cards */
        .gate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .gate-card {
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .gate-card.pass {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .gate-card.caution {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }

        .gate-card.block {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .gate-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .gate-value {
            font-size: 14px;
            font-weight: 700;
        }

        .verdict-banner {
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
        }

        .verdict-banner.block {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ff6b6b;
        }

        .verdict-banner.caution {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #fbbf24;
        }

        .verdict-banner.pass {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #4ade80;
        }

        /* Input */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 13px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }

        button {
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .metric-item {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        .sector-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .sector-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid var(--border);
        }

        .sector-item:hover {
            background: rgba(102, 126, 234, 0.1);
            border-left-color: var(--primary);
        }

        .sector-item.active {
            background: rgba(102, 126, 234, 0.15);
            border-left-color: var(--primary);
        }

        .sector-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sector-change {
            font-size: 12px;
            margin-top: 4px;
        }

        .stock-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stock-bar:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .stock-bar-symbol {
            font-weight: 700;
            color: var(--primary);
            min-width: 50px;
        }

        .stock-bar-fill {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .stock-bar-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        .stock-bar-score {
            font-weight: 700;
            color: var(--text-light);
            min-width: 40px;
            text-align: right;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.history.back()">← 뒤로가기</button>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // =============================
        // UTILITIES (하드코딩 0개)
        // =============================

        const API_BASE = 'https://fmp-proxy.aiinvestflow.workers.dev'

        const fmt = {
            pct: (v, d = 1) => v != null ? (v > 0 ? '+' : '') + Number(v).toFixed(d) + '%' : '-',
            dollar: (v) => {
                if (v == null) return '-'
                const abs = Math.abs(v)
                const sign = v < 0 ? '-' : ''
                if (abs >= 1e12) return sign + '$' + (abs / 1e12).toFixed(2) + 'T'
                if (abs >= 1e9) return sign + '$' + (abs / 1e9).toFixed(1) + 'B'
                if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(0) + 'M'
                return sign + '$' + abs.toFixed(0)
            },
            num: (v, d = 2) => v != null ? Number(v).toFixed(d) : '-',
            mult: (v, d = 1) => v != null ? Number(v).toFixed(d) + 'x' : '-',
        }

        const scoreGrade = (score) => {
            if (score == null) return { label: '-', icon: '', class: 'score-weak' }
            if (score >= 6.0) return { label: 'STRONG BUY', icon: '🔥', class: 'score-strong' }
            if (score >= 4.0) return { label: 'BUY', icon: '✅', class: 'score-moderate' }
            if (score >= 2.0) return { label: 'WATCH', icon: '⚠️', class: 'score-weak' }
            return { label: 'AVOID', icon: '❌', class: 'score-weak' }
        }

        const changeColor = (v) => {
            if (v == null) return 'value-neutral'
            return v > 0 ? 'value-positive' : 'value-negative'
        }

        const decomposeScore = (factors, momentum, volume) => {
            if (!factors) return null
            const norm = (g) => Math.max(0, Math.min(1, ((g ?? 0) + 0.5) / 1.0))
            const pe = factors.pe ?? 50
            const pb = factors.pb ?? 10
            const fs = factors.floatShares ?? 1e9
            return {
                value: Math.min(100, ((1 / (pe + 1)) * 1.5 + (1 / (pb + 1)) * 1.5) / 3.0 * 100),
                growth: Math.min(100, (norm(factors.revenueGrowth) * 1.2 + norm(factors.earningsGrowth) * 1.2) / 2.4 * 100),
                quality: Math.min(100, ((factors.analystScore ?? 0) * 0.8 + ((factors.insiderActivity ?? 0) > 0 ? 1 : 0) * 0.4) / 1.2 * 100),
                momentum: Math.min(100, Math.min((momentum ?? 0) * 2.5, 3.0) / 3.0 * 100),
                volume: Math.min(100, Math.min((volume ?? 0) * 2.0, 4.0) / 4.0 * 100),
                float: Math.min(100, (1 / (fs / 1e8 + 1)) * 0.8 / 0.8 * 100),
            }
        }

        const matchSector = (profileSector, rotationName) => {
            if (!profileSector || !rotationName) return false
            const keyword = profileSector.toLowerCase().split(' ')[0]
            return rotationName.toLowerCase().includes(keyword)
        }

        // =============================
        // WIDGET 1: ALPHA DISCOVERY SCANNER
        // =============================

        function AlphaDiscoveryScanner({ onSelectSymbol }) {
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)
            const [marketRegime, setMarketRegime] = useState(null)
            const [fearGreed, setFearGreed] = useState(null)
            const [elapsed, setElapsed] = useState(0)

            const fetchDiscovery = useCallback(async () => {
                try {
                    setLoading(true)
                    setError(null)
                    setElapsed(0)

                    const counter = setInterval(() => setElapsed(e => e + 1), 1000)

                    const results = await Promise.allSettled([
                        fetch(API_BASE + '/alpha/discovery').then(r => r.json()),
                        fetch(API_BASE + '/analysis/market-regime').then(r => r.json()),
                        fetch(API_BASE + '/feargreed').then(r => r.json())
                    ])

                    clearInterval(counter)

                    const discovery = results[0].status === 'fulfilled' ? results[0].value : null
                    const regime = results[1].status === 'fulfilled' ? results[1].value : null
                    const fgRaw = results[2].status === 'fulfilled' ? results[2].value : null

                    // 공포탐욕 데이터 검증
                    const fg = fgRaw && fgRaw.score !== undefined ? fgRaw : null

                    if (discovery?.top_20) {
                        setData(discovery)
                    } else {
                        setError('발굴 데이터 없음')
                    }
                    setMarketRegime(regime)
                    setFearGreed(fg)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [])

            useEffect(() => {
                fetchDiscovery()
            }, [fetchDiscovery])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div>
                            <div className="widget-title">🔍 Alpha Discovery Scanner
                                <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>모멘텀 + 수익률 성장 + 거래량 기반 종목 발굴</span>
                            </div>
                            <div className="widget-subtitle">전체 시장 유니버스에서 explosiveScore 상위 종목 자동 발굴</div>
                        </div>
                        <button
                            className={`btn-refresh ${loading ? 'loading' : ''}`}
                            onClick={fetchDiscovery}
                            disabled={loading}
                        >
                            ↻
                        </button>
                    </div>

                    {(marketRegime || fearGreed) && (
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '16px' }}>
                            {marketRegime && (
                                <div style={{
                                    background: 'rgba(102, 126, 234, 0.2)',
                                    color: '#2d3748',
                                    padding: '6px 12px',
                                    borderRadius: '4px',
                                    fontSize: '12px',
                                    fontWeight: '600'
                                }}>
                                    시장: {marketRegime.regime || '-'}
                                </div>
                            )}
                            {fearGreed && (
                                <div style={{
                                    background: 'rgba(245, 158, 11, 0.2)',
                                    color: '#fbbf24',
                                    padding: '6px 12px',
                                    borderRadius: '4px',
                                    fontSize: '12px',
                                    fontWeight: '600'
                                }}>
                                    공포탐욕: {fearGreed.score ?? '-'} {fearGreed.rating || ''}
                                </div>
                            )}
                        </div>
                    )}

                    {loading && (
                        <div className="loading">
                            🔍 Universe 스크리닝 중... ({elapsed}초)
                        </div>
                    )}

                    {error && (
                        <div className="error-box">
                            {error}
                            <button onClick={fetchDiscovery}>재시도</button>
                        </div>
                    )}

                    {data && !loading && (
                        <>
                            <div style={{ fontSize: '12px', color: '#2d3748', marginBottom: '12px' }}>
                                {data.execution_time_sec}초 소요 ({data.analyzed}/{data.universe_size})
                            </div>

                            <table>
                                <thead>
                                    <tr>
                                        <th>Rank</th>
                                        <th>Symbol</th>
                                        <th>Score</th>
                                        <th>Momentum%</th>
                                        <th>Volume배수</th>
                                        <th>PE</th>
                                        <th>Revenue%</th>
                                        <th>등급</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.top_20.map((stock, idx) => {
                                        const grade = scoreGrade(stock.score)
                                        return (
                                            <tr key={stock.symbol} onClick={() => onSelectSymbol(stock.symbol)}>
                                                <td>{idx + 1}</td>
                                                <td><span className="ticker">{stock.symbol}</span></td>
                                                <td>
                                                    <span className={`score-badge ${grade.class}`}>
                                                        {stock.score.toFixed(2)}
                                                    </span>
                                                </td>
                                                <td className={changeColor(stock.momentum)}>
                                                    {fmt.pct(stock.momentum * 100)}
                                                </td>
                                                <td>{fmt.mult(stock.volume)}</td>
                                                <td>{fmt.num(stock.pe)}</td>
                                                <td className="value-positive">{fmt.pct(stock.revenueGrowth * 100)}</td>
                                                <td>{grade.icon} {grade.label}</td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 2: MARKET ENTRY GATE
        // =============================

        function MarketEntryGate() {
            const [gates, setGates] = useState([])
            const [loading, setLoading] = useState(true)
            const [error, setError] = useState(null)

            const fetchGates = useCallback(async () => {
                try {
                    setLoading(true)
                    const results = await Promise.allSettled([
                        fetch(API_BASE + '/analysis/market-regime').then(r => r.json()),
                        fetch(API_BASE + '/analysis/volatility-regime').then(r => r.json()),
                        fetch(API_BASE + '/analysis/credit-stress').then(r => r.json()),
                        fetch(API_BASE + '/feargreed').then(r => r.json())
                    ])

                    const regime = results[0].status === 'fulfilled' ? results[0].value : null
                    const vol = results[1].status === 'fulfilled' ? results[1].value : null
                    const credit = results[2].status === 'fulfilled' ? results[2].value : null
                    const fg = results[3].status === 'fulfilled' ? results[3].value : null

                    const gatesArray = [
                        {
                            name: '시장 레짐',
                            status: regime?.regime?.includes('Risk-On') ? 'pass' : regime?.regime?.includes('Neutral') ? 'caution' : 'block',
                            value: regime?.regime || '-',
                            recommendation: regime?.recommendation
                        },
                        {
                            name: '변동성 (VIX)',
                            status: (vol?.vix ?? 20) < 20 ? 'pass' : (vol?.vix ?? 20) < 25 ? 'caution' : 'block',
                            value: 'VIX ' + fmt.num(vol?.vix),
                            recommendation: vol?.recommendation
                        },
                        {
                            name: '신용 스트레스',
                            status: credit?.stress_level === '낮음' ? 'pass' : credit?.stress_level === '중간' ? 'caution' : 'block',
                            value: credit?.stress_level || '-',
                            recommendation: credit?.recommendation
                        },
                        {
                            name: '공포탐욕',
                            status: (fg?.score >= 40 && fg?.score <= 75) ? 'pass' : (fg?.score > 75 || (fg?.score >= 30 && fg?.score < 40)) ? 'caution' : 'block',
                            value: (fg?.score ?? '-') + ' ' + (fg?.rating || ''),
                            recommendation: null
                        }
                    ]

                    setGates(gatesArray)
                    setError(null)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [])

            useEffect(() => {
                fetchGates()
                const timer = setInterval(fetchGates, 180000)
                return () => clearInterval(timer)
            }, [fetchGates])

            const verdict = useMemo(() => {
                if (gates.length === 0) return null
                const blockCount = gates.filter(g => g.status === 'block').length
                const cautionCount = gates.filter(g => g.status === 'caution').length

                if (blockCount >= 1) return { text: '🚫 신규 매수 자제', class: 'block' }
                if (cautionCount >= 2) return { text: '⚠️ 선택적 매수', class: 'caution' }
                if (cautionCount === 1) return { text: '✅ 매수 가능', class: 'pass' }
                return { text: '✅ 적극 매수 환경', class: 'pass' }
            }, [gates])

            return (
                <div className="widget">
                    <div className="widget-header">
                        <div className="widget-title">🚪 Market Entry Gate
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>공포탐욕 + 시장체제로 진입신호 판정</span>
                        </div>
                        <button className="btn-refresh" onClick={fetchGates} disabled={loading}>↻</button>
                    </div>

                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error}</div>}

                    {!loading && !error && (
                        <>
                            <div className="gate-grid">
                                {gates.map(gate => (
                                    <div key={gate.name} className={`gate-card ${gate.status}`}>
                                        <div className="gate-label">{gate.name}</div>
                                        <div className={`gate-value ${changeColor(gate.status)}`}>
                                            {gate.value}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {verdict && (
                                <div className={`verdict-banner ${verdict.class}`}>
                                    {verdict.text}
                                </div>
                            )}
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 3: SINGLE STOCK DEEP DIVE
        // =============================

        function SingleStockDeepDive({ symbol: initialSymbol }) {
            const [symbol, setSymbol] = useState(initialSymbol || '')
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)

            useEffect(() => {
                setSymbol(initialSymbol || '')
            }, [initialSymbol])

            const handleSubmit = useCallback(async (e) => {
                e.preventDefault()
                if (!symbol.trim()) return

                try {
                    setLoading(true)
                    setError(null)

                    const results = await Promise.allSettled([
                        fetch(API_BASE + `/alpha?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/growth?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/income?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/balance?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/cashflow?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/profile?symbol=${symbol}`).then(r => r.json())
                    ])

                    const alpha = results[0].status === 'fulfilled' ? results[0].value : null
                    const growth = results[1].status === 'fulfilled' ? results[1].value : null
                    const income = results[2].status === 'fulfilled' ? results[2].value : null
                    const balance = results[3].status === 'fulfilled' ? results[3].value : null
                    const cashflow = results[4].status === 'fulfilled' ? results[4].value : null
                    const profile = results[5].status === 'fulfilled' ? results[5].value : null

                    if (!alpha?.data) {
                        setError('종목 데이터 없음')
                        setData(null)
                        return
                    }

                    setData({
                        alpha, growth, income, balance, cashflow, profile
                    })
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [symbol])

            const verdict = useMemo(() => {
                if (!data?.alpha?.data) return null
                const s = data.alpha.data.explosiveScore
                const fcf = data.cashflow?.data?.freeCashFlow

                if (s >= 6.0 && fcf !== null && fcf > 0) return { label: '🔥 STRONG BUY', reason: '고점수 + 양의 FCF' }
                if (s >= 6.0) return { label: '🔥 STRONG BUY', reason: '고점수' }
                if (s >= 4.0) return { label: '✅ BUY', reason: '점수 기준 충족' }
                if (s >= 2.0) return { label: '⚠️ WATCH', reason: '점수 부족' }
                return { label: '❌ AVOID', reason: '점수 미달' }
            }, [data])

            if (!symbol) {
                return (
                    <div className="widget">
                        <div className="widget-title">💰 종목 깊이 분석
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>재무 + PE/PBR + 매수 판정</span>
                        </div>
                        <form onSubmit={handleSubmit} className="input-group" style={{ marginBottom: '16px' }}>
                            <input
                                type="text"
                                placeholder="종목 코드 입력 (예: AAPL, TSLA)"
                                value={symbol}
                                onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                                style={{ fontWeight: '700' }}
                                autoFocus
                            />
                            <button type="submit" disabled={loading}>검색</button>
                        </form>
                        <div style={{
                            padding: '20px',
                            textAlign: 'center',
                            color: '#94a3b8',
                            background: 'rgba(102, 126, 234, 0.08)',
                            borderRadius: '8px',
                            fontSize: '0.95em'
                        }}>
                            <div style={{ marginBottom: '8px' }}>🔍 분석할 종목을 입력하세요</div>
                            <div style={{ fontSize: '0.85em', color: '#64748b' }}>
                                Alpha Discovery 결과에서도 종목을 선택할 수 있습니다
                            </div>
                        </div>
                    </div>
                )
            }

            return (
                <div className="widget">
                    <div className="widget-header">
                        <div className="widget-title">💰 종목 깊이 분석
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>재무 + PE/PBR + 매수 판정</span>
                        </div>
                        <button className="btn-refresh" onClick={handleSubmit} disabled={loading}>↻</button>
                    </div>

                    <form onSubmit={handleSubmit} className="input-group">
                        <input
                            type="text"
                            placeholder="종목 코드 입력 (예: AAPL)"
                            value={symbol}
                            onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                            style={{ fontWeight: '700' }}
                        />
                        <button type="submit" disabled={loading}>검색</button>
                    </form>

                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error}</div>}

                    {data && !loading && (
                        <>
                            <div style={{ marginBottom: '16px' }}>
                                <div style={{ fontSize: '14px', fontWeight: '700', color: '#2d3748', marginBottom: '4px' }}>
                                    {data.profile?.data?.companyName ?? symbol}
                                </div>
                                <div style={{ fontSize: '12px', color: '#2d3748' }}>
                                    {[data.profile?.data?.sector, data.profile?.data?.industry].filter(Boolean).join(' | ') || '-'}
                                </div>
                            </div>

                            {verdict && (
                                <div style={{
                                    padding: '12px',
                                    background: verdict.label.includes('STRONG') ? 'rgba(239, 68, 68, 0.1)' : verdict.label.includes('BUY') ? 'rgba(16, 185, 129, 0.1)' : 'rgba(245, 158, 11, 0.1)',
                                    borderLeft: verdict.label.includes('STRONG') ? '3px solid #ef4444' : verdict.label.includes('BUY') ? '3px solid #10b981' : '3px solid #f59e0b',
                                    borderRadius: '6px',
                                    marginBottom: '16px'
                                }}>
                                    <div style={{ fontSize: '16px', fontWeight: '700', marginBottom: '4px' }}>
                                        {verdict.label}
                                    </div>
                                    <div style={{ fontSize: '12px', color: '#2d3748' }}>
                                        {verdict.reason}
                                    </div>
                                </div>
                            )}

                            <div className="metrics-grid">
                                <div className="metric-item">
                                    <div className="metric-label">매출성장%</div>
                                    <div className={`metric-value ${changeColor(data.growth?.data?.revenueGrowth)}`}>
                                        {fmt.pct((data.growth?.data?.revenueGrowth ?? 0) * 100)}
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">EPS성장%</div>
                                    <div className={`metric-value ${changeColor(data.growth?.data?.epsGrowth)}`}>
                                        {fmt.pct((data.growth?.data?.epsGrowth ?? 0) * 100)}
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">FCF</div>
                                    <div className="metric-value">{fmt.dollar(data.cashflow?.data?.freeCashFlow)}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">순이익률%</div>
                                    <div className={`metric-value ${changeColor(data.income?.data?.netIncome)}`}>
                                        {data.income?.data?.netIncome && data.income?.data?.revenue
                                            ? fmt.pct((data.income.data.netIncome / data.income.data.revenue) * 100)
                                            : '-'
                                        }
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">순부채</div>
                                    <div className="metric-value">{fmt.dollar(data.balance?.data?.netDebt)}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">EBITDA</div>
                                    <div className="metric-value">{fmt.dollar(data.income?.data?.ebitda)}</div>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 4: SECTOR ROTATION DRILL DOWN
        // =============================

        function SectorRotationDrillDown({ onSelectSymbol }) {
            const [sectors, setSectors] = useState([])
            const [sectorMap, setSectorMap] = useState({})
            const [selectedSector, setSelectedSector] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)

            const fetchSectorData = useCallback(async () => {
                try {
                    setLoading(true)

                    const results = await Promise.allSettled([
                        fetch(API_BASE + '/analysis/sector-rotation').then(r => r.json()),
                        fetch(API_BASE + '/alpha/discovery').then(r => r.json())
                    ])

                    const rotation = results[0].status === 'fulfilled' ? results[0].value : null
                    const discovery = results[1].status === 'fulfilled' ? results[1].value : null

                    if (!rotation?.rankings || !discovery?.top_20) {
                        setError('섹터 데이터 없음')
                        return
                    }

                    const sortedSectors = [...rotation.rankings].sort((a, b) => (b.w1 ?? 0) - (a.w1 ?? 0))
                    setSectors(sortedSectors)

                    const profileResults = await Promise.allSettled(
                        discovery.top_20.map(stock =>
                            fetch(API_BASE + `/fundamentals/profile?symbol=${stock.symbol}`).then(r => r.json())
                        )
                    )

                    const map = {}
                    sortedSectors.forEach(s => { map[s.name] = [] })

                    discovery.top_20.forEach((stock, idx) => {
                        const profileResult = profileResults[idx]
                        const profile = profileResult.status === 'fulfilled' ? profileResult.value : null
                        const sector = profile?.data?.sector

                        let matched = false
                        for (const s of sortedSectors) {
                            if (matchSector(sector, s.name)) {
                                map[s.name].push(stock)
                                matched = true
                                break
                            }
                        }

                        if (!matched) {
                            if (!map['기타']) map['기타'] = []
                            map['기타'].push(stock)
                        }
                    })

                    setSectorMap(map)
                    setSelectedSector(sortedSectors[0]?.name || null)
                    setError(null)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [])

            useEffect(() => {
                fetchSectorData()
            }, [fetchSectorData])

            const selectedStocks = useMemo(() => {
                if (!selectedSector || !sectorMap[selectedSector]) return []
                const stocks = sectorMap[selectedSector]
                const maxScore = Math.max(...stocks.map(s => s.score || 0), 1)
                return stocks
                    .sort((a, b) => (b.score ?? 0) - (a.score ?? 0))
                    .map(s => ({ ...s, maxScore }))
            }, [selectedSector, sectorMap])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div>
                            <div className="widget-title">📊 Sector Rotation Drill Down
                                <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>섹터별 강세 분석 및 종목 발굴</span>
                            </div>
                            <div className="widget-subtitle">강한 섹터 내 Alpha Score 비교</div>
                        </div>
                        <button className="btn-refresh" onClick={fetchSectorData} disabled={loading}>↻</button>
                    </div>

                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error}</div>}

                    {!loading && !error && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: '20px' }}>
                            <div className="sector-list">
                                {sectors.map(sector => (
                                    <div
                                        key={sector.name}
                                        className={`sector-item ${selectedSector === sector.name ? 'active' : ''}`}
                                        onClick={() => setSelectedSector(sector.name)}
                                    >
                                        <div className="sector-name">{sector.name}</div>
                                        <div className={`sector-change ${changeColor(sector.w1)}`}>
                                            {fmt.pct(sector.w1)}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div>
                                {selectedStocks.length > 0 ? (
                                    selectedStocks.map((stock, idx) => {
                                        const pct = (stock.score / stock.maxScore) * 100
                                        const grade = scoreGrade(stock.score)
                                        return (
                                            <div
                                                key={stock.symbol}
                                                className="stock-bar"
                                                onClick={() => onSelectSymbol(stock.symbol)}
                                            >
                                                <div className="stock-bar-symbol">{idx + 1}. {stock.symbol}</div>
                                                <div className="stock-bar-fill">
                                                    <div className="stock-bar-progress" style={{ width: pct + '%' }} />
                                                </div>
                                                <div className="stock-bar-score">{grade.icon} {stock.score.toFixed(2)}</div>
                                            </div>
                                        )
                                    })
                                ) : (
                                    <div style={{ padding: '40px 20px', textAlign: 'center', color: '#2d3748' }}>
                                        이 섹터에 종목이 없습니다
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            )
        }

        // =============================
        // MAIN APP
        // =============================

        function App() {
            const [selectedSymbol, setSelectedSymbol] = useState(null)

            return (
                <div style={{ background: '#0f172a', minHeight: '100vh' }}>
                    <div className="container">
                        <div className="header">
                            <h1>AI분석_2</h1>
                            <p>개별 종목 발굴 & 매수 판정 시스템</p>
                        </div>

                        <div className="grid-layout">
                            <MarketEntryGate />
                            <SingleStockDeepDive symbol={selectedSymbol} />
                            <div />
                        </div>

                        <AlphaDiscoveryScanner onSelectSymbol={setSelectedSymbol} />

                        <div style={{ marginTop: '30px' }}>
                            <SectorRotationDrillDown onSelectSymbol={setSelectedSymbol} />
                        </div>

                        <div style={{ textAlign: 'center', color: '#2d3748', fontSize: '12px', marginTop: '40px', paddingBottom: '40px' }}>
                            <p>데이터 소스: FMP API, FRED, Alpha Discovery Engine</p>
                            <p style={{ marginTop: '8px', fontSize: '11px', color: '#2d3748' }}>모든 데이터는 API 응답에서 동적으로 추출됩니다</p>
                        </div>
                    </div>
                </div>
            )
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
</body>
</html>
