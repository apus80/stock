<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI분석_2 - 개별 종목 발굴</title>

    <!-- React & Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --text-light: #ffffff;
            --radius-main: 15px;
            --radius-small: 8px;
            --shadow-main: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.3);
            --bull: #00d084;
            --bear: #ff6b6b;
            --neutral: #ffa500;
            --info: #4dabf7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', sans-serif;
            background: var(--light-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-size: 0.9em;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .header {
            background: var(--bg-gradient);
            color: white;
            padding: 40px 30px;
            margin-bottom: 30px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.05em;
            margin-bottom: 20px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .widget {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-main);
            transition: all 0.3s;
            border-left: 4px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .widget:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-deep);
        }

        .widget.featured {
            grid-column: span 2;
        }

        .widget.full {
            grid-column: 1 / -1;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .widget-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text-main);
            flex: 1;
        }

        .widget-refresh {
            background: var(--light-bg);
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .widget-refresh:hover {
            background: var(--primary);
            color: white;
        }

        .widget-subtitle {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .scanner-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .scanner-table th {
            background: var(--light-bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid #e2e8f0;
        }

        .scanner-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .scanner-table tbody tr:hover {
            background: var(--light-bg);
        }

        .stock-ticker {
            color: var(--primary);
            font-weight: 600;
        }

        .value-positive {
            color: var(--bull);
            font-weight: 600;
        }

        .value-negative {
            color: var(--bear);
            font-weight: 600;
        }

        .score-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .score-badge.score-strong {
            background: rgba(16, 185, 129, 0.2);
            color: var(--bull);
        }

        .score-badge.score-moderate {
            background: rgba(245, 158, 11, 0.2);
            color: var(--neutral);
        }

        .score-badge.score-weak {
            background: rgba(239, 68, 68, 0.2);
            color: var(--bear);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1em;
        }

        .explanation-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--light-bg);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .explanation-title {
            font-size: 1em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .explanation-section {
            font-size: 0.9em;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .explanation-section strong {
            color: var(--text-main);
        }

        .explanation-section br {
            line-height: 1.8;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }

            .widget.featured {
                grid-column: span 1;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 0 20px 30px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .widget {
                padding: 16px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .back-btn {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 0.8em;
            }

            .scanner-table {
                font-size: 0.8em;
            }

            .scanner-table th, .scanner-table td {
                padding: 8px;
            }
        }
            font-weight: 700;
            color: var(--text-main);
        }

        .widget-subtitle {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .btn-refresh {
            background: transparent;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            color: var(--primary);
            background: var(--bg-tertiary);
        }

        .btn-refresh.loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 16px;
            color: var(--danger);
            font-size: 13px;
            text-align: center;
        }

        .error-box button {
            margin-top: 12px;
            padding: 6px 12px;
            border: 1px solid var(--danger);
            background: transparent;
            color: var(--danger);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table thead {
            border-bottom: 1px solid var(--border);
        }

        table th {
            padding: 12px 8px;
            text-align: left;
            color: var(--text-light);
            font-weight: 600;
            background: var(--bg-tertiary);
        }

        table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        table tr:hover {
            background: var(--bg-tertiary);
            cursor: pointer;
        }

        .ticker {
            font-weight: 700;
            color: var(--primary);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .score-strong {
            background: rgba(239, 68, 68, 0.2);
            color: #ff6b6b;
        }

        .score-moderate {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .score-weak {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .value-positive {
            color: var(--success);
        }

        .value-negative {
            color: var(--danger);
        }

        .value-neutral {
            color: var(--text-light);
        }

        /* Gate Cards */
        .gate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .gate-card {
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .gate-card.pass {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .gate-card.caution {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }

        .gate-card.block {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .gate-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .gate-value {
            font-size: 14px;
            font-weight: 700;
        }

        .verdict-banner {
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
        }

        .verdict-banner.block {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ff6b6b;
        }

        .verdict-banner.caution {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #fbbf24;
        }

        .verdict-banner.pass {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #4ade80;
        }

        /* Input */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 13px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }

        button {
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .metric-item {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        .sector-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .sector-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid var(--border);
        }

        .sector-item:hover {
            background: rgba(102, 126, 234, 0.1);
            border-left-color: var(--primary);
        }

        .sector-item.active {
            background: rgba(102, 126, 234, 0.15);
            border-left-color: var(--primary);
        }

        .sector-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sector-change {
            font-size: 12px;
            margin-top: 4px;
        }

        .stock-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stock-bar:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .stock-bar-symbol {
            font-weight: 700;
            color: var(--primary);
            min-width: 50px;
        }

        .stock-bar-fill {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .stock-bar-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        .stock-bar-score {
            font-weight: 700;
            color: var(--text-light);
            min-width: 40px;
            text-align: right;
        }

        /* ===== BREAKOUT RADAR WIDGET ===== */
        .breakout-widget {
            background: linear-gradient(145deg, #0c1426 0%, #1a1f3a 100%);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            margin-top: 30px;
        }

        .breakout-header {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
            padding: 24px 28px;
            position: relative;
            overflow: hidden;
        }

        .breakout-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .breakout-header h2 {
            font-size: 1.4em;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .breakout-header p {
            font-size: 0.85em;
            color: rgba(255,255,255,0.75);
        }

        .breakout-header .header-meta {
            display: flex;
            gap: 16px;
            margin-top: 10px;
            font-size: 0.78em;
        }

        .breakout-header .header-meta span {
            color: rgba(255,255,255,0.6);
        }

        .breakout-header .header-meta strong {
            color: #fbbf24;
        }

        .breakout-body {
            padding: 20px 24px 24px;
        }

        .breakout-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .breakout-table thead th {
            padding: 10px 8px;
            text-align: left;
            color: #94a3b8;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
            white-space: nowrap;
        }

        .breakout-table tbody td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.2);
            color: #e2e8f0;
            vertical-align: middle;
        }

        .breakout-table tbody tr {
            transition: all 0.2s;
            cursor: pointer;
        }

        .breakout-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.08);
        }

        .breakout-table tbody tr.signal-breakout {
            background: rgba(239, 68, 68, 0.04);
        }

        .breakout-table tbody tr.signal-breakout:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .breakout-rank {
            font-weight: 800;
            color: #64748b;
            font-size: 12px;
            width: 28px;
        }

        .breakout-rank.top3 {
            color: #fbbf24;
        }

        .breakout-ticker-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .breakout-ticker {
            font-weight: 700;
            color: #667eea;
            font-size: 14px;
        }

        .breakout-name {
            font-size: 10px;
            color: #64748b;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .breakout-score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breakout-score-track {
            flex: 1;
            height: 8px;
            background: rgba(71, 85, 105, 0.3);
            border-radius: 4px;
            overflow: hidden;
            min-width: 60px;
        }

        .breakout-score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .breakout-score-fill.level-high {
            background: linear-gradient(90deg, #ef4444, #f97316);
        }

        .breakout-score-fill.level-mid {
            background: linear-gradient(90deg, #f59e0b, #eab308);
        }

        .breakout-score-fill.level-low {
            background: linear-gradient(90deg, #6b7280, #9ca3af);
        }

        .breakout-score-num {
            font-weight: 700;
            min-width: 32px;
            text-align: right;
            font-size: 13px;
        }

        .signal-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .signal-tag.signal-BREAKOUT {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .signal-tag.signal-ACCUMULATION {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .signal-tag.signal-NEUTRAL {
            background: rgba(107, 114, 128, 0.15);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, 0.3);
        }

        .signal-tag.signal-WEAKNESS {
            background: rgba(71, 85, 105, 0.15);
            color: #64748b;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        .breakout-detail-panel {
            margin-top: 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .breakout-detail-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breakout-components-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .breakout-comp-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        .breakout-comp-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .breakout-comp-value {
            font-size: 1.3em;
            font-weight: 800;
        }

        .breakout-comp-sub {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
        }

        .breakout-technicals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .breakout-tech-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 6px;
            font-size: 12px;
        }

        .breakout-tech-label {
            color: #94a3b8;
        }

        .breakout-tech-value {
            font-weight: 600;
            color: #e2e8f0;
        }

        .breakout-legend {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            flex-wrap: wrap;
        }

        .breakout-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #94a3b8;
        }

        .breakout-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* ===== TOP 5 BREAKOUT PICKS ===== */
        .top5-section {
            margin-top: 30px;
        }
        .top5-btn {
            padding: 10px 16px;
            background: var(--primary, #667eea);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .top5-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .top5-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-left: 4px solid var(--primary, #667eea);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow-main);
            color: var(--text-main);
            font-size: 13px;
            line-height: 1.8;
        }
        .top5-card:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-deep);
        }
        .top5-yes { color: var(--bull, #00d084); font-weight: bold; }
        .top5-no  { color: var(--bear, #ff6b6b); font-weight: bold; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.history.back()">← 뒤로가기</button>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // =============================
        // UTILITIES (하드코딩 0개)
        // =============================

        const API_BASE = 'https://fmp-proxy.aiinvestflow.workers.dev'

        const fmt = {
            pct: (v, d = 1) => v != null ? (v > 0 ? '+' : '') + Number(v).toFixed(d) + '%' : '-',
            dollar: (v) => {
                if (v == null) return '-'
                const abs = Math.abs(v)
                const sign = v < 0 ? '-' : ''
                if (abs >= 1e12) return sign + '$' + (abs / 1e12).toFixed(2) + 'T'
                if (abs >= 1e9) return sign + '$' + (abs / 1e9).toFixed(1) + 'B'
                if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(0) + 'M'
                return sign + '$' + abs.toFixed(0)
            },
            num: (v, d = 2) => v != null ? Number(v).toFixed(d) : '-',
            mult: (v, d = 1) => v != null ? Number(v).toFixed(d) + 'x' : '-',
        }

        const scoreGrade = (score) => {
            if (score == null) return { label: '-', icon: '', class: 'score-weak' }
            if (score >= 6.0) return { label: 'STRONG BUY', icon: '🔥', class: 'score-strong' }
            if (score >= 4.0) return { label: 'BUY', icon: '✅', class: 'score-moderate' }
            if (score >= 2.0) return { label: 'WATCH', icon: '⚠️', class: 'score-weak' }
            return { label: 'AVOID', icon: '❌', class: 'score-weak' }
        }

        const changeColor = (v) => {
            if (v == null) return 'value-neutral'
            return v > 0 ? 'value-positive' : 'value-negative'
        }

        const decomposeScore = (factors, momentum, volume) => {
            if (!factors) return null
            const norm = (g) => Math.max(0, Math.min(1, ((g ?? 0) + 0.5) / 1.0))
            const pe = factors.pe ?? 50
            const pb = factors.pb ?? 10
            const fs = factors.floatShares ?? 1e9
            return {
                value: Math.min(100, ((1 / (pe + 1)) * 1.5 + (1 / (pb + 1)) * 1.5) / 3.0 * 100),
                growth: Math.min(100, (norm(factors.revenueGrowth) * 1.2 + norm(factors.earningsGrowth) * 1.2) / 2.4 * 100),
                quality: Math.min(100, ((factors.analystScore ?? 0) * 0.8 + ((factors.insiderActivity ?? 0) > 0 ? 1 : 0) * 0.4) / 1.2 * 100),
                momentum: Math.min(100, Math.min((momentum ?? 0) * 2.5, 3.0) / 3.0 * 100),
                volume: Math.min(100, Math.min((volume ?? 0) * 2.0, 4.0) / 4.0 * 100),
                float: Math.min(100, (1 / (fs / 1e8 + 1)) * 0.8 / 0.8 * 100),
            }
        }

        const matchSector = (profileSector, rotationName) => {
            if (!profileSector || !rotationName) return false
            const keyword = profileSector.toLowerCase().split(' ')[0]
            return rotationName.toLowerCase().includes(keyword)
        }

        // =============================
        // WIDGET 1: ALPHA DISCOVERY SCANNER
        // =============================

        function AlphaDiscoveryScanner({ onSelectSymbol }) {
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)
            const [marketRegime, setMarketRegime] = useState(null)
            const [fearGreed, setFearGreed] = useState(null)
            const [elapsed, setElapsed] = useState(0)

            const fetchDiscovery = useCallback(async () => {
                try {
                    setLoading(true)
                    setError(null)
                    setElapsed(0)

                    const counter = setInterval(() => setElapsed(e => e + 1), 1000)

                    const results = await Promise.allSettled([
                        fetch(API_BASE + '/alpha/discovery').then(r => r.json()),
                        fetch(API_BASE + '/analysis/market-regime').then(r => r.json()),
                        fetch(API_BASE + '/feargreed').then(r => r.json())
                    ])

                    clearInterval(counter)

                    const discovery = results[0].status === 'fulfilled' ? results[0].value : null
                    const regime = results[1].status === 'fulfilled' ? results[1].value : null
                    const fgRaw = results[2].status === 'fulfilled' ? results[2].value : null

                    // 공포탐욕 데이터 검증
                    const fg = fgRaw && fgRaw.score !== undefined ? fgRaw : null

                    if (discovery?.top_20) {
                        setData(discovery)
                    } else {
                        setError('발굴 데이터 없음')
                    }
                    setMarketRegime(regime)
                    setFearGreed(fg)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [])

            useEffect(() => {
                fetchDiscovery()
            }, [fetchDiscovery])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div>
                            <div className="widget-title">3. 🔍 Alpha Discovery Scanner
                                <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>당일등락률×30% + MA50추세×25% + 52주강도×25% + 거래량급증×20%</span>
                            </div>
                            <div className="widget-subtitle">S&P500 유니버스 80종목 스캔 (KV 캐시 8h, 실시간 Top10 폴백)</div>
                        </div>
                        <button
                            className={`btn-refresh ${loading ? 'loading' : ''}`}
                            onClick={fetchDiscovery}
                            disabled={loading}
                        >
                            ↻
                        </button>
                    </div>

                    {(marketRegime || fearGreed) && (
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '16px' }}>
                            {marketRegime && (
                                <div style={{
                                    background: 'rgba(102, 126, 234, 0.2)',
                                    color: '#2d3748',
                                    padding: '6px 12px',
                                    borderRadius: '4px',
                                    fontSize: '12px',
                                    fontWeight: '600'
                                }}>
                                    시장: {marketRegime.regime || '-'}
                                </div>
                            )}
                            {fearGreed && (
                                <div style={{
                                    background: 'rgba(245, 158, 11, 0.2)',
                                    color: '#fbbf24',
                                    padding: '6px 12px',
                                    borderRadius: '4px',
                                    fontSize: '12px',
                                    fontWeight: '600'
                                }}>
                                    공포탐욕: {fearGreed.score ?? '-'} {fearGreed.rating || ''}
                                </div>
                            )}
                        </div>
                    )}

                    {loading && (
                        <div className="loading">
                            🔍 Universe 스크리닝 중... ({elapsed}초)
                        </div>
                    )}

                    {error && (
                        <div className="error-box">
                            {error}
                            <button onClick={fetchDiscovery}>재시도</button>
                        </div>
                    )}

                    {data && !loading && (
                        <>
                            <div style={{ fontSize: '12px', color: '#2d3748', marginBottom: '12px' }}>
                                {data.execution_time_sec ?? '-'}초 소요 ({data.analyzed ?? data.top_20?.length ?? '-'}/{data.universe_size ?? data.top_20?.length ?? '-'})
                            </div>

                            <table>
                                <thead>
                                    <tr>
                                        <th>순위</th>
                                        <th>종목</th>
                                        <th>점수</th>
                                        <th>당일등락률</th>
                                        <th>MA50추세</th>
                                        <th>52주강도</th>
                                        <th>거래량급증</th>
                                        <th>PER</th>
                                        <th>매수 추천강도</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.top_20.map((stock, idx) => {
                                        const grade = scoreGrade(stock.score)
                                        return (
                                            <tr key={stock.symbol} onClick={() => onSelectSymbol(stock.symbol)}>
                                                <td>{idx + 1}</td>
                                                <td><span className="ticker">{stock.symbol}</span></td>
                                                <td>
                                                    <span className={`score-badge ${grade.class}`}>
                                                        {(stock.score ?? 0).toFixed(2)}
                                                    </span>
                                                </td>
                                                <td className={changeColor(stock.momentum)}>
                                                    {fmt.pct(stock.momentum)}
                                                </td>
                                                <td className={changeColor(stock.ma50trend)}>
                                                    {stock.ma50trend != null ? fmt.pct(stock.ma50trend) : '-'}
                                                </td>
                                                <td>{stock.str52w != null ? stock.str52w.toFixed(1) + '%' : '-'}</td>
                                                <td className={changeColor(stock.volSurge)}>
                                                    {stock.volSurge != null ? fmt.pct(stock.volSurge) : '-'}
                                                </td>
                                                <td>{stock.pe > 0 ? fmt.num(stock.pe) : '-'}</td>
                                                <td>{grade.icon} {grade.label}</td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 2: MARKET ENTRY GATE
        // =============================

        function MarketEntryGate() {
            const [gates, setGates] = useState([])
            const [loading, setLoading] = useState(true)
            const [error, setError] = useState(null)

            const fetchGates = useCallback(async () => {
                try {
                    setLoading(true)
                    const results = await Promise.allSettled([
                        fetch(API_BASE + '/analysis/market-regime').then(r => r.json()),
                        fetch(API_BASE + '/analysis/volatility-regime').then(r => r.json()),
                        fetch(API_BASE + '/analysis/credit-stress').then(r => r.json()),
                        fetch(API_BASE + '/feargreed').then(r => r.json())
                    ])

                    const regime = results[0].status === 'fulfilled' ? results[0].value : null
                    const vol = results[1].status === 'fulfilled' ? results[1].value : null
                    const credit = results[2].status === 'fulfilled' ? results[2].value : null
                    const fg = results[3].status === 'fulfilled' ? results[3].value : null

                    const gatesArray = [
                        {
                            name: '시장 레짐',
                            status: regime?.regime?.includes('Risk-On') ? 'pass' : regime?.regime?.includes('Neutral') ? 'caution' : 'block',
                            value: regime?.regime || '-',
                            recommendation: regime?.recommendation
                        },
                        {
                            name: '변동성 (VIX)',
                            status: (vol?.vix ?? 20) < 20 ? 'pass' : (vol?.vix ?? 20) < 25 ? 'caution' : 'block',
                            value: 'VIX ' + fmt.num(vol?.vix),
                            recommendation: vol?.recommendation
                        },
                        {
                            name: '신용 스트레스',
                            status: credit?.stress_level === '낮음' ? 'pass' : credit?.stress_level === '중간' ? 'caution' : 'block',
                            value: credit?.stress_level || '-',
                            recommendation: credit?.recommendation
                        },
                        {
                            name: '공포탐욕',
                            status: (fg?.score >= 40 && fg?.score <= 75) ? 'pass' : (fg?.score > 75 || (fg?.score >= 30 && fg?.score < 40)) ? 'caution' : 'block',
                            value: (fg?.score ?? '-') + ' ' + (fg?.rating || ''),
                            recommendation: null
                        }
                    ]

                    setGates(gatesArray)
                    setError(null)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [])

            useEffect(() => {
                fetchGates()
                const timer = setInterval(fetchGates, 180000)
                return () => clearInterval(timer)
            }, [fetchGates])

            const verdict = useMemo(() => {
                if (gates.length === 0) return null
                const blockCount = gates.filter(g => g.status === 'block').length
                const cautionCount = gates.filter(g => g.status === 'caution').length

                if (blockCount >= 1) return { text: '🚫 신규 매수 자제', class: 'block' }
                if (cautionCount >= 2) return { text: '⚠️ 선택적 매수', class: 'caution' }
                if (cautionCount === 1) return { text: '✅ 매수 가능', class: 'pass' }
                return { text: '✅ 적극 매수 환경', class: 'pass' }
            }, [gates])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div className="widget-title">1. 🚪 Market Entry Gate
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>공포탐욕 + 시장체제로 진입신호 판정</span>
                        </div>
                        <button className="btn-refresh" onClick={fetchGates} disabled={loading}>↻</button>
                    </div>

                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error}</div>}

                    {!loading && !error && (
                        <>
                            <div className="gate-grid">
                                {gates.map(gate => (
                                    <div key={gate.name} className={`gate-card ${gate.status}`}>
                                        <div className="gate-label">{gate.name}</div>
                                        <div className={`gate-value ${changeColor(gate.status)}`}>
                                            {gate.value}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {verdict && (
                                <div className={`verdict-banner ${verdict.class}`}>
                                    {verdict.text}
                                </div>
                            )}
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 3: SINGLE STOCK DEEP DIVE
        // =============================

        function SingleStockDeepDive({ symbol: initialSymbol }) {
            const [symbol, setSymbol] = useState(initialSymbol || '')
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)

            useEffect(() => {
                setSymbol(initialSymbol || '')
            }, [initialSymbol])

            const handleSubmit = useCallback(async (e) => {
                e.preventDefault()
                if (!symbol.trim()) return

                try {
                    setLoading(true)
                    setError(null)

                    const results = await Promise.allSettled([
                        fetch(API_BASE + `/alpha?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/growth?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/income?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/balance?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/cashflow?symbol=${symbol}`).then(r => r.json()),
                        fetch(API_BASE + `/fundamentals/profile?symbol=${symbol}`).then(r => r.json())
                    ])

                    const alpha = results[0].status === 'fulfilled' ? results[0].value : null
                    const growth = results[1].status === 'fulfilled' ? results[1].value : null
                    const income = results[2].status === 'fulfilled' ? results[2].value : null
                    const balance = results[3].status === 'fulfilled' ? results[3].value : null
                    const cashflow = results[4].status === 'fulfilled' ? results[4].value : null
                    const profile = results[5].status === 'fulfilled' ? results[5].value : null

                    if (!alpha?.data) {
                        setError('종목 데이터 없음')
                        setData(null)
                        return
                    }

                    setData({
                        alpha, growth, income, balance, cashflow, profile
                    })
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                }
            }, [symbol])

            const verdict = useMemo(() => {
                if (!data?.alpha?.data) return null
                const s = data.alpha.data.explosiveScore
                const fcf = data.cashflow?.data?.freeCashFlow

                if (s >= 6.0 && fcf !== null && fcf > 0) return { label: '🔥 STRONG BUY', reason: '고점수 + 양의 FCF' }
                if (s >= 6.0) return { label: '🔥 STRONG BUY', reason: '고점수' }
                if (s >= 4.0) return { label: '✅ BUY', reason: '점수 기준 충족' }
                if (s >= 2.0) return { label: '⚠️ WATCH', reason: '점수 부족' }
                return { label: '❌ AVOID', reason: '점수 미달' }
            }, [data])

            if (!symbol) {
                return (
                    <div className="widget grid-full">
                        <div className="widget-title">2. 💰 종목 깊이 분석
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>재무 + PE/PBR + 매수 판정</span>
                        </div>
                        <form onSubmit={handleSubmit} className="input-group" style={{ marginBottom: '16px' }}>
                            <input
                                type="text"
                                placeholder="종목 코드 입력 (예: AAPL, TSLA)"
                                value={symbol}
                                onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                                style={{ fontWeight: '700' }}
                                autoFocus
                            />
                            <button type="submit" disabled={loading}>검색</button>
                        </form>
                        <div style={{
                            padding: '20px',
                            textAlign: 'center',
                            color: '#94a3b8',
                            background: 'rgba(102, 126, 234, 0.08)',
                            borderRadius: '8px',
                            fontSize: '0.95em'
                        }}>
                            <div style={{ marginBottom: '8px' }}>🔍 분석할 종목을 입력하세요</div>
                            <div style={{ fontSize: '0.85em', color: '#64748b' }}>
                                Alpha Discovery 결과에서도 종목을 선택할 수 있습니다
                            </div>
                        </div>
                    </div>
                )
            }

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div className="widget-title">2. 💰 종목 깊이 분석
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>재무 + PE/PBR + 매수 판정</span>
                        </div>
                        <button className="btn-refresh" onClick={handleSubmit} disabled={loading}>↻</button>
                    </div>

                    <form onSubmit={handleSubmit} className="input-group">
                        <input
                            type="text"
                            placeholder="종목 코드 입력 (예: AAPL)"
                            value={symbol}
                            onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                            style={{ fontWeight: '700' }}
                        />
                        <button type="submit" disabled={loading}>검색</button>
                    </form>

                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error}</div>}

                    {data && !loading && (
                        <>
                            <div style={{ marginBottom: '16px' }}>
                                <div style={{ fontSize: '14px', fontWeight: '700', color: '#2d3748', marginBottom: '4px' }}>
                                    {data.profile?.data?.companyName ?? symbol}
                                </div>
                                <div style={{ fontSize: '12px', color: '#2d3748' }}>
                                    {[data.profile?.data?.sector, data.profile?.data?.industry].filter(Boolean).join(' | ') || '-'}
                                </div>
                            </div>

                            {verdict && (
                                <div style={{
                                    padding: '12px',
                                    background: verdict.label.includes('STRONG') ? 'rgba(239, 68, 68, 0.1)' : verdict.label.includes('BUY') ? 'rgba(16, 185, 129, 0.1)' : 'rgba(245, 158, 11, 0.1)',
                                    borderLeft: verdict.label.includes('STRONG') ? '3px solid #ef4444' : verdict.label.includes('BUY') ? '3px solid #10b981' : '3px solid #f59e0b',
                                    borderRadius: '6px',
                                    marginBottom: '16px'
                                }}>
                                    <div style={{ fontSize: '16px', fontWeight: '700', marginBottom: '4px' }}>
                                        {verdict.label}
                                    </div>
                                    <div style={{ fontSize: '12px', color: '#2d3748' }}>
                                        {verdict.reason}
                                    </div>
                                </div>
                            )}

                            <div className="metrics-grid">
                                <div className="metric-item">
                                    <div className="metric-label">매출성장%</div>
                                    <div className={`metric-value ${changeColor(data.growth?.data?.revenueGrowth)}`}>
                                        {fmt.pct((data.growth?.data?.revenueGrowth ?? 0) * 100)}
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">EPS성장%</div>
                                    <div className={`metric-value ${changeColor(data.growth?.data?.epsGrowth)}`}>
                                        {fmt.pct((data.growth?.data?.epsGrowth ?? 0) * 100)}
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">FCF</div>
                                    <div className="metric-value">{fmt.dollar(data.cashflow?.data?.freeCashFlow)}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">순이익률%</div>
                                    <div className={`metric-value ${changeColor(data.income?.data?.netIncome)}`}>
                                        {data.income?.data?.netIncome && data.income?.data?.revenue
                                            ? fmt.pct((data.income.data.netIncome / data.income.data.revenue) * 100)
                                            : '-'
                                        }
                                    </div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">순부채</div>
                                    <div className="metric-value">{fmt.dollar(data.balance?.data?.netDebt)}</div>
                                </div>
                                <div className="metric-item">
                                    <div className="metric-label">EBITDA</div>
                                    <div className="metric-value">{fmt.dollar(data.income?.data?.ebitda)}</div>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            )
        }

        // =============================
        // WIDGET 4: BREAKOUT RADAR
        // 단기 돌파 후보 발굴 (1~3주, 목표 20%)
        // 데이터 소스: FMP API /stable/quote (52주 고저, MA, 거래량 등)
        // =============================

        function BreakoutRadar({ onSelectSymbol }) {
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState(null)
            const [elapsed, setElapsed] = useState(0)
            const [selectedIdx, setSelectedIdx] = useState(0)

            const fetchData = useCallback(async () => {
                setLoading(true)
                setError(null)
                setElapsed(0)
                const timer = setInterval(() => setElapsed(p => p + 1), 1000)
                try {
                    // 출처: Worker /alpha/breakout → FMP /stable/quote (80종목)
                    const res = await fetch(`${API_BASE}/alpha/breakout`, { method: 'POST' })
                    const json = await res.json()
                    if (json.error) throw new Error(json.error)
                    setData(json)
                    setSelectedIdx(0)
                } catch (e) {
                    setError(e.message)
                } finally {
                    setLoading(false)
                    clearInterval(timer)
                    setElapsed(0)
                }
            }, [])

            useEffect(() => { fetchData() }, [fetchData])

            const selected = data?.top_15?.[selectedIdx] || null

            const scoreColor = (score) => {
                if (score >= 75) return '#ef4444'
                if (score >= 60) return '#f59e0b'
                if (score >= 45) return '#eab308'
                return '#6b7280'
            }

            const scoreLevel = (score) => {
                if (score >= 70) return 'level-high'
                if (score >= 50) return 'level-mid'
                return 'level-low'
            }

            const compColor = (value) => {
                if (value >= 70) return '#ef4444'
                if (value >= 50) return '#f59e0b'
                if (value >= 30) return '#eab308'
                return '#6b7280'
            }

            const boolColor = (v) => v ? '#10b981' : '#ef4444'

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div>
                            <div className="widget-title">4. 📡 Breakout Radar
                                <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>S&P500 Top 80 | 단기 돌파 후보 발굴 (1~3주, 목표 20%)</span>
                            </div>
                            {data && (
                                <div className="widget-subtitle">
                                    분석: {data.analyzed || '-'}종목 | 소요: {data.execution_time_sec || '-'}초 | 갱신: {data.timestamp ? new Date(data.timestamp).toLocaleTimeString('ko-KR') : '-'}
                                </div>
                            )}
                        </div>
                        <button
                            className={`btn-refresh ${loading ? 'loading' : ''}`}
                            onClick={fetchData}
                            disabled={loading}
                        >
                            {loading ? `${elapsed}초` : '↻'}
                        </button>
                    </div>

                    {loading && !data && (
                        <div className="loading">
                            📡 S&P500 Top 80 종목 분석 중... ({elapsed}초) — 7개 기술적 지표 스캐닝
                        </div>
                    )}

                        {error && !data && (
                        <div className="error-box">
                            {error} <button onClick={fetchData}>재시도</button>
                        </div>
                    )}

                        {data && data.top_15 && data.top_15.length > 0 && (
                            <>
                                <table className="breakout-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>종목</th>
                                            <th>현재가</th>
                                            <th>등락</th>
                                            <th style={{ minWidth: '140px' }}>Breakout Score</th>
                                            <th>시그널</th>
                                            <th>52W고점</th>
                                            <th>거래량비</th>
                                            <th>50MA</th>
                                            <th>GC</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.top_15.slice(0, 5).map((stock, idx) => (
                                            <tr
                                                key={stock.symbol}
                                                className={stock.signal === 'BREAKOUT' ? 'signal-breakout' : ''}
                                                onClick={() => {
                                                    setSelectedIdx(idx)
                                                    if (onSelectSymbol) onSelectSymbol(stock.symbol)
                                                }}
                                                style={{
                                                    background: selectedIdx === idx ? 'rgba(102, 126, 234, 0.12)' : undefined,
                                                    borderLeft: selectedIdx === idx ? '3px solid #667eea' : '3px solid transparent'
                                                }}
                                            >
                                                <td className={`breakout-rank ${idx < 3 ? 'top3' : ''}`}>
                                                    {idx + 1}
                                                </td>
                                                <td>
                                                    <div className="breakout-ticker-cell">
                                                        <span className="breakout-ticker">{stock.symbol}</span>
                                                        <span className="breakout-name">{stock.name}</span>
                                                    </div>
                                                </td>
                                                <td style={{ fontWeight: 600 }}>
                                                    ${stock.price?.toFixed(2) || '-'}
                                                </td>
                                                <td className={stock.change > 0 ? 'value-positive' : stock.change < 0 ? 'value-negative' : ''}>
                                                    {stock.change > 0 ? '+' : ''}{stock.change?.toFixed(2) || '0'}%
                                                </td>
                                                <td>
                                                    <div className="breakout-score-bar">
                                                        <div className="breakout-score-track">
                                                            <div
                                                                className={`breakout-score-fill ${scoreLevel(stock.breakoutScore)}`}
                                                                style={{ width: `${Math.min(100, stock.breakoutScore)}%` }}
                                                            />
                                                        </div>
                                                        <span
                                                            className="breakout-score-num"
                                                            style={{ color: scoreColor(stock.breakoutScore) }}
                                                        >
                                                            {stock.breakoutScore?.toFixed(0)}
                                                        </span>
                                                    </div>
                                                </td>
                                                <td>
                                                    <span className={`signal-tag signal-${stock.signal}`}>
                                                        {stock.signalLabel}
                                                    </span>
                                                </td>
                                                <td style={{ fontSize: '12px' }}>
                                                    <span style={{ color: stock.signals?.highProximity >= 90 ? '#10b981' : '#94a3b8' }}>
                                                        {stock.signals?.highProximity?.toFixed(0) || '-'}%
                                                    </span>
                                                </td>
                                                <td style={{ fontSize: '12px' }}>
                                                    <span style={{ color: stock.signals?.volumeRatio >= 1.5 ? '#f59e0b' : '#94a3b8' }}>
                                                        {stock.signals?.volumeRatio?.toFixed(1) || '-'}x
                                                    </span>
                                                </td>
                                                <td>
                                                    <span style={{ color: boolColor(stock.signals?.ma50Above), fontSize: '14px' }}>
                                                        {stock.signals?.ma50Above ? '\u25B2' : '\u25BC'}
                                                    </span>
                                                </td>
                                                <td>
                                                    <span style={{ color: boolColor(stock.signals?.goldenCross), fontSize: '14px' }}>
                                                        {stock.signals?.goldenCross ? '\u2713' : '\u2717'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                {/* 선택된 종목 상세 분석 패널 */}
                                {selected && (
                                    <div className="breakout-detail-panel">
                                        <div className="breakout-detail-title">
                                            <span style={{ color: '#667eea', fontSize: '1.2em' }}>{selected.symbol}</span>
                                            <span style={{ color: '#94a3b8', fontSize: '0.8em', fontWeight: 400 }}>{selected.name}</span>
                                            <span className={`signal-tag signal-${selected.signal}`} style={{ marginLeft: 'auto' }}>
                                                {selected.signalLabel} ({selected.breakoutScore?.toFixed(1)}점)
                                            </span>
                                        </div>

                                        {/* 7개 컴포넌트 점수 */}
                                        <div className="breakout-components-grid">
                                            {[
                                                { key: 'highScore', label: '52W 고점', sub: `${selected.signals?.highProximity?.toFixed(0)}%` },
                                                { key: 'volScore', label: '거래량 급증', sub: `${selected.signals?.volumeRatio?.toFixed(1)}x` },
                                                { key: 'momScore', label: '단기 모멘텀', sub: `${selected.signals?.momentum > 0 ? '+' : ''}${selected.signals?.momentum?.toFixed(2)}%` },
                                                { key: 'ma50Score', label: '50MA 돌파', sub: selected.signals?.ma50Above ? 'Above' : 'Below' },
                                                { key: 'goldenScore', label: '골든크로스', sub: selected.signals?.goldenCross ? 'Active' : 'N/A' },
                                                { key: 'rangeScore', label: '52W 위치', sub: `${selected.signals?.yearRangePosition?.toFixed(0)}%` },
                                                { key: 'pressureScore', label: '매수 압력', sub: `${selected.signals?.buyPressure?.toFixed(0)}%` },
                                            ].map(comp => (
                                                <div className="breakout-comp-card" key={comp.key}>
                                                    <div className="breakout-comp-label">{comp.label}</div>
                                                    <div
                                                        className="breakout-comp-value"
                                                        style={{ color: compColor(selected.components?.[comp.key] || 0) }}
                                                    >
                                                        {selected.components?.[comp.key]?.toFixed(0) || '0'}
                                                    </div>
                                                    <div className="breakout-comp-sub">{comp.sub}</div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* 기술적 지표 */}
                                        <div className="breakout-technicals">
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">52W High</span>
                                                <span className="breakout-tech-value">${selected.technicals?.yearHigh?.toFixed(2) || '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">52W Low</span>
                                                <span className="breakout-tech-value">${selected.technicals?.yearLow?.toFixed(2) || '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">50일 이평</span>
                                                <span className="breakout-tech-value">${selected.technicals?.priceAvg50?.toFixed(2) || '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">200일 이평</span>
                                                <span className="breakout-tech-value">${selected.technicals?.priceAvg200?.toFixed(2) || '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">거래량</span>
                                                <span className="breakout-tech-value">{selected.technicals?.volume ? (selected.technicals.volume / 1e6).toFixed(1) + 'M' : '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">평균 거래량</span>
                                                <span className="breakout-tech-value">{selected.technicals?.avgVolume ? (selected.technicals.avgVolume / 1e6).toFixed(1) + 'M' : '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">PE</span>
                                                <span className="breakout-tech-value">{selected.technicals?.pe?.toFixed(1) || '-'}</span>
                                            </div>
                                            <div className="breakout-tech-item">
                                                <span className="breakout-tech-label">시가총액</span>
                                                <span className="breakout-tech-value">{selected.technicals?.marketCap ? fmt.dollar(selected.technicals.marketCap) : '-'}</span>
                                            </div>
                                        </div>

                                        {/* 범례 */}
                                        <div className="breakout-legend">
                                            <div className="breakout-legend-item">
                                                <div className="breakout-legend-dot" style={{ background: '#ef4444' }} />
                                                <span>돌파 임박 (75+)</span>
                                            </div>
                                            <div className="breakout-legend-item">
                                                <div className="breakout-legend-dot" style={{ background: '#f59e0b' }} />
                                                <span>매집 단계 (60-74)</span>
                                            </div>
                                            <div className="breakout-legend-item">
                                                <div className="breakout-legend-dot" style={{ background: '#eab308' }} />
                                                <span>중립 (45-59)</span>
                                            </div>
                                            <div className="breakout-legend-item">
                                                <div className="breakout-legend-dot" style={{ background: '#6b7280' }} />
                                                <span>약세 (0-44)</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* 스코어링 설명 */}
                                <div style={{ marginTop: '16px', padding: '14px', background: 'rgba(102, 126, 234, 0.06)', borderRadius: '8px', fontSize: '11px', color: '#718096', lineHeight: 1.7 }}>
                                    <strong style={{ color: '#2d3748' }}>Breakout Score 산출 로직 (7개 기술적 지표 가중합):</strong><br/>
                                    52W 고점 근접도 20% | 거래량 급증 20% | 단기 모멘텀 15% | 50MA 돌파 15% | 골든크로스 10% | 52W 범위 위치 10% | 매수 압력 10%<br/>
                                    <span style={{ color: '#94a3b8' }}>데이터 소스: FMP API /stable/quote (실시간) | 대상: S&P500 시총 상위 80종목</span>
                                </div>
                            </>
                        )}

                        {data && (!data.top_15 || data.top_15.length === 0) && (
                            <div style={{ textAlign: 'center', padding: '40px', color: '#94a3b8' }}>
                                분석 결과가 없습니다.
                            </div>
                        )}
                </div>
            )
        }

        // =============================
        // MAIN APP
        // =============================

        function App() {
            const [selectedSymbol, setSelectedSymbol] = useState(null)

            return (
                <div style={{ background: '#0f172a', minHeight: '100vh' }}>
                    <div className="container">
                        <div className="header">
                            <h1>AI분석_2</h1>
                            <p>개별 종목 발굴 & 매수 판정 시스템</p>
                        </div>

                        <MarketEntryGate />

                        <div style={{ marginTop: '30px' }}>
                            <SingleStockDeepDive symbol={selectedSymbol} />
                        </div>

                        <div style={{ marginTop: '30px' }}>
                            <AlphaDiscoveryScanner onSelectSymbol={setSelectedSymbol} />
                        </div>

                        <div style={{ marginTop: '30px' }}>
                            <BreakoutRadar onSelectSymbol={setSelectedSymbol} />
                        </div>

                        <div style={{ marginTop: '30px' }}>
                            <Top5BreakoutPicks />
                        </div>

                        <div style={{ marginTop: '30px' }}>
                            <CatalystSurgeWidget />
                        </div>

                        <div style={{ textAlign: 'center', color: '#2d3748', fontSize: '12px', marginTop: '40px', paddingBottom: '40px' }}>
                            <p>데이터 소스: FMP API, FRED, Alpha Discovery Engine</p>
                            <p style={{ marginTop: '8px', fontSize: '11px', color: '#2d3748' }}>모든 데이터는 API 응답에서 동적으로 추출됩니다</p>
                        </div>
                    </div>
                </div>
            )
        }

        // ── Top 5 Breakout Picks 컴포넌트 ─────────────────────────────
        function Top5BreakoutPicks() {
            const [stocks, setStocks] = React.useState([])
            const [loading, setLoading] = React.useState(false)
            const [error, setError] = React.useState(null)

            const fetchTop5 = async () => {
                setLoading(true)
                setError(null)
                try {
                    const res = await fetch(API_BASE + '/analysis/catalyst-surge-top5')
                    const data = await res.json()
                    setStocks(Array.isArray(data) ? data : [])
                } catch(e) {
                    setError('Error loading data')
                    console.error(e)
                } finally {
                    setLoading(false)
                }
            }

            React.useEffect(() => { fetchTop5() }, [])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div className="widget-title">5. 🔥 Top 5 Breakout Picks
                            <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>CSS 점수 기준 돌파 후보 Top 5</span>
                        </div>
                        <button className={`btn-refresh ${loading ? 'loading' : ''}`} onClick={fetchTop5} disabled={loading}>↻</button>
                    </div>
                    {loading && <div className="loading">로딩 중...</div>}
                    {error && <div className="error-box">{error} <button onClick={fetchTop5}>재시도</button></div>}
                    {!loading && !error && stocks.length === 0 && (
                        <div style={{ color: 'var(--text-muted)' }}>No breakout candidates</div>
                    )}
                    <div className="top5-grid">
                        {stocks.map((s, i) => (
                            <div
                                key={s.symbol}
                                className="top5-card"
                                onClick={() => window.open(`/analysis/catalyst-surge?symbol=${s.symbol}`)}
                            >
                                <b>#{i + 1} {s.symbol}</b><br />
                                <br />
                                CSS: {s.css != null ? s.css.toFixed(1) : '-'}<br />
                                {s.grade ?? '-'}<br />
                                <br />
                                T:{s.breakdown?.technical ?? '-'} |
                                S:{s.breakdown?.smartMoney ?? '-'} |
                                C:{s.breakdown?.catalyst ?? '-'}<br />
                                <br />
                                📈 Breakout: <span className={s.isBreakout ? 'top5-yes' : 'top5-no'}>{s.isBreakout ? 'YES' : 'NO'}</span><br />
                                🎯 WinRate: {s.backtest?.winRate != null ? s.backtest.winRate.toFixed(1) : '-'}%
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        // ── Catalyst Surge Analysis 위젯 ──────────────────────────────
        function CatalystSurgeWidget() {
            const [symbol, setSymbol] = useState("AAPL")
            const [data, setData] = useState(null)
            const [loading, setLoading] = useState(false)

            const fetchData = async () => {
                if (!symbol) return
                setLoading(true)
                try {
                    const res = await fetch(`${API_BASE}/analysis/catalyst-surge?symbol=${symbol}`)
                    const json = await res.json()
                    setData(json)
                } catch(e) {
                    console.error(e)
                    setData(null)
                }
                setLoading(false)
            }

            useEffect(() => { fetchData() }, [])

            return (
                <div className="widget grid-full">
                    <div className="widget-header">
                        <div>
                            <div className="widget-title">6. 🔥 Catalyst Surge Analysis
                                <span style={{ fontSize: '12px', color: '#718096', marginLeft: '8px', fontWeight: 'normal' }}>CSS = Technical×40% + SmartMoney×35% + Catalyst×25%</span>
                            </div>
                            <div className="widget-subtitle">종목 심층 분석 (기술적 + 스마트머니 + 카탈리스트)</div>
                        </div>
                        <button className={`btn-refresh ${loading ? 'loading' : ''}`} onClick={fetchData} disabled={loading}>↻</button>
                    </div>

                    <div className="input-group" style={{ marginBottom: '16px' }}>
                        <input
                            value={symbol}
                            onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                            placeholder="종목 코드 입력 (예: AAPL)"
                            style={{ fontWeight: '700' }}
                        />
                        <button onClick={fetchData} disabled={loading}>분석</button>
                    </div>

                    {loading && <div className="loading">로딩 중...</div>}
