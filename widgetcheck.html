<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIInvestFlow API Debug Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--surface3:#283548;
  --border:#334155;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa;--cyan:#22d3ee;--orange:#f97316;
  --font:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{max-width:1600px;margin:0 auto;padding:12px}
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{color:var(--muted);font-size:13px}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;font:inherit;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{background:var(--surface3);border-color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.sum-card .val{font-size:26px;font-weight:800}
.sum-card .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.sum-card.ok .val{color:var(--green)}.sum-card.warn .val{color:var(--yellow)}.sum-card.fail .val{color:var(--red)}.sum-card.info .val{color:var(--cyan)}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:7px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .15s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--cyan);background:var(--surface);border-color:var(--border);border-bottom:2px solid var(--cyan)}
.tab .badge{display:inline-block;background:var(--surface3);padding:1px 7px;border-radius:10px;font-size:13px;margin-left:4px}
.panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:300px;max-height:75vh;overflow-y:auto}
.panel.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;background:var(--surface2);color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;font-size:13px}
td{padding:7px 10px;border-bottom:1px solid rgba(51,65,85,.3);vertical-align:top;font-size:13px}
tr:hover td{background:rgba(59,130,246,.04)}
.led{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
.led-ok{background:var(--green);box-shadow:0 0 4px var(--green)}
.led-warn{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.led-fail{background:var(--red);box-shadow:0 0 4px var(--red)}
.led-wait{background:var(--dim);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.v-ok{color:var(--green)}.v-warn{color:var(--yellow)}.v-fail{color:var(--red)}.v-null{color:var(--dim);font-style:italic}
.v-num{color:var(--cyan)}.v-str{color:var(--purple)}
.fgroup{margin-bottom:16px}
.fgroup-title{font-size:14px;font-weight:700;color:var(--blue);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between}
.fgroup-title .cnt{color:var(--muted);font-weight:400;font-size:12px}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));transition:width .3s;border-radius:2px}
.log{font-size:12px;color:var(--dim);max-height:140px;overflow-y:auto;padding:10px;background:var(--bg);border-radius:4px;margin-top:8px}
.log-line{padding:2px 0}.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-fail{color:var(--red)}
.search{padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:13px;width:220px}
.search::placeholder{color:var(--dim)}
.sym-input{padding:6px 10px;background:var(--bg);border:1px solid var(--orange);border-radius:6px;color:var(--orange);font:inherit;font-size:14px;font-weight:800;width:95px;text-align:center;text-transform:uppercase}
.sym-input:focus{outline:none;border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,.2)}
.sym-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:linear-gradient(90deg,rgba(249,115,22,.08),rgba(34,211,238,.08));border:1px solid var(--border);border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.sym-bar label{color:var(--orange);font-weight:700;font-size:14px}
.sym-bar .hint{color:var(--dim);font-size:12px}
.sym-quick{padding:4px 10px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--muted);cursor:pointer}
.sym-quick:hover{background:var(--surface3);color:var(--text);border-color:var(--cyan)}
.field-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.field-card-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--cyan);display:flex;justify-content:space-between;align-items:center}
@media(max-width:768px){.app{padding:8px}.hdr{padding:12px}.summary{grid-template-columns:repeat(2,1fr)}.tabs{gap:2px}.tab{padding:5px 10px;font-size:12px}}
</style>
</head>

function gv(o,p){return p.split('.').reduce((a,k)=>(a&&a[k]!==undefined)?a[k]:undefined,o)}
async function fw(u,o={},t=20000){const c=new AbortController(),tm=setTimeout(()=>c.abort(),t),t0=performance.now();try{const r=await fetch(u,{...o,signal:c.signal});const ms=Math.round(performance.now()-t0);if(!r.ok)return{ok:false,status:r.status,ms,data:null,error:`HTTP ${r.status}`};const d=await r.json();return{ok:true,status:r.status,ms,data:d,error:null}}catch(e){return{ok:false,status:0,ms:Math.round(performance.now()-t0),data:null,error:e.name==='AbortError'?'TIMEOUT':e.message}}finally{clearTimeout(tm)}}
function lc(s){return s==='ok'?'led-ok':s==='warn'?'led-warn':s==='fail'?'led-fail':'led-wait'}
function vd(v){if(v===undefined)return'<span class="v-null">undefined</span>';if(v===null)return'<span class="v-null">null</span>';if(typeof v==='number')return`<span class="v-num">${v}</span>`;if(typeof v==='string')return`<span class="v-str">"${v.substring(0,60)}"</span>`;if(typeof v==='boolean')return`<span class="v-num">${v}</span>`;if(Array.isArray(v))return`<span class="v-str">Array[${v.length}]</span>`;if(typeof v==='object')return`<span class="v-str">Object{${Object.keys(v).length}}</span>`;return String(v)}

function addLog(m,t='ok'){S.log.unshift({m,t,ts:new Date().toLocaleTimeString('ko-KR')});if(S.log.length>200)S.log.pop()}
function epUrl(ep,sym){let p=ep.path;if(ep.needsSymbol)p+=(p.includes('?')?'&':'?')+'symbol='+(sym||S.sym);return API+p}

async function testEp(ep){const url=epUrl(ep);const opts=ep.method==='POST'?{method:'POST'}:{};const r=await fw(url,opts);let nc=0;if(r.ok&&r.data)nc=(JSON.stringify(r.data).match(/:null/g)||[]).length;const st=!r.ok?'fail':nc>5?'warn':'ok';S.res[ep.id]={...r,nullCount:nc,status:st};if(ep.id==='market'&&r.data)S.marketData=r.data;if(ep.id==='discovery'&&r.data)S.discoveryData=r.data;addLog(`${st==='ok'?'вң…':st==='warn'?'вҡ пёҸ':'вқҢ'} ${ep.path}${ep.needsSymbol?' ['+S.sym+']':''} вҶ’ ${r.ms}ms${nc>0?' (null:'+nc+')':''}`,st);return st}

async function testFred(){S.testing=true;S.tab='fred';S.prog=0;S.progT=FRED_SERIES.length;S.fredRawDebug=null;render();try{addLog('рҹ”¬ FRED мӢңлҰ¬мҰҲ н…ҢмҠӨнҠё');for(let i=0;i<FRED_SERIES.length;i++){const sid=FRED_SERIES[i];S.prog=i+1;const res=await fw(`${API}/?series=${sid}`);
// мІ« лІҲм§ё мқ‘лӢө кө¬мЎ° м ҖмһҘ (л””лІ„к·ёмҡ©)
if(i===0&&res.data)S.fredRawDebug=res.data;
// лӢӨмӨ‘ кІҪлЎң fallbackмңјлЎң к°’ м¶”м¶ң
const d=res.data;
const v=d?.value??d?.observations?.[0]?.value??d?.[0]?.value??d?.data?.value??(Array.isArray(d)&&d.length?d[0]?.value:undefined)??d?.result?.value??d?.latest_value??d?.val;
const st=res.ok&&v!=null?'ok':res.ok?'warn':'fail';S.fredRes[sid]={...res,value:v,status:st};addLog(`${st==='ok'?'вң…':'вҡ пёҸ'} FRED ${sid} вҶ’ ${v??'null'} (${res.ms}ms)`,st);render();await new Promise(resolve=>setTimeout(resolve,60))}addLog('вң… FRED мҷ„лЈҢ');}finally{S.testing=false;render()}}

async function testSymbol(sym){
  if(!sym)sym=S.sym;S.sym=sym.toUpperCase();S.testing=true;S.symRes={};render();
  const eps=ENDPOINTS.filter(e=>e.needsSymbol);S.prog=0;S.progT=eps.length;
  addLog(`рҹ”Қ мў…лӘ© м „мІҙ мЎ°нҡҢ: ${S.sym} (${eps.length}к°ң м—”л“ңнҸ¬мқёнҠё)`);
  for(let i=0;i<eps.length;i++){
    const ep=eps[i];S.prog=i+1;render();
    const r=await fw(epUrl(ep,S.sym),ep.method==='POST'?{method:'POST'}:{});
    const st=!r.ok?'fail':'ok';S.res[ep.id]={...r,nullCount:0,status:st};
    const fd=(SYM_FIELDS[ep.id]||[]).map(p=>({path:p,value:gv(r.data,p),status:gv(r.data,p)!=null?'ok':'warn'}));
    S.symRes[ep.id]={result:r,fields:fd,ep};
    addLog(`${st==='ok'?'вң…':'вқҢ'} ${ep.path} [${S.sym}] вҶ’ ${r.ms}ms`,st);
    await new Promise(r=>setTimeout(r,80));
  }
  S.testing=false;S.tab='symbol';addLog(`вң… ${S.sym} мЎ°нҡҢ мҷ„лЈҢ`);render();
}

async function testOne(id){const ep=ENDPOINTS.find(e=>e.id===id);if(!ep)return;addLog(`рҹ”„ ${ep.path}`);await testEp(ep);render()}

function exportCSV(){let c='Category,Endpoint,Symbol,Status,Ms,Nulls,Error\n';ENDPOINTS.forEach(e=>{const r=S.res[e.id];if(r)c+=`${e.cat},${e.path},${e.needsSymbol?S.sym:'-'},${r.status},${r.ms},${r.nullCount||0},${r.error||''}\n`});c+='\nFRED,Status,Value,Ms,Error\n';Object.entries(S.fredRes).forEach(([s,r])=>c+=`${s},${r.status},${r.value??'null'},${r.ms},${r.error||''}\n`);const b=new Blob(['\uFEFF'+c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`debug_${S.sym}_${Date.now()}.csv`;a.click()}

// resolve value for calc widget inputs (supports "top_20.0.field" paths)
function getCalcValue(srcEpPath, fieldPath) {
  // determine which cached data to use
  let data = null;
  if (srcEpPath.includes('/market')) data = S.marketData;
  else if (srcEpPath.includes('/alpha/discovery')) data = S.discoveryData;
  else if (srcEpPath.includes('/feargreed')) data = S.res['feargreed']?.data;
  else if (srcEpPath.includes('/analysis/market-regime')) data = S.res['a-regime']?.data;
  else if (srcEpPath.includes('/analysis/volatility-regime')) data = S.res['a-vol']?.data;
  else if (srcEpPath.includes('/analysis/credit-stress')) data = S.res['a-credit']?.data;
  else if (srcEpPath.includes('/analysis/sector-rotation')) data = S.res['a-sector']?.data;
  else if (srcEpPath.includes('/alpha/breakout')) data = S.res['breakout']?.data;
  else if (srcEpPath.includes('/alpha/alpha-scanner')) data = S.res['scanner']?.data;
  else if (srcEpPath.includes('catalyst-surge-top5')) data = S.res['cs-top5']?.data;
  else if (srcEpPath.includes('catalyst-surge')) data = S.res['cs']?.data;
  else if (srcEpPath.includes('/alpha?symbol') || srcEpPath.includes('/alpha')) data = S.res['alpha']?.data;
  else if (srcEpPath.includes('/fundamentals/growth')) data = S.res['f-growth']?.data;
  else if (srcEpPath.includes('/fundamentals/income')) data = S.res['f-income']?.data;
  else if (srcEpPath.includes('/fundamentals/balance')) data = S.res['f-balance']?.data;
  else if (srcEpPath.includes('/fundamentals/cashflow')) data = S.res['f-cashflow']?.data;
  else if (srcEpPath.includes('/fundamentals/profile')) data = S.res['f-profile']?.data;
  if (!data) return undefined;
  // handle array index paths like "top_20.0.score"
  return fieldPath.split('.').reduce((o, k) => {
    if (o == null) return undefined;
    if (/^\d+$/.test(k)) return Array.isArray(o) ? o[parseInt(k)] : undefined;
    return o[k];
  }, data);
}

async function loadCalcData() {
  S.testing = true; S.prog = 0; render();
  addLog('рҹ“җ мӢңмһҘ лҚ°мқҙн„° лЎңл“ң мӢңмһ‘ (market+discovery+analysis)');
  const toTest = ['market','discovery','feargreed','a-regime','a-vol','a-credit','a-sector','breakout','scanner','cs-top5'];
  S.progT = toTest.length;
  for (let i = 0; i < toTest.length; i++) {
    const ep = ENDPOINTS.find(e => e.id === toTest[i]);
    if (!ep) continue;
    if (S.res[ep.id]?.data) { S.prog = i+1; continue; }
    S.prog = i + 1; render();
    await testEp(ep);
    await new Promise(r => setTimeout(r, 80));
  }
  S.testing = false; S.tab = 'calc'; addLog('рҹ“җ мӢңмһҘ лҚ°мқҙн„° лЎңл“ң мҷ„лЈҢ'); render();
}

// мў…лӘ© кІҖмғү: мў…лӘ© кҙҖл Ё мң„м Ҝ лҚ°мқҙн„° лЎңл“ң
async function loadCalcSymbol(sym) {
  if (!sym) sym = S.calcSym;
  S.calcSym = sym.toUpperCase(); S.calcSymData = {};
  S.testing = true; render();
  const symEps = [
    {id:'_c_alpha', path:`/alpha?symbol=${S.calcSym}`},
    {id:'_c_fg',    path:`/fundamentals/growth?symbol=${S.calcSym}`},
    {id:'_c_fi',    path:`/fundamentals/income?symbol=${S.calcSym}`},
    {id:'_c_fb',    path:`/fundamentals/balance?symbol=${S.calcSym}`},
    {id:'_c_fc',    path:`/fundamentals/cashflow?symbol=${S.calcSym}`},
    {id:'_c_fp',    path:`/fundamentals/profile?symbol=${S.calcSym}`},
    {id:'_c_cs',    path:`/analysis/catalyst-surge?symbol=${S.calcSym}`},
    {id:'_c_stock', path:`/stock?symbol=${S.calcSym}`},
  ];
  S.progT = symEps.length; S.prog = 0;
  addLog(`рҹ“җрҹҺҜ мў…лӘ© кі„мӮ°мӢқ лҚ°мқҙн„° лЎңл“ң: ${S.calcSym}`);
  for (let i = 0; i < symEps.length; i++) {
    S.prog = i + 1; render();
    const r = await fw(API + symEps[i].path);
    S.calcSymData[symEps[i].id] = r.ok ? r.data : null;
    addLog(`${r.ok ? 'вң…' : 'вқҢ'} ${symEps[i].path} вҶ’ ${r.ms}ms`, r.ok ? 'ok' : 'fail');
    await new Promise(r => setTimeout(r, 80));
  }
  S.testing = false; addLog(`рҹ“җрҹҺҜ ${S.calcSym} мў…лӘ© лҚ°мқҙн„° лЎңл“ң мҷ„лЈҢ`); render();
}

// discoveryм—җм„ң нҠ№м • нӢ°м»Ө кІҖмғү
function searchDiscTicker(sym) {
  S.calcDiscTicker = sym.toUpperCase();
  S.calcDiscMatch = null;
  if (!S.discoveryData?.top_20) { addLog(`вҡ пёҸ discovery лҚ°мқҙн„° м—ҶмқҢ - лЁјм Җ мӢңмһҘ лҚ°мқҙн„° лЎңл“ң`, 'warn'); render(); return; }
  const found = S.discoveryData.top_20.find(s => s.symbol === S.calcDiscTicker);
  if (found) { S.calcDiscMatch = found; addLog(`вң… Discoveryм—җм„ң ${S.calcDiscTicker} л°ңкІ¬: score=${found.score}`, 'ok'); }
  else { addLog(`вҡ пёҸ Discovery top_20м—җ ${S.calcDiscTicker} м—ҶмқҢ (S&P500 Top80 мң лӢҲлІ„мҠӨ н•ңм •)`, 'warn'); }
  render();
}

// get value for calc: symbol endpoints use calcSymData
function getCalcValueSym(srcEpPath, fieldPath) {
  let data = null;
  if (srcEpPath.includes('/alpha?symbol') || srcEpPath === '/alpha') data = S.calcSymData['_c_alpha'];
  else if (srcEpPath.includes('/fundamentals/growth')) data = S.calcSymData['_c_fg'];
  else if (srcEpPath.includes('/fundamentals/income')) data = S.calcSymData['_c_fi'];
  else if (srcEpPath.includes('/fundamentals/balance')) data = S.calcSymData['_c_fb'];
  else if (srcEpPath.includes('/fundamentals/cashflow')) data = S.calcSymData['_c_fc'];
  else if (srcEpPath.includes('/fundamentals/profile')) data = S.calcSymData['_c_fp'];
  else if (srcEpPath.includes('catalyst-surge') && !srcEpPath.includes('top5')) data = S.calcSymData['_c_cs'];
  else if (srcEpPath.includes('/stock')) data = S.calcSymData['_c_stock'];
  if (!data) return undefined;
  return fieldPath.split('.').reduce((o,k)=>{ if(o==null)return undefined; if(/^\d+$/.test(k))return Array.isArray(o)?o[parseInt(k)]:undefined; return o[k]; }, data);
}

}

// discovery л§Өм№ӯ мў…лӘ© мғҒм„ё (н•ҙлӢ№ мң„м Ҝ кі„мӮ°мӢқ м Ғмҡ©)
function renderDiscMatchDetail(w) {
  const s = S.calcDiscMatch;
  if (!s) return '';
  // мң„м Ҝлі„ кі„мӮ° мӢңл®¬л Ҳмқҙм…ҳ
  const wid = w.page + '-' + w.id;
  let calcResult = '';
  const mom = s.momentum||0, ma50 = s.ma50trend||0, str = s.str52w||50, vol = s.volSurge||0, pe = s.pe||0;
  if (wid === 'л¶„м„қ3-4') {
    const sc = mom*0.60 + ma50*0.40;
    calcResult = `<b>score = ${mom.toFixed(2)}Г—60% + ${ma50.toFixed(2)}Г—40% = <span class="v-num">${sc.toFixed(2)}</span></b>`;
  } else if (wid === 'л¶„м„қ3-5') {
    const sc = ma50*0.50 + (str-50)*0.30 + mom*0.20;
    calcResult = `<b>score = ${ma50.toFixed(2)}Г—50% + (${str.toFixed(1)}-50)Г—30% + ${mom.toFixed(2)}Г—20% = <span class="v-num">${sc.toFixed(2)}</span></b>`;
  } else if (wid === 'л¶„м„қ3-6') {
    const vc = Math.min(100,Math.max(-30,vol));
    const sc = vc*0.50 + mom*0.30 + ma50*0.20;
    calcResult = `<b>score = clamp(${vol.toFixed(0)})Г—50% + ${mom.toFixed(2)}Г—30% + ${ma50.toFixed(2)}Г—20% = <span class="v-num">${sc.toFixed(2)}</span></b>`;
  } else if (wid === 'л¶„м„қ3-7') {
    const pe_sc = (pe>0&&pe<150)?Math.min(25,250/pe):0;
    const sc = pe_sc*0.40 + ma50*0.35 + (str-50)*0.25;
    calcResult = `<b>score = min(25,250/${pe.toFixed(1)})Г—40% + ${ma50.toFixed(2)}Г—35% + (${str.toFixed(1)}-50)Г—25% = <span class="v-num">${sc.toFixed(2)}</span></b>`;
  } else if (wid === 'л¶„м„қ3-10') {
    const vix = S.marketData?.US_MARKET?.VIX?.price||20;
    const vixSc = Math.max(0,Math.min(20,30-vix));
    const pe_sc = (pe>0&&pe<150)?Math.min(15,150/pe):0;
    const vol_sc = Math.min(20,Math.max(-5,vol/5));
    const sc = mom*0.20 + ma50*0.20 + (str-50)*0.20 + vol_sc*0.20 + pe_sc*0.10 + vixSc*0.10;
    calcResult = `<b>score = ${mom.toFixed(2)}Г—20% + ${ma50.toFixed(2)}Г—20% + (${str.toFixed(1)}-50)Г—20% + ${vol_sc.toFixed(1)}Г—20% + ${pe_sc.toFixed(1)}Г—10% + ${vixSc.toFixed(1)}(VIX=${vix.toFixed(1)})Г—10% = <span class="v-num">${sc.toFixed(2)}</span></b>`;
  }
  return `<div style="margin-top:8px;padding:8px;background:rgba(34,211,238,.06);border:1px solid var(--cyan);border-radius:6px;font-size:13px">
    <div style="color:var(--cyan);font-weight:700;margin-bottom:4px">рҹ“Ҡ ${s.symbol} кі„мӮ° мӢңл®¬л Ҳмқҙм…ҳ</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:4px 12px;margin-bottom:6px">
      <div><span style="color:var(--muted)">momentum:</span> <span class="v-num">${mom.toFixed(2)}%</span></div>
      <div><span style="color:var(--muted)">ma50trend:</span> <span class="v-num">${ma50.toFixed(2)}%</span></div>
      <div><span style="color:var(--muted)">str52w:</span> <span class="v-num">${str.toFixed(1)}%</span></div>
      <div><span style="color:var(--muted)">volSurge:</span> <span class="v-num">${vol.toFixed(0)}%</span></div>
      <div><span style="color:var(--muted)">pe:</span> <span class="v-num">${pe.toFixed(1)}</span></div>
      <div><span style="color:var(--muted)">price:</span> <span class="v-num">${(s.price||0).toFixed(2)}</span></div>
    </div>
    ${calcResult ? `<div style="padding:4px 8px;background:var(--bg);border-radius:4px">${calcResult}</div>` : ''}
  </div>`;
}

      <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap">${['AAPL','NVDA','TSLA','MSFT','AMD','PLTR','AVGO','DDOG'].map(s=>`<button class="sym-quick" onclick="document.getElementById('calcSymIn').value='${s}';loadCalcSymbol('${s}')">${s}</button>`).join('')}</div>
    </div>
    ${!hasData ? '<div style="text-align:center;padding:30px;color:var(--muted)">лЁјм Җ "мӢңмһҘ лҚ°мқҙн„° лЎңл“ң" лІ„нҠјмқ„ лҲҢлҹ¬мЈјм„ёмҡ”</div>' : ''}
    ${pages.map(page => {

        ${widgets.map(w => renderCalcWidget(w, hasSymData)).join('')}

}

function render(){
  const res=S.res,total=Object.keys(res).length;
  const okC=Object.values(res).filter(r=>r.status==='ok').length,warnC=Object.values(res).filter(r=>r.status==='warn').length,failC=Object.values(res).filter(r=>r.status==='fail').length;
  const avgMs=total>0?Math.round(Object.values(res).reduce((a,r)=>a+r.ms,0)/total):0;
  let mfOk=0;const mfT=MARKET_FIELDS.length;if(S.marketData)MARKET_FIELDS.forEach(f=>{if(gv(S.marketData,f.p)!=null)mfOk++});
  const fredT=Object.keys(S.fredRes).length,fredOk=Object.values(S.fredRes).filter(r=>r.status==='ok').length;
  const symCount=Object.keys(S.symRes).length;
  const tabs=[{id:'endpoints',label:'м „мІҙ м—”л“ңнҸ¬мқёнҠё',badge:ENDPOINTS.length},{id:'calc',label:'рҹ“җ мң„м Ҝ кі„мӮ°мӢқ',badge:WIDGET_CALC.length},{id:'symbol',label:`рҹ”Қ мў…лӘ© мЎ°нҡҢ [${S.sym}]`,badge:symCount||''},{id:'market',label:'/market мғҒм„ё',badge:MARKET_FIELDS.length},{id:'discovery',label:'/discovery',badge:'20'},{id:'analysis',label:'Analysis',badge:'20'},{id:'fred',label:'FRED',badge:FRED_SERIES.length},{id:'kvcache',label:'рҹ—„пёҸ KV Cache',badge:''},{id:'raw',label:'Raw JSON',badge:''}];

  document.getElementById('app').innerHTML=`
    <div class="hdr"><div><h1>рҹ”¬ AIInvestFlow API Debug Dashboard</h1><div class="hdr-sub">API: ${API} | EP: ${ENDPOINTS.length} | /marketн•„л“ң: ${mfT} | FRED: ${FRED_SERIES.length}</div></div>
    <div class="hdr-actions"><button class="btn btn-primary" onclick="testAll()" ${S.testing?'disabled':''}>${S.testing?`вҸі ${S.prog}/${S.progT}`:'в–¶ м „мІҙ н…ҢмҠӨнҠё'}</button><button class="btn" onclick="testFred()" ${S.testing?'disabled':''}>рҹ”¬ FRED</button><button class="btn" onclick="exportCSV()">рҹ“Ҙ CSV</button></div></div>

      <span class="hint">stock + alpha + fundamentals(8) + catalyst-surge + earnings м „л¶Җ нҳём¶ң</span>
      <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap">${['AAPL','NVDA','TSLA','MSFT','AMZN','META','GOOGL','AMD','PLTR','AVGO','DDOG','CRWD'].map(s=>`<button class="sym-quick" onclick="document.getElementById('symIn').value='${s}';testSymbol('${s}')">${s}</button>`).join('')}</div>
    </div>
    ${S.testing?`<div class="progress-bar"><div class="progress-fill" style="width:${(S.prog/S.progT*100).toFixed(0)}%"></div></div>`:''}
    <div class="summary">
      <div class="sum-card ok"><div class="val">${okC}</div><div class="lbl">м„ұкіө</div></div>
      <div class="sum-card warn"><div class="val">${warnC}</div><div class="lbl">кІҪкі </div></div>
      <div class="sum-card fail"><div class="val">${failC}</div><div class="lbl">мӢӨнҢЁ</div></div>

      <div class="sum-card ${mfOk===mfT?'ok':'warn'}"><div class="val">${mfOk}/${mfT}</div><div class="lbl">/market</div></div>
      <div class="sum-card ${fredOk===fredT?'ok':'warn'}"><div class="val">${fredOk}/${fredT}</div><div class="lbl">FRED</div></div>

    <div class="tabs">${tabs.map(t=>`<div class="tab ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render()">${t.label}${t.badge?`<span class="badge">${t.badge}</span>`:''}</div>`).join('')}</div>
    ${rPanel()}
    <div class="log" style="margin-top:12px">${S.log.slice(0,50).map(l=>`<div class="log-line log-${l.t}">[${l.ts}] ${l.m}</div>`).join('')}</div>`;
}

function rPanel(){switch(S.tab){case'endpoints':return rEP();case'calc':return rCalc();case'symbol':return rSym();case'market':return rMkt();case'discovery':return rDisc();case'analysis':return rAnal();case'fred':return rFredP();case'kvcache':return rKvCache();case'raw':return rRaw();default:return'<div class="panel active">-</div>'}}

function rEP(){

  ${cats.map(cat=>{const eps=ENDPOINTS.filter(e=>e.cat===cat&&(!S.filter||e.path.includes(S.filter)||e.desc.includes(S.filter)));if(!eps.length)return'';

    ${eps.map(ep=>{const r=S.res[ep.id],st=r?r.status:'wait';return`<tr><td><span class="led ${lc(st)}"></span></td><td style="font-weight:600;color:${st==='fail'?'var(--red)':st==='warn'?'var(--yellow)':'var(--text)'}">${ep.method!=='GET'?`<span style="color:var(--orange)">[${ep.method}]</span> `:''}${ep.path}${ep.needsSymbol?` <span style="color:var(--orange);font-size:12px">[${S.sym}]</span>`:''}</td><td style="color:var(--muted)">${ep.desc}</td><td>${r?r.ms+'ms':'-'}</td><td>${r?(r.nullCount>0?`<span class="v-warn">${r.nullCount}</span>`:'<span class="v-ok">0</span>'):'-'}</td><td><button class="btn btn-sm" onclick="testOne('${ep.id}')" ${S.testing?'disabled':''}>в–¶</button></td></tr>`}).join('')}

function rSym(){
  const entries=Object.entries(S.symRes);
  if(!entries.length)return`<div class="panel active"><div style="text-align:center;padding:40px;color:var(--muted)">мғҒлӢЁ кІҖмғүл°”м—җм„ң нӢ°м»Ө мһ…л Ҙ нӣ„ Enter<br><br>12к°ң symbol м—”л“ңнҸ¬мқёнҠёмқҳ <b>лӘЁл“  н•„л“ң</b>лҘј н•ң лІҲм—җ кІҖмҰқн•©лӢҲлӢӨ<br><br><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px">${['NVDA','TSLA','AAPL','PLTR'].map(s=>`<button class="btn btn-primary" onclick="testSymbol('${s}')">рҹ”Қ ${s} н…ҢмҠӨнҠё</button>`).join('')}</div></div></div>`;
  return`<div class="panel active">

        ${r.error?`<div style="color:var(--red);font-size:13px;margin-bottom:6px">вқҢ ${r.error}</div>`:''}
        ${fields.length?`<table><tr><th style="width:24px"></th><th>н•„л“ң кІҪлЎң</th><th>к°’</th><th>нғҖмһ…</th></tr>
        ${fields.map(f=>`<tr><td><span class="led ${lc(f.status)}"></span></td><td style="font-weight:600;font-size:12px">${f.path}</td><td>${vd(f.value)}</td><td style="color:var(--dim);font-size:12px">${f.value!=null?typeof f.value:'-'}</td></tr>`).join('')}</table>`
        :`<pre style="font-size:11px;color:var(--cyan);max-height:200px;overflow:auto;background:var(--surface2);padding:8px;border-radius:4px">${r.data?JSON.stringify(r.data,null,2):'null'}</pre>`}
      </div>`}).join('')}

}

// в”Җв”Җ KV Cache нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadKvCache(syms){
  S.kvLoading=true;render();
  try{
    const defaultSyms='MO,VZ,T,PM,DUK,TXN,QCOM,ORCL,MSFT,AVGO,NVDA,AMD,PLTR,MU,META,GOOGL';
    const url=`${API}/metricz-debug?symbols=${syms||defaultSyms}`;
    const r=await fw(url,{},30000);
    if(!r.ok){S.kvData={error:`HTTP ${r.status}: ${r.error}`};addLog(`вқҢ KV Cache HTTPмҳӨлҘҳ: ${r.error}`,'fail');S.kvLoading=false;render();return;}
    const tc=r.data?.total_cached;
    S.kvData=r.data;
    if(!tc){
      addLog(`вҡ пёҸ KV Cache л№„м–ҙмһҲмқҢ вҖ” [рҹ”„ мәҗмӢң к°ұмӢ ] лІ„нҠјмқ„ лҲҢлҹ¬мЈјм„ёмҡ” (${r.ms}ms)`,'warn');
    } else {
      addLog(`вң… KV Cache лЎңл“ң: ${tc}мў…лӘ© мәҗмӢңлҗЁ (${r.ms}ms)`,'ok');
    }
  }catch(e){S.kvData={error:e.message};addLog(`вқҢ ${e.message}`,'fail');}
  S.kvLoading=false;render();
}
async function refreshKvCache(){
  if(!confirm('вҡ пёҸ 180мў…лӘ© Г— 4 FMP API нҳём¶ң вҖ” м•Ҫ 60~120мҙҲ мҶҢмҡ”лҗ©лӢҲлӢӨ. м§„н–үн• к№Ңмҡ”?'))return;
  S.kvLoading=true;S.kvData=null;addLog('рҹ”„ мәҗмӢң к°ұмӢ  мӢңмһ‘ (мөңлҢҖ 2л¶„ лҢҖкё°)...');render();
  try{
    const r=await fw(`${API}/metricz-refresh`,{},150000);
    if(r.ok&&r.data?.ok){
      addLog(`вң… к°ұмӢ  мҷ„лЈҢ: ${r.data.stocks_cached}мў…лӘ©, ${r.data.elapsed_sec}мҙҲ мҶҢмҡ”`,'ok');
      await loadKvCache();
    } else {
      addLog(`вқҢ к°ұмӢ  мӢӨнҢЁ: ${r.data?.error||r.error||'unknown'}`,'fail');
      S.kvData={error:r.data?.error||r.error||'к°ұмӢ  мӢӨнҢЁ'};
    }
  }catch(e){addLog(`вқҢ ${e.message}`,'fail');S.kvData={error:e.message};}
  S.kvLoading=false;render();
}
function rKvCache(){
  const d=S.kvData;
  const METRICS=['revenueGrowth','epsgrowth','operatingIncomeGrowth','dividendYieldTTM','payoutRatioTTM',
    'returnOnEquityTTM','operatingProfitMarginTTM','returnOnAssetsTTM','netProfitMarginTTM',
    'peRatioTTM','priceToBookRatioTTM','priceToSalesRatioTTM','enterpriseValueOverEBITDATTM',
    'freeCashFlowYieldTTM','debtEquityRatioTTM','currentRatioTTM'];
  const fmtV=v=>{
    if(v==null)return`<span style="color:#ef4444;font-weight:700">null</span>`;
    const n=parseFloat(v);
    if(isNaN(n))return`<span style="color:#f59e0b">${v}</span>`;
    // л№„мңЁнҳ• м§Җн‘ңлҠ” % н‘ңмӢң (мһ‘мқҖ мҶҢмҲҳк°’)
    if(Math.abs(n)<10)return`<span style="color:#10b981">${(n*100).toFixed(2)}%</span>`;
    return`<span style="color:#10b981">${n.toFixed(2)}</span>`;
  };
  let symsHtml='';
  if(d&&d.data){
    const syms=Object.keys(d.data);
    symsHtml=`<table style="font-size:11px;border-collapse:collapse;width:100%;overflow-x:auto">
      <tr style="background:#1e293b;position:sticky;top:0"><th style="padding:4px 6px;min-width:60px">мў…лӘ©</th>${METRICS.map(m=>`<th style="padding:4px 4px;min-width:80px;font-size:10px">${m.replace('TTM','').replace('Ratio','R')}</th>`).join('')}</tr>
      ${syms.map(sym=>{
        const s=d.data[sym];
        if(!s)return`<tr><td style="padding:3px 6px;font-weight:700;color:#94a3b8">${sym}</td><td colspan="${METRICS.length}" style="color:#ef4444;padding:3px 6px">вқҢ мәҗмӢң м—ҶмқҢ</td></tr>`;
        return`<tr style="border-bottom:1px solid #1e293b"><td style="padding:3px 6px;font-weight:700;color:#e2e8f0">${sym}</td>${METRICS.map(m=>`<td style="padding:3px 4px;text-align:right">${fmtV(s[m])}</td>`).join('')}</tr>`;
      }).join('')}
    </table>`;
    // null нҶөкі„
    const ns=d.null_stats||{};
    symsHtml+=`<div style="margin-top:12px"><div style="color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:6px">рҹ“Ҡ м „мІҙ ${d.total_cached}мў…лӘ© null нҶөкі„</div>
      <table style="font-size:11px;border-collapse:collapse"><tr style="background:#1e293b"><th style="padding:4px 8px">м§Җн‘ң</th><th style="padding:4px 8px">мң нҡЁ</th><th style="padding:4px 8px">null</th><th style="padding:4px 8px">nullл№„мңЁ</th></tr>
      ${Object.entries(ns).map(([m,v])=>`<tr style="border-bottom:1px solid #1e293b"><td style="padding:3px 8px;color:#cbd5e1">${m}</td><td style="padding:3px 8px;color:#10b981;text-align:right">${v.valid_count}</td><td style="padding:3px 8px;color:${v.null_count>50?'#ef4444':'#f59e0b'};text-align:right">${v.null_count}</td><td style="padding:3px 8px;color:${v.null_count>50?'#ef4444':'#f59e0b'};text-align:right">${v.null_pct}</td></tr>`).join('')}
      </table></div>`;
  }
  const symInput=`<input id="kvSymIn" placeholder="MO,VZ,PLTR,NVDA..." style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:4px 8px;border-radius:6px;font-size:12px;width:280px">`;
  const emptyWarning=d&&!d.error&&!d.total_cached?`<div style="background:rgba(245,158,11,.1);border:1px solid #f59e0b;border-radius:8px;padding:12px 16px;margin-bottom:12px;color:#fcd34d">
    вҡ пёҸ <strong>KV мәҗмӢңк°Җ л№„м–ҙмһҲмҠөлӢҲлӢӨ</strong> вҖ” cronмқҙ н•ң лІҲлҸ„ мӢӨн–үлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.<br>
    <span style="font-size:12px;opacity:.8">[рҹ”„ мәҗмӢң к°ұмӢ ] лІ„нҠјмқ„ лҲҢлҹ¬ 180мў…лӘ© лҚ°мқҙн„°лҘј мҲҳлҸҷмңјлЎң мұ„мҡ°м„ёмҡ” (1~2л¶„ мҶҢмҡ”)</span>
  </div>`:'';
  return`<div class="panel active">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-primary" onclick="loadKvCache()" ${S.kvLoading?'disabled':''}>в–¶ мәҗмӢң нҷ•мқё</button>
      <button class="btn" style="background:#dc2626" onclick="refreshKvCache()" ${S.kvLoading?'disabled':''}>рҹ”„ мәҗмӢң к°ұмӢ  (1~2л¶„)</button>
      ${symInput}
      <button class="btn" onclick="loadKvCache(document.getElementById('kvSymIn').value||undefined)" ${S.kvLoading?'disabled':''}>кІҖмғү</button>
      ${d&&d.total_cached?`<span style="color:var(--muted);font-size:11px">мәҗмӢң: ${d.cache_timestamp||'-'} | ${d.total_cached}мў…лӘ©</span>`:''}
    </div>
    ${emptyWarning}
    ${S.kvLoading?'<div style="color:var(--cyan);padding:20px">рҹ”„ мІҳлҰ¬ мӨ‘...</div>':d?d.error?`<div style="background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:8px;padding:12px;color:#fca5a5">вқҢ ${d.error}</div>`:symsHtml:'<div style="color:var(--muted);padding:20px;text-align:center">в–¶ мәҗмӢң нҷ•мқё лІ„нҠјмқ„ лҲҢлҹ¬мЈјм„ёмҡ”</div>'}
  </div>`;
}

function rRaw(){
  const opts=ENDPOINTS.filter(e=>S.res[e.id]).map(e=>`<option value="${e.id}" ${e.id===S._rawSel?'selected':''}>${e.path}${e.needsSymbol?' ['+S.sym+']':''}</option>`).join('');
  const r=S._rawSel?S.res[S._rawSel]:null;
  return`<div class="panel active"><select class="search" style="width:350px" onchange="S._rawSel=this.value;render()"><option value="">-- м„ нғқ --</option>${opts}</select>
  ${r&&r.data?`<pre style="background:var(--bg);padding:12px;border-radius:6px;font-size:12px;max-height:60vh;overflow:auto;white-space:pre-wrap;word-break:break-all;color:var(--cyan);margin-top:8px">${JSON.stringify(r.data,null,2)}</pre>`:'<div style="color:var(--muted);padding:20px;text-align:center">лҚ°мқҙн„° м—ҶмқҢ</div>'}
  </div>`;
}

render();
