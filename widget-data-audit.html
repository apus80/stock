<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위젯 데이터 감시 - AI분석 1,2,3 필드값 통계</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --orange: #fb8500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1900px; margin: 0 auto; }

        h1 {
            color: var(--blue);
            margin-bottom: 5px;
            font-size: 22px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 11px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 8px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
        }

        button:hover {
            background: var(--border);
        }

        .analysis-section {
            margin-bottom: 30px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .analysis-header {
            background: var(--bg3);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            color: var(--blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .analysis-title {
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .stat-value.total { background: var(--bg); color: var(--blue); }
        .stat-value.complete { background: rgba(63, 185, 80, 0.2); color: var(--green); }
        .stat-value.loading { background: rgba(210, 153, 34, 0.2); color: var(--yellow); }
        .stat-value.error { background: rgba(248, 81, 73, 0.2); color: var(--red); }

        .widget-list {
            padding: 15px;
        }

        .widget-item {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            border-left: 3px solid var(--blue);
        }

        .widget-item.error {
            border-left-color: var(--red);
        }

        .widget-item.success {
            border-left-color: var(--green);
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .widget-name {
            font-weight: bold;
            color: var(--blue);
            font-size: 12px;
        }

        .widget-id {
            background: var(--bg3);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: var(--text-muted);
        }

        .fields-container {
            display: grid;
            gap: 12px;
        }

        .field-row {
            display: grid;
            grid-template-columns: auto 1fr auto auto auto;
            gap: 12px;
            padding: 10px;
            background: var(--bg3);
            border-radius: 4px;
            align-items: center;
            font-size: 11px;
        }

        .field-status {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 80px;
        }

        .status-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            font-size: 0;
        }

        .status-icon.complete {
            background: var(--green);
        }

        .status-icon.loading {
            background: var(--yellow);
            animation: pulse 1s infinite;
        }

        .status-icon.error {
            background: var(--red);
        }

        .status-text {
            font-size: 10px;
            color: var(--text-muted);
        }

        .status-text.complete { color: var(--green); font-weight: bold; }
        .status-text.loading { color: var(--yellow); font-weight: bold; }
        .status-text.error { color: var(--red); font-weight: bold; }

        .field-name {
            color: var(--blue);
            font-weight: bold;
        }

        .field-api {
            color: var(--text-muted);
            font-size: 10px;
        }

        .field-value {
            color: var(--green);
            font-weight: bold;
            text-align: right;
            min-width: 120px;
        }

        .field-value.none {
            color: var(--text-muted);
            font-weight: normal;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .summary-card-title {
            color: var(--blue);
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 4px;
            background: var(--bg3);
            border-radius: 4px;
            font-size: 11px;
        }

        .summary-label {
            color: var(--text-muted);
        }

        .summary-value {
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }

        .progress-bar {
            height: 20px;
            background: var(--bg3);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
            display: flex;
        }

        .progress-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            color: white;
            flex-direction: column;
        }

        .progress-segment.complete {
            background: var(--green);
        }

        .progress-segment.loading {
            background: var(--yellow);
        }

        .progress-segment.error {
            background: var(--red);
        }

        .no-data {
            color: var(--text-muted);
            padding: 20px;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

    async function auditAllWidgets() {
        const container = document.getElementById('analysis-container');

        const summaries = {
            analysis1: { total: 0, complete: 0, loading: 0, error: 0 },
            analysis2: { total: 0, complete: 0, loading: 0, error: 0 },

            const section = document.createElement('div');

            let completeCount = 0;
            let errorCount = 0;

            const header = document.createElement('div');
            header.className = 'analysis-header';
            header.innerHTML = `
                <div class="analysis-title">${analysisData.icon} ${analysisData.title} (${widgets.length}개 위젯)</div>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">총 필드:</span>
                        <span class="stat-value total">${totalFields}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">완료:</span>
                        <span class="stat-value complete" id="complete-${analysisKey}">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">진행중:</span>
                        <span class="stat-value loading" id="loading-${analysisKey}">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">에러:</span>
                        <span class="stat-value error" id="error-${analysisKey}">0</span>
                    </div>
                </div>
            `;
            section.appendChild(header);

            const list = document.createElement('div');
            list.className = 'widget-list';

            for (const widget of widgets) {
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'widget-item';
                widgetDiv.id = `widget-${widget.id}`;

                const widgetHeader = document.createElement('div');
                widgetHeader.className = 'widget-header';
                widgetHeader.innerHTML = `
                    <div class="widget-name">${widget.name}</div>
                    <div class="widget-id">${widget.id}</div>
                `;
                widgetDiv.appendChild(widgetHeader);

                const fieldsDiv = document.createElement('div');
                fieldsDiv.className = 'fields-container';

                for (const field of widget.fields) {
                    const fieldRow = document.createElement('div');
                    fieldRow.className = 'field-row';
                    fieldRow.id = `field-${widget.id}-${field.name.replace(/\s+/g, '-')}`;
                    fieldRow.innerHTML = `
                        <div class="field-status">
                            <span class="status-icon loading"></span>
                            <span class="status-text loading">로딩중</span>
                        </div>
                        <div class="field-name">${field.name}</div>
                        <div class="field-api">${field.api} → ${field.field}</div>
                        <div class="field-value none">-</div>
                    `;
                    fieldsDiv.appendChild(fieldRow);
                }

                widgetDiv.appendChild(fieldsDiv);
                list.appendChild(widgetDiv);
            }

            section.appendChild(list);
            container.appendChild(section);

            // 실제 데이터 로드
            await loadWidgetData(analysisKey, widgets);

            // 통계 업데이트
            summaries[analysisKey].total = totalFields;
        }

        updateSummary(summaries);
    }

    async function loadWidgetData(analysisKey, widgets) {
        // /market 데이터 한 번만 로드 (유일한 엔드포인트)
        const marketData = await fetch(API_BASE + '/market').then(r => r.json()).catch(() => null);

        for (const widget of widgets) {
            for (const field of widget.fields) {
                const fieldId = `field-${widget.id}-${field.name.replace(/\s+/g, '-')}`;
                const fieldElement = document.getElementById(fieldId);
                if (!fieldElement) continue;

                try {
                    let value = null;
                    let status = 'error';

                    if (marketData) {
                        // worker.js /market 엔드포인트 응답 구조에 맞게 조회
                        value = getNestedValue(marketData, field.field);

                        // 특수 필드 처리
                        if (field.field === 'SECTORS' && marketData.SECTORS) {
                            value = Object.keys(marketData.SECTORS).filter(k => marketData.SECTORS[k]).length;
                            status = 'complete';
                        } else if (field.field === 'CREDIT' && marketData.CREDIT) {
                            value = Object.keys(marketData.CREDIT).filter(k => marketData.CREDIT[k]).length;
                            status = 'complete';
                        } else if (field.field === 'COMMODITIES' && marketData.COMMODITIES) {
                            value = Object.keys(marketData.COMMODITIES).filter(k => marketData.COMMODITIES[k]).length;
                            status = 'complete';
                        } else if (field.field === 'FX' && marketData.FX) {
                            value = Object.keys(marketData.FX).filter(k => marketData.FX[k]).length;
                            status = 'complete';
                        } else if (field.field === 'MACRO_INDICATORS' && marketData.MACRO_INDICATORS) {
                            value = Object.keys(marketData.MACRO_INDICATORS).length;
                            status = 'complete';
                        } else if (field.field === 'ECONOMIC_INDICATORS' && marketData.ECONOMIC_INDICATORS) {
                            value = typeof marketData.ECONOMIC_INDICATORS === 'object' ? '✓ 로드됨' : null;
                            status = 'complete';
                        } else if (value !== null && value !== undefined) {
                            status = 'complete';
                        }
                    }

                    // UI 업데이트
                    const statusIcon = fieldElement.querySelector('.status-icon');
                    const statusText = fieldElement.querySelector('.status-text');
                    const valueDiv = fieldElement.querySelector('.field-value');

                    statusIcon.className = `status-icon ${status}`;
                    statusText.className = `status-text ${status}`;
                    statusText.textContent = status === 'complete' ? '✅ 완료' : status === 'error' ? '❌ 에러' : '⏳ 진행중';

                    if (value !== null && value !== undefined) {
                        valueDiv.className = 'field-value';
                        const displayValue = typeof value === 'object' ? `[${Object.keys(value).length}개]` : String(value);
                        valueDiv.textContent = `${displayValue}${field.unit ? ' ' + field.unit : ''}`;
                    }

                    // 위젯 상태 업데이트
                    updateWidgetStatus(widget.id);

                } catch (e) {
                    const statusIcon = fieldElement.querySelector('.status-icon');
                    statusIcon.className = 'status-icon error';
                }
            }
        }
    }

    function getNestedValue(obj, path) {
        const keys = path.replace(/\[\]/g, '').split(/[\.\[\]]/).filter(k => k);
        let current = obj;
        for (const key of keys) {
            if (current && typeof current === 'object') {
                current = current[key];
            } else {
                return null;
            }
        }
        return current;
    }

    function updateWidgetStatus(widgetId) {
        const widget = document.getElementById(`widget-${widgetId}`);
        if (!widget) return;

        const rows = widget.querySelectorAll('.field-row');
        const statuses = Array.from(rows).map(r => {
            const statusText = r.querySelector('.status-text');
            return statusText ? statusText.textContent : '❌ 에러';
        });

        if (statuses.every(s => s.includes('완료'))) {
            widget.className = 'widget-item success';
        } else if (statuses.some(s => s.includes('에러'))) {
            widget.className = 'widget-item error';
        }
    }

    function updateSummary(summaries) {
        const grid = document.getElementById('summary-grid');
        grid.innerHTML = '';

        for (const [key, stats] of Object.entries(summaries)) {
            if (!ANALYSIS_DATA[key]) continue;

            const card = document.createElement('div');
            card.className = 'summary-card';

            const title = ANALYSIS_DATA[key].title;
            const icon = ANALYSIS_DATA[key].icon;

            // 실시간 통계 계산
            const widgets = ANALYSIS_DATA[key].widgets;
            let total = 0, complete = 0, error = 0, loading = 0;

            for (const widget of widgets) {
                for (const field of widget.fields) {
                    total++;
                    const fieldId = `field-${widget.id}-${field.name.replace(/\s+/g, '-')}`;
                    const fieldElement = document.getElementById(fieldId);
                    if (fieldElement) {
                        const statusText = fieldElement.querySelector('.status-text');
                        if (statusText) {
                            if (statusText.textContent.includes('완료')) complete++;
                            else if (statusText.textContent.includes('에러')) error++;
                            else if (statusText.textContent.includes('진행중')) loading++;
                        }
                    }
                }
            }

            const completePercent = total > 0 ? ((complete / total) * 100).toFixed(1) : 0;

            card.innerHTML = `
                <div class="summary-card-title">${icon} ${title}</div>
                <div class="summary-stat">
                    <span class="summary-label">총 필드</span>
                    <span class="summary-value">${total}</span>
                </div>
                <div class="summary-stat">
                    <span class="summary-label">✅ 완료</span>
                    <span class="summary-value" style="color: var(--green);">${complete}</span>
                </div>
                <div class="summary-stat">
                    <span class="summary-label">⏳ 진행중</span>
                    <span class="summary-value" style="color: var(--yellow);">${loading}</span>
                </div>
                <div class="summary-stat">
                    <span class="summary-label">❌ 에러</span>
                    <span class="summary-value" style="color: var(--red);">${error}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-segment complete" style="width: ${completePercent}%; min-width: 30px;">${completePercent}%</div>
                </div>
            `;
            grid.appendChild(card);
        }
    }

    // ✅ 자동 로드 제거됨 - 수동으로만 실행하도록 변경 (느린 엔드포인트 계산 완료까지 기다리기 위함)
</script>

</body>
</html>
